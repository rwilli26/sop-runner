 API Key to n8n", "description": "In your n8n workflow, locate the 'Anthropic Chat Model' node (there are two, one in the main flow and one in the 'Follow Up Agent' flow). Click on the node.\n1.  Under 'Credential to connect with', select 'Create new credential'.\n2.  In the 'Anthropic account' popup, paste your `anthropicApiKey` into the 'API Key' field.\n3.  Click 'Save'. Ensure the connection is successful.", "url": "https://claude.ai/api", "input_field": null, "uses_variable": "anthropicApiKey", "timestamp": "06:48", "visual_context": "n8n workflow canvas. Clicks on 'Anthropic Chat Model' node. In the settings panel, clicks 'Create new credential', pastes API key into 'API Key' field, and clicks 'Save'. A success message appears."}, {"step_number": 9, "title": "Update GHL Custom Value with n8n Webhook URL", "description": "In your n8n workflow, locate the 'Webhook' node (the first node in the main flow). Copy the 'Production URL' from its settings. Go to your GoHighLevel account, navigate to 'Settings' -> 'Custom Values'. Find the custom value named 'n8n_ai_bot_webhook'. Click the three dots next to it, select 'Edit', and paste the copied n8n Production URL into the 'Value' field. Click 'Update'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "07:40", "visual_context": "n8n workflow, 'Webhook' node settings, copying 'Production URL'. GoHighLevel 'Custom Values' page, editing 'n8n_ai_bot_webhook' custom value, pasting the URL, and clicking 'Update'."}, {"step_number": 10, "title": "Configure 'AI Bot - Opt-in' GHL Workflow", "description": "In your GoHighLevel account, navigate to 'Automation' -> 'AI Bot - Opt-in' workflow. This workflow handles how users opt-in to the bot.\n1.  **Triggers:** The workflow has default triggers for SMS Widget, Facebook, and Instagram replies. You can add new triggers (e.g., 'Form Submitted' for a specific form) by clicking 'Add New Trigger'.\n2.  **Conditions:** The workflow uses conditions to route based on the trigger channel. If you added a new trigger (like 'Form Submitted'), you'll need to clone an existing condition branch (e.g., SMS) and modify it to include an 'OR' condition for your new trigger. For example, in the SMS condition, add an 'OR' for 'Workflow Trigger is Form Submitted'.\n3.  **Actions:** Ensure the 'Add Tag - AI opt-in' action is present in each branch. This tag is crucial for the bot to interact with the contact. The 'SMS' branch also includes an 'SMS' action to send an initial compliance message. The 'Webhook AI' action in each branch should point to the `n8n_ai_bot_webhook` custom value.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "09:12", "visual_context": "GoHighLevel 'AI Bot - Opt-in' workflow builder. Shows existing triggers (SMS Widget, FB, IG). Demonstrates adding a 'Form Submitted' trigger, modifying a condition branch with an 'OR' operator, and explaining the purpose of tags and the Webhook AI action."}, {"step_number": 11, "title": "Configure SMS Chat Widget (if needed)", "description": "If you plan to use the SMS Widget for opt-in, ensure it's configured correctly. In GoHighLevel, navigate to 'Sites' -> 'Chat Widget'. Create a new chat widget or edit an existing one. Select 'SMS / Email Chat'. In the widget settings, go to 'Messaging' and ensure that only 'Phone' and 'Message' are required fields in the contact form options. This ensures the widget primarily collects SMS information for bot interaction.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "13:40", "visual_context": "GoHighLevel 'Sites' -> 'Chat Widget' page. Demonstrates creating a new SMS/Email chat widget and configuring its messaging options to only require phone and message."}, {"step_number": 12, "title": "Configure 'AI Follow-up Trigger' GHL Workflow", "description": "In your GoHighLevel account, navigate to 'Automation' -> 'AI Follow-up Trigger' workflow. This workflow is designed to follow up with leads who haven't converted.\n1.  **Trigger:** Add a new trigger: 'State Opportunities'. Configure it with the following filters:\n    *   'In pipeline' is 'Delta Division' (or your chosen pipeline).\n    *   'Pipeline stage' is 'New Lead'.\n    *   'Duration in days' is '1'.\n    *   'Has Tag' is 'AI opt-in'.\n2.  **DND GPT Check:** The workflow checks for a 'dnd_gpt' tag. If a contact has this tag, the bot will not follow up.\n3.  **Follow-up Actions:** If no 'dnd_gpt' tag is present, the workflow adds the 'AI Follow-up' tag, waits 6 seconds, sends a webhook to n8n (using the `n8n_ai_bot_webhook` custom value), and then waits 1 day before potentially repeating the process.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "14:40", "visual_context": "GoHighLevel 'AI Follow-up Trigger' workflow builder. Shows adding a 'State Opportunities' trigger with specific filters for pipeline, stage, duration, and tag. Explains the DND GPT check and the follow-up actions including the Webhook AI."}, {"step_number": 13, "title": "Scrape 'Assistantchat Last Message' Custom Field ID", "description": "In your n8n workflow, locate the 'Manual' node (below the main setup box). Click 'Execute workflow' -> 'From Manual'. This will run the 'Get Custom Fields' and 'Scrape ID' nodes. Once executed, click on the 'Scrape ID' node. In the 'OUTPUT' panel on the right, you will see an item named 'assistantchat_last_message' with an associated ID. Copy this ID.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "17:05", "visual_context": "n8n workflow canvas. Clicks 'Execute workflow' on the 'Manual' node. Then clicks on the 'Scrape ID' node and copies the ID associated with 'assistantchat_last_message' from the output."}, {"step_number": 14, "title": "Add Custom Field ID to 'Edit Fields' Node", "description": "In your n8n workflow, locate the 'Edit Fields' node (the first node after 'Webhook' in the main flow). Click on the node to open its settings. Find the field named 'custom_field_id_assistantchat_last_message' and paste the ID you copied in the previous step into its 'Value' field.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "19:21", "visual_context": "n8n workflow canvas. Clicks on 'Edit Fields' node. Pastes the copied custom field ID into the 'Value' field for 'custom_field_id_assistantchat_last_message'."}, {"step_number": 15, "title": "Create Private Integration in GHL", "description": "In your GoHighLevel account, navigate to 'Settings' -> 'Private Integrations'. Click 'Create New Integration'. Name it 'n8n' (or any descriptive name). Click 'Next'. For 'Scopes', select all options (or at least those related to contacts, conversations, and calendars). Click 'Create'. Confirm the security risk. A token will be generated. Copy this token and save it somewhere secure, as you won't be able to view it again.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "17:53", "visual_context": "GoHighLevel 'Settings' -> 'Private Integrations' page. Clicks 'Create New Integration', names it 'n8n', selects all scopes, clicks 'Create', confirms, and copies the generated token."}, {"step_number": 16, "title": "Add Private Integration Key to 'Edit Fields' Node", "description": "In your n8n workflow, locate the 'Edit Fields' node. Find the field named 'private_integration' and paste the private integration key (token) you copied in the previous step into its 'Value' field. Ensure there is no 'Bearer' prefix; just the key itself.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "20:09", "visual_context": "n8n workflow canvas. Clicks on 'Edit Fields' node. Pastes the copied private integration key into the 'Value' field for 'private_integration'."}, {"step_number": 17, "title": "Configure GHL Calendars", "description": "In your GoHighLevel account, navigate to 'Settings' -> 'Calendars'.\n1.  **Ensure Team Member:** For each calendar (especially 'AI Follow Up Reminder' and any booking calendars), click 'Edit Calendar'. Under 'Select Team Members & Assign Meeting Location', ensure at least one team member is assigned. If not, go to 'My Staff' and add a user (you can use a generic name/email if needed, just to fulfill the requirement).\n2.  **Activate Calendar:** Ensure all relevant calendars are 'Active'. If not, click the three dots next to the calendar and select 'Activate Calendar'.\n3.  **Copy Calendar IDs:** Copy the Calendar ID for 'AI Follow Up Reminder' and any other booking calendars you intend for the bot to use (e.g., 'Success Session').", "url": null, "input_field": null, "uses_variable": null, "timestamp": "20:28", "visual_context": "GoHighLevel 'Settings' -> 'Calendars' page. Shows editing a calendar, assigning a team member, activating it, and copying the calendar ID."}, {"step_number": 18, "title": "Add Calendar IDs to 'Edit Fields' Node", "description": "In your n8n workflow, locate the 'Edit Fields' node. Paste the copied 'AI Follow Up Reminder' calendar ID into the 'Value' field for 'ai_follow_up_calendar_id'. If you have other booking calendars for the bot, paste their IDs into the 'Value' field for 'calendar_id'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "21:24", "visual_context": "n8n workflow canvas. Clicks on 'Edit Fields' node. Pastes the copied calendar IDs into the respective 'Value' fields for 'ai_follow_up_calendar_id' and 'calendar_id'."}, {"step_number": 19, "title": "Configure n8n Workflow Timezone", "description": "In your n8n workflow, click the three dots in the top right corner (next to 'Save') and select 'Settings'. Under 'Timezone', select the timezone that matches your GoHighLevel account's timezone (found in GHL 'Settings' -> 'Business Profile'). For example, 'America/New_York'. You can also enable 'Timeout Workflow' and set it to '1 hour' to prevent workflows from running indefinitely. Click 'Save'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "24:13", "visual_context": "n8n workflow settings panel. Selects timezone from dropdown, enables 'Timeout Workflow' and sets it to 1 hour, then clicks 'Save'."}, {"step_number": 20, "title": "Add OpenAI API Key to n8n (for Vector Database)", "description": "In your n8n workflow, locate the 'Embeddings OpenAI' node (on the right side, under 'Vector Database Setup'). Click on the node.\n1.  Under 'Credential to connect with', select 'Create new credential'.\n2.  In the 'OpenAI account' popup, paste your `openaiApiKey` into the 'API Key' field.\n3.  Click 'Save'. Ensure the connection is successful.", "url": null, "input_field": null, "uses_variable": "openaiApiKey", "timestamp": "24:56", "visual_context": "n8n workflow canvas. Clicks on 'Embeddings OpenAI' node. In the settings panel, clicks 'Create new credential', pastes API key into 'API Key' field, and clicks 'Save'. A success message appears."}, {"step_number": 21, "title": "Activate n8n Workflow", "description": "In your n8n workflow, toggle the 'Inactive' switch to 'Active' in the top right corner. Confirm the activation if prompted.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "25:34", "visual_context": "n8n workflow canvas. Toggles the 'Inactive' switch to 'Active'. A popup confirms 'Workflow activated'."}, {"step_number": 22, "title": "Configure System Prompt in AI Agent Node", "description": "In your n8n workflow, locate the 'AI Agent' node. Click on the node to open its settings. Scroll down to the 'System Message' section. Here, you can customize the bot's system prompt. The default prompt provides a base for an A2 sales representative. You can modify this to suit your specific business needs, including adding your company name, primary objective, and conversation guidelines. This is where you define the bot's personality and objectives.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "25:46", "visual_context": "n8n workflow canvas. Clicks on 'AI Agent' node. Shows the 'System Message' field with a detailed prompt for the AI agent."}], "variables_summary": [{"variable_name": "n8nRootPassword", "label": "n8n VPS Root Password", "type": "password", "used_in_future_steps": "No"}, {"variable_name": "n8nLoginUrl", "label": "n8n Login URL", "type": "url", "used_in_future_steps": "No"}, {"variable_name": "n8nLicenseKey", "label": "n8n License Key", "type": "text", "used_in_future_steps": "No"}, {"variable_name": "anthropicApiKey", "label": "Anthropic API Key", "type": "password", "used_in_future_steps": "Yes"}, {"variable_name": "geminiApiKey", "label": "Gemini API Key", "type": "password", "used_in_future_steps": "Yes"}, {"variable_name": "openaiApiKey", "label": "OpenAI API Key", "type": "password", "used_in_future_steps": "Yes"}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod6-les1"});
loadSop('m6_02', {"title": "System Overview: HighLevel and n8n AI Agent Integration", "description": "This video provides a high-level overview of how the n8n AI Agent integrates with GoHighLevel (GHL) to manage contact communication across various channels. It explains the message flow from contact to GHL, then to the n8n AI Agent for processing and response, and back to the contact. The video also highlights key features of the n8n AI Agent, such as multi-message intelligence, proactive follow-ups, third-party API connectivity, auto human handoff, support for various LLMs, native booking, self-service DND, full prompt control, omni-channel capabilities, timezone awareness, and full contact journey awareness. \n\n**Note:** This video is an explanatory overview and does not contain any actionable, step-by-step instructions for setting up or configuring the system. Therefore, no specific steps are extracted in this SOP.", "estimated_time": "0 minutes", "steps": [], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod6-les2"});
loadSop('m6_03', {"title": "AI Delta Response System Setup and Workflow Overview", "description": "This SOP details the setup and functionality of the AI Delta Response System, integrating GoHighLevel (GHL) for front-end communication and n8n for back-end AI processing. It covers opt-in, lead reply, AI reply, follow-up, DND, and human hand-off workflows, along with n8n custom field and calendar integrations.", "estimated_time": "18 minutes", "steps": [{"step_number": 1, "title": "Understand GHL as the Front-End", "description": "GoHighLevel (GHL) serves as the front-end for communication channels, sending messages to leads.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:05", "visual_context": "GHL Workflow List showing 'AI Delta Response System' folder."}, {"step_number": 2, "title": "Understand n8n as the Back-End", "description": "n8n acts as the back-end, providing the 'brains' for Large Language Models (LLMs) and various tools used by the AI.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:15", "visual_context": "n8n workflow diagram with various nodes and connections."}, {"step_number": 3, "title": "Configure 'AI Bot - Opt-in' Workflow (GHL)", "description": "This workflow manages how leads opt into the bot. It includes triggers for customer replies from Instagram, SMS Widget, Facebook Messenger, and WhatsApp. You can add or remove channels as needed.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:40", "visual_context": "GHL workflow builder showing 'AI Bot - Opt-in' with multiple triggers and conditional branches."}, {"step_number": 4, "title": "Add Channel-Specific Tags", "description": "Within the 'AI Bot - Opt-in' workflow, ensure each channel's branch adds a specific tag (e.g., 'sms', 'whatsapp', 'instagram', 'facebook'). These tags are crucial for the AI to know which channel to reply to.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:05", "visual_context": "GHL workflow builder showing 'Add Tag' actions under conditional branches for different communication channels."}, {"step_number": 5, "title": "Create/Update Opportunity for New Leads", "description": "Configure the 'Create Or Update Opportunity' action to add new leads to the 'Delta Division' pipeline in the 'New Lead' stage. This is essential for follow-up workflows to function correctly.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:29", "visual_context": "GHL 'Create Or Update Opportunity' action settings, showing 'Delta Division' pipeline and 'New Lead' stage."}, {"step_number": 6, "title": "Update 'User last message' Contact Field", "description": "Set the 'User last message' custom field to `{{message.body}}`. This captures the lead's last message for the bot. If adding a form or survey, manually set this field to a placeholder like 'Hi' to prevent errors.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:39", "visual_context": "GHL 'Update Contact Field' action settings, showing 'User last message' field with `{{message.body}}`."}, {"step_number": 7, "title": "Configure SMS Opt-in Message", "description": "For SMS opt-ins, include a first message that states the company name and DND information (e.g., 'Thank you, we will be right with you. {{location.name}}'). DND information is automatically added due to A2P requirements.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:52", "visual_context": "GHL 'Send SMS' action settings with a message template."}, {"step_number": 8, "title": "Add 'AI opt-in' Tag", "description": "Ensure the 'AI opt-in' tag is added to the contact. This tag signals to the bot that it can initiate communication with the lead.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:08", "visual_context": "GHL 'Add Tag' action for 'AI opt-in'."}, {"step_number": 9, "title": "Configure Webhook to n8n", "description": "Add a 'Webhook AI' action to send data to n8n. The URL should be set to `{{custom_values.n8n_ai_bot_webhook}}`.", "url": null, "input_field": null, "uses_variable": "n8n_ai_bot_webhook", "timestamp": "03:20", "visual_context": "GHL 'Webhook' action settings showing the URL field."}, {"step_number": 10, "title": "Configure 'AI Bot - Base Triggers (Lead Reply)' Workflow (GHL)", "description": "This workflow triggers when a customer replies via any channel (Instagram, SMS, WhatsApp, Facebook). It's configured to only activate if the contact has the 'ai opt-in' tag.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:45", "visual_context": "GHL workflow builder showing 'AI Bot - Base Triggers (Lead Reply)' with multiple triggers and a filter for 'ai opt-in' tag."}, {"step_number": 11, "title": "Implement DND Check", "description": "Add a condition to check if the contact has the 'dnd gpt' tag. If present, the workflow should end to prevent further bot communication.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:14", "visual_context": "GHL workflow builder showing a 'Condition' node checking for 'dnd gpt' tag."}, {"step_number": 12, "title": "Remove 'AI Follow Up' Tag on Lead Reply", "description": "If the lead replies and does not have the 'dnd gpt' tag, remove the 'ai follow up' tag. This prevents the follow-up workflow from continuing since the lead has already engaged.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:29", "visual_context": "GHL 'Remove Contact Tag' action for 'ai follow up'."}, {"step_number": 13, "title": "Configure 'AI Bot - Base Triggers (AI Reply)' Workflow (GHL)", "description": "This workflow triggers when the 'Assistant Last Message' custom field changes (meaning n8n has generated a reply). It then uses conditional logic to send the AI's response back through the appropriate communication channel.", "url": null, "input_field": null, "uses_variable": "assistantchat_last_message_id", "timestamp": "05:12", "visual_context": "GHL workflow builder showing 'AI Bot - Base Triggers (AI Reply)' with 'Contact Changed - Assistant Last Message' trigger and conditional branches for different channels."}, {"step_number": 14, "title": "Integrate WhatsApp (if applicable)", "description": "If using WhatsApp, integrate it in GHL settings. Then, in the 'AI Bot - Base Triggers (AI Reply)' workflow, add a WhatsApp node and select a template to send the `{{contact.assistant_chat_last_message}}`.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:50", "visual_context": "GHL workflow builder showing a placeholder for WhatsApp action, prompting for integration."}, {"step_number": 15, "title": "Configure 'AI Follow Up Calendar' Workflow (GHL)", "description": "This workflow is triggered when an appointment is confirmed in the 'AI Follow Up Calendar'. It removes the lead from the 'AI Follow-up Trigger' workflow and updates their opportunity stage.", "url": null, "input_field": null, "uses_variable": "ai_follow_up_calendar_id", "timestamp": "06:33", "visual_context": "GHL workflow builder showing 'AI Follow Up Calendar' with 'Appointment Status' trigger and actions."}, {"step_number": 16, "title": "Set Opportunity Stage for Follow-Up", "description": "Ensure you have an 'AI Follow Up Calendar' pipeline stage. This workflow moves the lead's opportunity to this stage, preventing the regular follow-up trigger from activating.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "07:35", "visual_context": "GHL 'Create Or Update Opportunity' action settings, showing 'AI Follow Up Calendar' pipeline stage."}, {"step_number": 17, "title": "Configure 'AI Follow-up Trigger' Workflow (GHL)", "description": "This workflow is triggered by the 'ai follow up' tag. It checks for the 'dnd gpt' tag, adds the 'ai follow up' tag, waits, and sends a webhook to n8n. It then waits a day, checks for replies, and repeats for up to 4 days.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "08:50", "visual_context": "GHL workflow builder showing 'AI Follow-up Trigger' with conditional logic, waits, and webhook actions."}, {"step_number": 18, "title": "Configure 'DND GPT Tag' Workflow (GHL)", "description": "This workflow is triggered when the 'dnd gpt' tag is added to a contact. Currently, it just ends the workflow, but you can add actions like removing the contact from other follow-up workflows or adding an SMS DND tag.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "09:50", "visual_context": "GHL workflow builder showing 'DND GPT Tag' with 'Contact Tag - DND GPT' trigger and an 'END' node."}, {"step_number": 19, "title": "Configure 'Human Tag - Internal Notification' Workflow (GHL)", "description": "This workflow is triggered when the 'human' tag is added (by n8n). It adds the 'dnd gpt' tag to stop bot interaction and sends an internal notification to all users, indicating a human hand-off is needed.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "10:28", "visual_context": "GHL workflow builder showing 'Human Tag - Internal Notification' with 'Contact Tag - human' trigger, 'Add Tag - dnd gpt', and 'Internal Notification' actions."}, {"step_number": 20, "title": "Integrate DND into Booking Workflows", "description": "If using booking workflows (e.g., 'Success Call Reminders'), ensure that when an appointment is booked, the workflow removes the lead from any active follow-up triggers and adds the 'dnd gpt' tag. This prevents the bot from continuing to message them after they've booked.", "url": null, "input_field": null, "uses_variable": "main_booking_calendar_id", "timestamp": "12:00", "visual_context": "GHL workflow builder showing 'Success Call (DFY) - Reminders' with 'Remove from Workflow' and 'Remove Tag - dnd gpt' actions."}, {"step_number": 21, "title": "Understand n8n Lead Processing Flow", "description": "When a lead comes into n8n via webhook, it first checks for the 'ai follow up' tag. If present, it goes to the 'Follow Up Agent'. Otherwise, it proceeds with a 'Regular Convo'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "14:30", "visual_context": "n8n workflow diagram showing the initial 'Webhook' node, 'Edit Fields', and 'Switch' node directing to 'Follow Up Agent' or 'Regular Convo'."}, {"step_number": 22, "title": "Process Regular Conversations in n8n", "description": "For 'Regular Convo', n8n retrieves existing messages from the database, checks if a message thread exists, updates it (if it does) or creates a new one (if it doesn't), waits 12 seconds to collect multiple messages, gets the full message, and then deletes the old message row.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "15:07", "visual_context": "n8n workflow diagram showing 'Get Existing Messages', 'Message Key', 'Update Message', 'Create Message', 'Wait 12 Seconds', 'Get Full Message', and 'Delete Old Message Row' nodes."}, {"step_number": 23, "title": "AI Agent and Error Handling in n8n", "description": "The 'AI Agent' node processes the conversation. It updates the 'Assistant Last Message' field in GHL. An error handler is included to retry the AI agent up to 5 times if there are issues with Anthropic or Gemini models (e.g., API failures or credit exhaustion).", "url": null, "input_field": null, "uses_variable": null, "timestamp": "16:15", "visual_context": "n8n workflow diagram showing 'AI Agent', 'Retry Count', 'Stop and Error', 'Anthropic Chat Model', and 'Google Gemini Chat Model' nodes."}, {"step_number": 24, "title": "Understand AI Agent Tools in n8n", "description": "The AI Agent utilizes various tools such as `dnd_contact_tool`, `future_follow_up_tool`, `get_calendar_slots_tool`, `book_appointment_tool`, `human_escalation_tool`, `knowledge_database_tool`, and `embeddings_OpenAI` to perform specific actions and retrieve information.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "17:00", "visual_context": "n8n workflow diagram showing the 'AI Agent' node connected to multiple tool nodes (globe icons)."}, {"step_number": 25, "title": "Understand Chat History in n8n", "description": "The 'Chat History' node stores the last 20 messages from the contact ID, providing memory for both regular and follow-up conversations. This ensures the AI has context for ongoing interactions.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "17:10", "visual_context": "n8n workflow diagram showing the 'Chat History' node and its connection to the AI Agent."}], "variables_summary": [{"variable_name": "n8n_ai_bot_webhook", "label": "n8n AI Bot Webhook URL", "type": "text", "description": "The URL for the n8n webhook that receives data from GHL."}, {"variable_name": "assistantchat_last_message_id", "label": "Assistantchat Last Message Custom Field ID", "type": "text", "description": "The custom field ID in GHL for storing the AI's last message."}, {"variable_name": "ai_follow_up_calendar_id", "label": "AI Follow Up Calendar ID", "type": "text", "description": "The ID of the calendar used by the AI for scheduling follow-up appointments."}, {"variable_name": "main_booking_calendar_id", "label": "Main Booking Calendar ID", "type": "text", "description": "The ID of the primary calendar where leads book appointments with humans."}, {"variable_name": "timezone", "label": "Time Zone", "type": "text", "description": "The timezone setting for the GHL account, used for calendar integrations."}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod6-les3"});
loadSop('m6_04', {"title": "Understanding GHL vs. ADRS AI Chatbot System Differences", "description": "This SOP outlines the key differences between the native AI Chatbot in GoHighLevel (GHL) and the AI Delta Response System (ADRS), highlighting ADRS's advanced capabilities in LLM handling, prompt control, follow-up management, multi-message responses, and third-party integrations. This comparison helps in understanding why ADRS offers superior flexibility and performance for building sophisticated AI agents.", "estimated_time": "15 minutes", "steps": [{"step_number": 1, "title": "Introduction to AI Chatbot System Comparison", "description": "Understand the core objective of comparing the native GoHighLevel (GHL) AI Chatbot with the AI Delta Response System (ADRS) to identify key differences in functionality and control.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "Title slide 'GHL vs. ADRS: AI Chatbot System Comparison'."}, {"step_number": 2, "title": "Compare LLM Support and Error Handling", "description": "Observe that the native GHL AI Chatbot has limited Large Language Model (LLM) options (only OpenAI models like GPT 4.1, 4.1 Mini, 5, 5 Mini) and lacks dual LLM support or robust error handling. In contrast, ADRS supports any LLM (e.g., Anthropic, Google Gemini), including a backup LLM for error handling, ensuring higher reliability and flexibility.", "url": null, "input_field": null, "uses_variable": "anthropicApiKey, geminiApiKey, openaiApiKey", "timestamp": "00:10", "visual_context": "Comparison slide: 'Limited LLMs and no Dual LLM or Error handling' (GHL) vs. 'Any LLM + back-up LLM (Error Handling)' (ADRS). GHL interface showing dropdown with OpenAI GPT options. n8n workflow showing 'Anthropic Chat Model' and 'Google Gemini Chat Model' connected to an 'AI Agent' node, with a fallback path for error handling."}, {"step_number": 3, "title": "Compare Prompt Size and Control", "description": "Note that the native GHL AI Chatbot has a limited prompt size (2000 words available, but with a hidden base prompt of 1351-2351 tokens that cannot be changed) and restricted control over its base prompt, which is a 'black box' system. ADRS offers full prompt control and flexibility, allowing for extensive and detailed instructions to optimize chatbot quality without arbitrary limits.", "url": "https://koalachat.ai/free-gpt-tokenizer", "input_field": null, "uses_variable": null, "timestamp": "01:29", "visual_context": "Comparison slide: 'Limited Prompt Size and limited control' (GHL) vs. 'Full Prompt Control & Flexibility' (ADRS). GHL interface showing 'Prompt' field with '2000 words left' and '1351 - 2351 tokens approx.' for a hidden base prompt. koalachat.ai/free-gpt-tokenizer showing a sample prompt with 3535 words. n8n workflow showing the 'AI Agent' node with an editable 'System Message' field."}, {"step_number": 4, "title": "Compare Follow-up Agent Control", "description": "Observe that the native GHL AI Chatbot has no specific prompt control for follow-up messages, offering only generic options. ADRS features a dedicated 'Follow Up Agent' with custom control, allowing for highly tailored and effective follow-up strategies, including its own dual LLM support and error handling.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:08", "visual_context": "Comparison slide: 'No prompt control on follow up' (GHL) vs. 'Full follow-up agent with custom control' (ADRS). n8n workflow showing a separate 'Follow Up Agent' node with its own 'System Message' for custom follow-up instructions and dual LLM support."}, {"step_number": 5, "title": "Compare Multi-Message Response Handling", "description": "Understand that the native GHL AI Chatbot responds to each message individually, leading to multiple, fragmented replies. ADRS gathers all incoming messages, processes them, and then provides a single, natural, and consolidated response, mimicking human-like interaction.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:43", "visual_context": "Comparison slide: 'No multi-message response' (GHL) vs. 'Gathers all responses then replies (Natural Response)' (ADRS). Visual comparison of chat interfaces: GHL shows multiple short replies, while ADRS shows a single consolidated reply after processing multiple user inputs."}, {"step_number": 6, "title": "Compare Third-Party App Access", "description": "Note that the native GHL AI Chatbot lacks third-party app access. ADRS allows integration with any third-party app, including web search, custom skills, and various tools (e.g., contact tools, calendar slot tools, appointment booking, human escalation, knowledge databases, custom workflows), providing limitless possibilities for enhancing the AI bot's capabilities.", "url": null, "input_field": null, "uses_variable": "openaiApiKey", "timestamp": "04:20", "visual_context": "Comparison slide: 'No 3rd party app access' (GHL) vs. 'Any 3rd Party App access (Web search, Skills, tools)' (ADRS). n8n workflow showing the 'AI Agent' node connected to multiple external tools like 'dnd_contact tool', 'future_follow_up tool', 'get_calendar_slots tool', 'book_appointment tool', 'human_escalation tool', and 'knowledge_database tool' (with 'Embeddings OpenAI')."}, {"step_number": 7, "title": "Conclude on ADRS Advantages", "description": "Summarize that ADRS provides full control over the AI bot, enabling the creation of a highly effective and versatile AI employee through extensive customization, dual LLM support, advanced error handling, and limitless third-party integrations, making it superior to the native GHL AI Chatbot.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:17", "visual_context": "Comparison slide highlighting the advantages of ADRS."}], "variables_summary": [{"variable_name": "n8nRootPassword", "label": "n8n VPS Root Password", "type": "password", "used_in_future_steps": "No"}, {"variable_name": "n8nLoginUrl", "label": "n8n Login URL", "type": "text", "used_in_future_steps": "No"}, {"variable_name": "n8nLicenseKey", "label": "n8n License Key", "type": "text", "used_in_future_steps": "No"}, {"variable_name": "anthropicApiKey", "label": "Anthropic API Key", "type": "password", "used_in_future_steps": "Yes"}, {"variable_name": "geminiApiKey", "label": "Gemini API Key", "type": "password", "used_in_future_steps": "Yes"}, {"variable_name": "openaiApiKey", "label": "OpenAI API Key", "type": "password", "used_in_future_steps": "Yes"}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod6-les4"});
loadSop('m6_05', {"title": "Anatomy of a Black Umbrella AI Chatbot Prompt", "description": "This SOP details the structure and components of an AI chatbot system prompt, explaining each section's purpose and how it influences the AI's behavior. It also covers the integration of dynamic context, conversation flow guidelines, objection handling, knowledge bases, and various API tools within an n8n workflow. Understanding this anatomy is crucial for building and optimizing effective AI agents.", "estimated_time": "30 minutes", "steps": [{"step_number": 1, "title": "Download Base AI Agent System Prompt", "description": "Download the 'Base AI Agent System Prompt.md' file. This Markdown file contains the core system prompt that defines the AI's identity, goals, context, and conversational guidelines.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:33", "visual_context": "The user clicks the download icon next to 'Base AI Agent System Prompt.md' in the 'Attached Files' section."}, {"step_number": 2, "title": "Download Anatomy of a Chatbot Prompt Diagram", "description": "Download the 'Anatomy Of A Chatbot Prompt.png' file. This image provides a visual overview of the nine sections of the AI chatbot prompt.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:35", "visual_context": "The user clicks the download icon next to 'Anatomy Of A Chatbot Prompt.png' in the 'Attached Files' section."}, {"step_number": 3, "title": "Open Base AI Agent System Prompt File", "description": "Open the downloaded 'Base AI Agent System Prompt.md' file in a text editor to review its content. This file will be used to configure the AI Agent node in n8n.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:03", "visual_context": "The user opens the 'Base AI Agent System Prompt.md' file, which displays code in a text editor."}, {"step_number": 4, "title": "Navigate to n8n Workflow", "description": "Go to your n8n instance and open the 'AI Delta Response System' workflow. This workflow orchestrates the AI chatbot's operations.", "url": "https://app.n8n.cloud/workflow/1234567890abcdef", "input_field": null, "uses_variable": null, "timestamp": "01:12", "visual_context": "The screen switches to the n8n workflow interface, showing a complex flow of interconnected nodes."}, {"step_number": 5, "title": "Open AI Agent Node", "description": "Locate and open the 'AI Agent' node within the n8n workflow. This node is where the core system prompt for the AI chatbot is configured.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:13", "visual_context": "The user clicks on the 'AI Agent' node, opening its configuration panel."}, {"step_number": 6, "title": "Locate System Message Field", "description": "Within the 'AI Agent' node's parameters, find the 'System Message' field. This is where the detailed instructions for the AI's behavior are input.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:16", "visual_context": "The 'System Message' field is highlighted in the 'AI Agent' node's configuration."}, {"step_number": 7, "title": "View Full System Prompt", "description": "Click on 'Fixed Expression' next to the 'System Message' field to open a larger editor window, allowing for a full view and easier editing of the prompt.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:20", "visual_context": "A new window opens, displaying the entire system prompt text with syntax highlighting."}, {"step_number": 8, "title": "Understand Prompt Structure with XML-like Tags", "description": "Observe how the system prompt is divided into distinct sections using XML-like tags (e.g., `<identity>`, `<company_identity>`, `<goal>`, `<context>`). These tags help the AI model understand and process each part of the instruction more effectively.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:30", "visual_context": "The prompt text shows sections enclosed in tags like `<identity>...</identity>`."}, {"step_number": 9, "title": "Observe Dynamic Context Variables", "description": "In the `<context>` section of the prompt, identify variables (e.g., `{{$webhook.item.json.body.full_name}}`, `{{$webhook.item.json.account.timezone}}`) that dynamically pull information from the webhook or other n8n nodes. These variables provide real-time, personalized context to the AI.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:28", "visual_context": "The prompt text displays variables in green, showing their dynamic nature."}, {"step_number": 10, "title": "Add Custom Fields to Context", "description": "To add more specific context, drag and drop custom fields from the 'Variables and context' panel (e.g., 'Company Type' from a survey answer) into the `<context>` section of the prompt. This allows the AI to leverage additional contact-specific information.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:40", "visual_context": "The user drags 'Company Type' from the left panel into the 'Survey answers' part of the prompt's context."}, {"step_number": 11, "title": "Add Conditional Context Based on User Replies", "description": "To provide the AI with specific instructions based on user input, add natural language conditional statements within the `<context>` section. For example, 'If the user replies with the first message \"90 days\" then it means they came from Instagram and they are interested in the 90 day program.' This helps the AI understand user intent and tailor its responses.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:50", "visual_context": "The user types a conditional statement into the context section of the prompt."}, {"step_number": 12, "title": "Understand Token Limits for Prompts", "description": "Be aware that AI prompts are measured in 'tokens'. Keeping the prompt concise (ideally between 10,000 to 15,000 tokens) is important for cost-efficiency and model performance. The less tokens used, the cheaper it is to run the bot.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "08:10", "visual_context": "The speaker highlights the concept of tokens and their impact on cost and performance."}, {"step_number": 13, "title": "Use KoalaChat Tokenizer to Count Tokens", "description": "To check the token count of your prompt, copy the entire prompt text and paste it into the KoalaChat GPT-4 and GPT-3.5 Tokenizer tool. This tool will display the total number of tokens, characters, and words.", "url": "https://koalachat.sh/tools/free-gpt-tokenizer", "input_field": null, "uses_variable": null, "timestamp": "08:31", "visual_context": "The user navigates to the KoalaChat tokenizer website, pastes the prompt, and the token count is displayed."}, {"step_number": 14, "title": "Review LLM Usage Price Comparison", "description": "Examine the 'LLM Usage Price Comparison' section in the n8n workflow. This section compares the cost per lead for different AI models (e.g., Claude 4.5 Sonnet vs. Gemini 1.5 Pro) based on a 10k token prompt size and an average of 12 messages per lead. Note that models with prompt caching (like Gemini) can be significantly cheaper.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "09:18", "visual_context": "The n8n workflow displays a blue box with 'LLM Usage Price Comparison' details."}, {"step_number": 15, "title": "Understand Main and Fallback AI Models", "description": "In the n8n workflow, observe the 'AI Agent' node connected to two different AI models: 'Anthropic Chat Model' (main) and 'Google Gemini Chat Model' (fallback). The main model is typically preferred for its human-like conversational style, while the fallback model provides a cost-effective alternative, especially with features like prompt caching.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "09:30", "visual_context": "The 'AI Agent' node is connected to 'Anthropic Chat Model' and 'Google Gemini Chat Model' nodes."}, {"step_number": 16, "title": "Understand Vector Database for Extended Knowledge", "description": "For information that exceeds the token limits of the main system prompt (e.g., more than 10,000-15,000 tokens), a 'Vector Database' is used. This database stores large amounts of data, which the AI can query as needed, preventing the main prompt from becoming too long and expensive.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "11:26", "visual_context": "A 'Vector Database Setup' section is visible in the n8n workflow, showing 'Load Data Flow' and 'Retriever Flow' components."}, {"step_number": 17, "title": "Review DND Contact Tool", "description": "Examine the 'dnd_contact_tool' connected to the 'AI Agent' node. This tool is an API call to HighLevel, designed to manage contact preferences. Its description tells the AI to use it if the user requests not to be messaged more than two times, ensuring compliance and a polite response.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "11:59", "visual_context": "The 'dnd_contact_tool' node's configuration panel is open, showing its description and API call details."}, {"step_number": 18, "title": "Review Future Follow-up Tool", "description": "Examine the 'future_follow_up_tool'. This tool is an API call to HighLevel that books a future follow-up appointment in the AI follow-up calendar when the user wants to be contacted at a later date. The description instructs the AI to confirm the date with the user before using the tool.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "12:54", "visual_context": "The 'future_follow_up_tool' node's configuration panel is open, showing its description and API call details."}, {"step_number": 19, "title": "Review Get Calendar Slots Tool", "description": "Examine the 'get_calendar_slots_tool'. This tool is an API call to HighLevel that retrieves available calendar slots. The description instructs the AI to always use this tool first to find available appointment slots before booking an appointment.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "13:03", "visual_context": "The 'get_calendar_slots_tool' node's configuration panel is open, showing its description and API call details."}, {"step_number": 20, "title": "Review Book Appointment Tool", "description": "Examine the 'book_appointment_tool'. This tool is an API call to HighLevel that books appointments in the calendar. The description instructs the AI to always use this tool after using the 'get_calendar_slots_tool' and only book on available slots.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "13:23", "visual_context": "The 'book_appointment_tool' node's configuration panel is open, showing its description and API call details."}, {"step_number": 21, "title": "Review Human Escalation Tool", "description": "Examine the 'human_escalation_tool'. This tool is an API call to HighLevel that escalates the conversation to a human when needed. The description specifies that it should be used when the AI cannot resolve a problem or lacks the necessary tools for a user's request.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "13:39", "visual_context": "The 'human_escalation_tool' node's configuration panel is open, showing its description and API call details."}, {"step_number": 22, "title": "Remove Unused Booking Tools", "description": "If your AI chatbot does not require booking functionalities, you can remove the 'future_follow_up_tool', 'get_calendar_slots_tool', and 'book_appointment_tool' nodes from the workflow. This simplifies the AI's capabilities and reduces unnecessary processing.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "13:28", "visual_context": "The speaker highlights the booking-related tools and mentions they can be removed if not needed."}], "variables_summary": [{"variable_name": "n8nRootPassword", "label": "n8n VPS Root Password", "type": "string", "used_in_future_steps": true}, {"variable_name": "n8nLoginUrl", "label": "n8n Login URL", "type": "string", "used_in_future_steps": true}, {"variable_name": "n8nLicenseKey", "label": "n8n License Key", "type": "string", "used_in_future_steps": true}, {"variable_name": "anthropicApiKey", "label": "Anthropic API Key", "type": "string", "used_in_future_steps": true}, {"variable_name": "geminiApiKey", "label": "Gemini API Key", "type": "string", "used_in_future_steps": true}, {"variable_name": "openaiApiKey", "label": "OpenAI API Key", "type": "string", "used_in_future_steps": true}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod6-les5"});
loadSop('m6_06', {"title": "Setup AI Chatbot Prompt Forge in Claude", "description": "This SOP guides you through setting up the AI Chatbot Prompt Forge agent in Claude, which helps generate AI chatbot system prompts. It covers creating a new project, adding the system instructions, and demonstrating how to use it with client onboarding documents and sales scripts to generate a comprehensive chatbot prompt.", "estimated_time": "15 minutes", "steps": [{"step_number": 1, "title": "Access Claude Projects", "description": "Navigate to the Claude AI projects page. This is where you will manage your AI agents (projects).", "url": "https://claude.ai/projects", "input_field": null, "uses_variable": "anthropicApiKey", "timestamp": "00:13", "visual_context": "Browser showing the Claude projects page with a list of existing projects."}, {"step_number": 2, "title": "Create a New Project", "description": "Click on the 'New project' button to start creating your AI Chatbot Prompt Forge agent.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:49", "visual_context": "Claude projects page, user clicks '+ New project' button."}, {"step_number": 3, "title": "Name Your Project", "description": "In the 'Name your project' field, enter 'AI Chatbot Prompt Forge'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:51", "visual_context": "Modal 'Create a personal project' with input fields for name and description."}, {"step_number": 4, "title": "Describe Your Project", "description": "In the description field, enter 'Helps you generate AI chatbot system prompts'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:57", "visual_context": "Modal 'Create a personal project' with input fields for name and description."}, {"step_number": 5, "title": "Confirm Project Creation", "description": "Click 'Create project' to finalize the creation of your new AI agent.", "url": null, "input_field": null, "uses_variable": null, " loadSop('m6_07', {"title": "Testing and Optimizing Chatbot Prompts using Claude Console Workbench and Prompt Forge", "description": "This SOP outlines the process of testing and optimizing a chatbot system prompt using Anthropic's Claude Console Workbench and the 'Chatbot Prompt Forge' tool. It covers setting up the environment, running test conversations, and analyzing an audit report to identify and address structural and logical issues within the prompt.", "estimated_time": "30 minutes", "steps": [{"step_number": 1, "title": "Access Testing Protocol", "description": "After generating your chatbot prompt, locate and download the provided testing protocol document. This document contains a structured testing plan to verify the AI chatbot's functionality.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "Screen showing a 'Chatbot Prompt Roofing Chatbot Generation' interface with a 'Testing Protocol Summary' table and a 'Download' button for the testing protocol."}, {"step_number": 2, "title": "Open Claude Console Workbench", "description": "Navigate to the Anthropic Workbench, which is used for testing and optimizing system prompts. You can find the link in the course materials.", "url": "https://console.anthropic.com/workbench", "input_field": null, "uses_variable": null, "timestamp": "00:43", "visual_context": "Screen showing 'Copy My AI Agency' course content with a link to 'console.anthropic.com/workbench'."}, {"step_number": 3, "title": "Log in to Claude Console", "description": "Log in to the Claude Console using the same email associated with your Claude API key.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:51", "visual_context": "Claude Console login screen."}, {"step_number": 4, "title": "Configure Workbench Model Settings", "description": "Once in the Workbench, ensure the correct model is selected and the temperature is set appropriately for consistent responses. Click on the 'Model' dropdown, select 'Claude-sonnet-4-0-20230929', and set the 'Temperature' to '0.7'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:10", "visual_context": "Claude Console Workbench interface, showing 'Model' settings on the right sidebar with 'Claude-sonnet-4-0-20230929' selected and 'Temperature' at 0.7."}, {"step_number": 5, "title": "Paste System Prompt", "description": "Copy your chatbot's system prompt (e.g., from a Google Doc or the prompt generation tool) and paste it into the 'System Prompt' text area in the Workbench.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:20", "visual_context": "Screen showing a Google Doc with the system prompt and the Claude Console Workbench with the 'System Prompt' input field."}, {"step_number": 6, "title": "Initiate Test Conversation", "description": "Enter your first user message (e.g., 'Hi') in the 'User' input field and click the 'Run' button to get the AI's initial response.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:29", "visual_context": "Claude Console Workbench with 'Hi' entered in the 'User' field and the 'Run' button highlighted."}, {"step_number": 7, "title": "Handle Prompt Variables (if any)", "description": "If your system prompt includes variables (e.g., `{{today.weekday.long}}`, `{{time}}`), the Workbench will prompt you to enter values for these variables before running the prompt. Input the appropriate values (e.g., 'Wednesday', '5 PM').", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:40", "visual_context": "Workbench 'Test Case' sidebar showing input fields for variables like '{{today.weekday.long}}' and '{{time}}'."}, {"step_number": 8, "title": "Continue Conversation", "description": "To continue the conversation, click 'Add to conversation' below the AI's response. This will add the previous user input and AI response to the conversation history. Then, enter your next user message in the new 'User' input field and click 'Run'. Repeat this process to follow your testing protocol.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:45", "visual_context": "Workbench showing a conversation history and a new 'User' input field with 'Add to conversation' button."}, {"step_number": 9, "title": "Restart Conversation", "description": "To start a new test scenario, you can delete previous messages by clicking the trash can icon next to each message or by clearing the 'System Prompt' and re-pasting it.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:00", "visual_context": "Workbench showing options to delete messages or clear the prompt."}, {"step_number": 10, "title": "Generate Audit Report with Prompt Forge", "description": "If you encounter issues or want to optimize your prompt, use the 'Chatbot Prompt Forge' tool. Input a command like 'double check the prompt for ambiguity and make sure the building blocks are correct.' to generate an audit report.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "09:10", "visual_context": "Chatbot Prompt Forge interface with a text input field and a generated 'AUDIT REPORT' showing critical structural issues."}, {"step_number": 11, "title": "Review Audit Report for Structural Issues", "description": "Examine the 'AUDIT REPORT' generated by Prompt Forge. Look for 'Missing Core Sections' (e.g., 'no identity', 'no company_identity'), 'Broken Moving URLs' (incorrect or missing URLs), 'Broken XML Tag', 'Duplicate Section', and 'Incomplete Content'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "09:40", "visual_context": "Audit report showing sections like 'Missing Core Sections', 'Broken Moving URLs', 'Broken XML Tag', 'Duplicate Section', 'Incomplete Content'."}, {"step_number": 12, "title": "Review Audit Report for Ambiguities and Contradictions", "description": "Check the 'AMBIGUITY / CONTRADICTIONS' section for issues like 'Vague Routing Logic' or conflicting instructions. For example, ensure that if a user indicates they have submitted an N-400 application, the bot offers both Skool and ECA store options, rather than defaulting to one.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "10:45", "visual_context": "Audit report showing 'AMBIGUITY / CONTRADICTIONS' and 'Vague Routing Logic' sections."}, {"step_number": 13, "title": "Apply Fixes to System Prompt", "description": "Based on the audit report, make necessary corrections to your system prompt. This might involve adding missing sections (like identity or company info), correcting URLs, or refining routing logic to ensure desired behavior.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "13:45", "visual_context": "Speaker copying and pasting an 'Identity' block into the system prompt in the Workbench."}, {"step_number": 14, "title": "Re-test the Optimized Prompt", "description": "After applying fixes, repeat the testing process (Steps 6-9) in the Claude Console Workbench to verify that the issues have been resolved and the chatbot behaves as intended according to your testing protocol.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "14:29", "visual_context": "Speaker initiating a new test conversation in the Workbench after making changes to the prompt."}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod6-les7"});
loadSop('m6_08', {"title": "Update Miriam System Prompt for Routing Logic and Missing Information", "description": "This SOP outlines the steps to update the Miriam System Prompt to correctly handle routing logic based on N-400 application submission status and user location, as well as to include missing company identity information and fix broken URLs. The goal is to provide users with appropriate options (Skool or ECA store) and ensure the chatbot asks all necessary qualification questions.", "estimated_time": "15 minutes", "steps": [{"step_number": 1, "title": "Initiate Prompt Update in Canvas", "description": "In the 'Chatbot Prompt Forge' interface, type the command to add the system prompt to the canvas for editing. This will allow for direct modification of the prompt's content.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00"}, {"step_number": 2, "title": "Review Current System Prompt and Audit Report", "description": "After the AI tool extracts the system prompt, review the displayed content and the generated 'Audit Report'. Pay close attention to sections flagged under 'Critical Structural Issues' (Missing Core Sections, Broken/Missing URLs, Broken XML Tag, Duplicate Section, Incomplete Content, Ambiguity/Contradictions) and 'Missing Framework Elements'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:14"}, {"step_number": 3, "title": "Identify Missing Identity and Company Info", "description": "Locate the 'Identity' and 'Company Identity' sections in the original Google Docs document. These sections contain crucial information about Miriam's role as a customer support agent for 'English and Citizenship Academy' and the academy's operational details.", "url": "https://docs.google.com/document/d/16b-4509-b08e-4032-9222-765c01d4d/edit", "input_field": null, "uses_variable": null, "timestamp": "0:50"}, {"step_number": 4, "title": "Add Missing Identity and Company Info to Prompt", "description": "Copy the 'Identity' and 'Company Identity' blocks from the Google Docs and paste them into the AI tool's chat interface. This ensures the prompt has the necessary foundational information.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "9:40"}, {"step_number": 5, "title": "Correct Broken/Missing URLs", "description": "Identify and correct any broken or missing URLs mentioned in the audit report. Ensure all URLs are complete and correctly formatted (e.g., include '.com' or appropriate domain extensions).", "url": null, "input_field": null, "uses_variable": null, "timestamp": "6:00"}, {"step_number": 6, "title": "Adjust Routing Logic for N-400 Application Submission", "description": "Modify the routing logic to ensure that if a user indicates they have submitted the N-400 application, Miriam offers both the 'Skool' (online community) and 'ECA store' (in-person services) options, allowing the user to choose. This overrides the previous logic that automatically sent users to 'Skool' if the application was submitted, regardless of their location.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "8:05"}, {"step_number": 7, "title": "Ensure Initial Qualification Questions are Asked", "description": "Verify that the prompt is configured to always ask the first three qualification questions: residency, age, and English level, regardless of whether the N-400 application has been submitted. This ensures a consistent and comfortable conversation flow for users.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "3:05"}, {"step_number": 8, "title": "Add TikTok Live Opt-in Routing", "description": "Integrate a new routing rule: if the user sends the message '90 dias' as the first or second message, Miriam should interpret this as coming from a TikTok Live event and route them to the free training landing page. This is a one-liner addition to the prompt's context.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "23:00"}, {"step_number": 9, "title": "Test the Updated Prompt in Console", "description": "Use the console to test the updated prompt with various scenarios, including:\n- User asks for 'Info clases de ciudadania'.\n- User provides residency, age, and English level.\n- User indicates 'no' to N-400 application submission.\n- User provides 'Houston' as city/state.\n- User asks about 'precio'.\n- User asks about 'clases privadas'.\n- User asks about 'clases de ingles'.\n- User asks about studying 'solamente en la casa'.\n- User asks about buying 'el libro solo'.\n- User asks about 'ubicacion'.\n- User asks to 'hablar' (speak).\n- User indicates 'yes' to N-400 application submission.\n- User provides 'Miami' as city/state.\n- User sends '90 dias' as the first message.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "10:28"}, {"step_number": 10, "title": "Verify Correct Routing and Responses", "description": "During testing, ensure that Miriam:\n- Asks all initial qualification questions (residency, age, English level).\n- Provides appropriate options (Skool or ECA store) when N-400 is submitted, allowing user choice.\n- Correctly routes users to the free training link when '90 dias' is mentioned.\n- Handles pricing, private classes, English classes, and study-at-home inquiries as expected.\n- Provides correct location information.\n- Offers a discovery call link when requested, but avoids constant phone calls.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "10:28"}], "variables_summary": [{"variable_name": "anthropicApiKey", "label": "Anthropic API Key", "type": "credential", "used_in_future_steps": false}, {"variable_name": "geminiApiKey", "label": "Gemini API Key", "type": "credential", "used_in_future_steps": false}, {"variable_name": "openaiApiKey", "label": "OpenAI API Key", "type": "credential", "used_in_future_steps": false}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod6-les8"});
loadSop('m6_09', {"title": "How Vector Databases Enable Retrieval-Augmented Generation (RAG)", "description": "This SOP explains how vector databases work and enable Retrieval-Augmented Generation (RAG) for AI agents, allowing them to access and retrieve relevant information from a vast knowledge base without having to store it directly in their main prompt. It covers the process from converting data into vectors, storing and indexing them, semantic search and retrieval, to augmenting the prompt with retrieved chunks.", "estimated_time": "05 minutes", "steps": [{"step_number": 1, "title": "Understand Data Conversion to Vectors", "description": "The first step in the RAG process is converting raw data, such as documents or images, into numerical vectors. This is done using an 'Embedding Model'. For documents, like a Q&A database, the model transforms the text into a series of numerical values (vectors) that represent the meaning of the data, rather than just keywords. This allows for semantic search, which is more effective than traditional keyword-based search.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:45", "visual_context": "Diagram showing 'Document' and 'Image' feeding into an 'Embedding Model' which outputs 'Vector Embedding' (numerical values like [0.45, -0.12, 0.98]). Text below states: 'Data is transformed into numerical vectors representing meaning.'", "warnings": null}, {"step_number": 2, "title": "Store and Index Vectors in a Vector Database", "description": "Once the data has been converted into numerical vectors by the embedding model, these vectors are then stored and indexed in a 'Vector Database'. An indexing algorithm, such as HNSW (Hierarchical Navigable Small World), is used to organize these vectors for fast and efficient similarity search. This database acts as an external knowledge base for the AI.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:43", "visual_context": "Diagram showing 'Vector Embedding' flowing into 'Vector Database' with scattered points, then through an 'Indexing Algorithm (e.g., HNSW)' which organizes the points. Text below states: 'Vectors are stored and indexed for fast similarity search.'", "warnings": null}, {"step_number": 3, "title": "Perform Semantic Search and Retrieval", "description": "When a user submits a query to the AI (e.g., 'How does climate change impact polar bears?'), the query itself is first processed by the same 'Embedding Model' to convert it into a 'Query Vector'. This query vector is then used to perform a semantic search within the 'Vector Database'. The indexing algorithm (ANN Search) quickly identifies and retrieves the 'Top Matches'\u2014vectors from the database whose meanings are most similar to the query vector.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:04", "visual_context": "Diagram showing 'User Query' feeding into 'Embedding Model' to create 'Query Vector' (numerical values like [0.42, -0.15, 0.93]). This vector then queries the 'Vector Database' using 'Top Matches (ANN Search)' to find relevant data points. Text below states: 'The query is vectorized to find the most relevant data.'", "warnings": null}, {"step_number": 4, "title": "Retrieve Chunks and Augment Prompt", "description": "After the semantic search identifies the most relevant data, the corresponding 'Retrieved Chunks' (e.g., 'Polar bear habitats are shrinking due to melting ice.', 'Sea ice loss impacts hunting.', 'Warming temperatures threaten survival.') are pulled from the vector database. These chunks are then appended to the user's original query, creating a 'Final Augmented Prompt' for the Large Language Model (LLM). This augmented prompt provides the LLM with specific, relevant context, allowing it to generate a more comprehensive, accurate, and informed answer without having to store all this information internally, which would be expensive and could confuse the model.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:54", "visual_context": "Diagram showing 'Top Matches' leading to 'Retrieved Chunks' (bullet points with relevant information). These chunks are combined with the 'User Query' to form a 'Final Augmented Prompt (for LLM)'. Text below states: 'Relevant chunks are retrieved and appended to the user's query to create a comprehensive prompt.'", "warnings": null}, {"step_number": 5, "title": "Visualize Text to Vector Conversion", "description": "To further understand the embedding process, consider a simple visual guide: \nStage 1: Input Text (The Sentence) - Raw language is provided to the model, e.g., 'THE CAT SAT ON THE MAT.' \nStage 2: Tokenization & Embedding Model (The Translator) - Words are broken down into tokens (e.g., 'THE', 'CAT', 'SAT', 'ON', 'THE', 'MAT') and processed by the AI/ML embedding model. \nStage 3: Vector Generation (The Numerical 'Meaning') - The model assigns a unique list of numbers (a vector) to capture each word's meaning. For example, 'CAT' might become [0.1, 0.8, -0.5]. \nStage 4: The Final Text Vector (The Full Thought) - The individual word vectors are combined to represent the entire sentence's meaning in a high-dimensional space, creating a single 'Final Text Vector' (e.g., [0.1, 0.8, -0.5, -0.2, 0.3, 0.1, 0.5, -0.1, 0.9, ...]). This final vector encapsulates the full thought or meaning of the input text, making it easier for the AI to match it with other semantically similar vectors.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:24", "visual_context": "Diagram titled 'HOW TEXT IS CONVERTED TO VECTORS: A SIMPLE VISUAL GUIDE' showing four stages: 'INPUT TEXT (The Sentence)', 'TOKENIZATION & EMBEDDING MODEL (The Translator)', 'VECTOR GENERATION (The Numerical 'Meaning')', and 'THE FINAL TEXT VECTOR (The Full Thought)'. It illustrates 'THE CAT SAT ON THE MAT.' being broken down, processed by an 'EMBEDDING MODEL (AI/ML)', generating vectors for individual words, and finally combining them into a 'FINAL TEXT VECTOR'.", "warnings": null}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod6-les9"});
loadSop('m6_10', {"title": "Supabase Vector Database (RAG) - Client Setup", "description": "This SOP outlines the detailed steps to set up a Supabase Vector Database for a client using n8n, including creating Google Cloud Service Account credentials, enabling necessary Google APIs, configuring Supabase, and integrating it with n8n. It also covers how to populate the database with data from a Google Sheet and test the AI agent's ability to retrieve information from the vector database.", "estimated_time": "45 minutes", "steps": [{"step_number": 1, "title": "Create Google Service Account", "description": "Visit the Google Cloud Console to create a new Google Service Account. This account will be used to reliably connect n8n to Google Sheets without credential expiration issues.", "url": "https://console.cloud.google.com", "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "n8n workflow with setup instructions, highlighting the Google Cloud Console URL.", "warnings": null}, {"step_number": 2, "title": "Log in to Google Cloud Console", "description": "Enter your Gmail account password to log in to the Google Cloud Platform.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:38", "visual_context": "Google Cloud Platform login screen.", "warnings": null}, {"step_number": 3, "title": "Create a New Google Cloud Project", "description": "If you don't have an existing project, click 'New Project' in the Google Cloud Console. Give it a descriptive name (e.g., 'n8n-cmaa') and click 'Create'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:48", "visual_context": "Google Cloud 'Select a resource' dialog, then 'New Project' form.", "warnings": null}, {"step_number": 4, "title": "Enable Google Sheets API", "description": "In the Google Cloud search bar, type 'Google Sheets API' and select it from the results. Click 'Enable' to activate the API for your project.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:10", "visual_context": "Google Cloud search bar, then 'Google Sheets API' product details page with an 'Enable' button.", "warnings": null}, {"step_number": 5, "title": "Enable Google Drive API", "description": "In the Google Cloud search bar, type 'Google Drive API' and select it from the results. Click 'Enable' to activate the API for your project.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:33", "visual_context": "Google Cloud search bar, then 'Google Drive API' product details page with an 'Enable' button.", "warnings": null}, {"step_number": 6, "title": "Create a Service Account", "description": "In the left sidebar, navigate to 'IAM & Admin' -> 'Service Accounts'. Click '+ CREATE SERVICE ACCOUNT'. Provide a name for the service account (e.g., 'n8n-cmaa'). The Service Account ID will auto-fill. Click 'Create and Continue', then 'Done'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:47", "visual_context": "Google Cloud navigation menu, 'Service Accounts' page, then 'Create service account' form.", "warnings": null}, {"step_number": 7, "title": "Generate Service Account Key (JSON)", "description": "Click on the newly created service account's email address. Navigate to the 'KEYS' tab. Click 'ADD KEY' -> 'Create new key'. Select 'JSON' as the key type and click 'Create'. A JSON file containing the private key will be downloaded to your computer. Keep this file safe.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:23", "visual_context": "Service account details page, 'KEYS' tab, 'Create private key' dialog with JSON selected.", "warnings": "If you encounter an error during key creation, proceed to the next step to resolve it."}, {"step_number": 8, "title": "Troubleshoot: Disable Service Account Key Creation Policy", "description": "If key generation failed, go to your Google Cloud organization (not the project). Navigate to 'IAM & Admin' -> 'IAM'. Click on your user email, then 'EDIT PRINCIPAL'. Add the role 'Organization Policy Administrator' and save. Then, go to 'Organization Policies', search for 'disable service account key creation', click on it, click 'MANAGE POLICY', toggle 'Enforcement' to 'OFF', and save. After this, retry Step 7.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:34", "visual_context": "Google Cloud 'Select a resource' dialog, 'IAM' page, 'Edit access to organization' dialog, 'Organization Policies' page, and 'Edit policy' dialog.", "warnings": "This step is only necessary if you encountered an error during key generation."}, {"step_number": 9, "title": "Extract Private Key and Client Email", "description": "Open the downloaded JSON key file using a text editor (e.g., VS Code). Copy the entire string value of the 'private_key' field (including '-----BEGIN PRIVATE KEY-----' and '-----END PRIVATE KEY-----') and the string value of the 'client_email' field.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:17", "visual_context": "JSON file open in a text editor, highlighting 'private_key' and 'client_email' fields.", "warnings": "Ensure you copy the entire private key string, including the BEGIN and END markers, and the quotation marks."}, {"step_number": 10, "title": "Add Google Service Account to n8n Credentials", "description": "In n8n, go to 'Credentials' (Overview -> Credentials). Click 'Create credential'. Search for 'Google Service Account API' and select it. Paste the copied 'client_email' into the 'Service Account Email' field and the 'private_key' into the 'Private Key' field. Click 'Save'. Rename the credential to something descriptive (e.g., 'n8n-cmaa@black-umbrella-447517.iam.gserviceaccount.com').", "url": null, "input_field": {"variable_name": "googleServiceAccountCredential", "label": "Google Service Account Credential Name", "type": "string"}, "uses_variable": null, "timestamp": "05:03", "visual_context": "n8n 'Credentials' page, 'Add new credential' dialog, 'Google Service Account API' form with email and private key fields.", "warnings": null}, {"step_number": 11, "title": "Create Supabase Account", "description": "Visit 'https://supabase.com' and click 'Start your project' or 'Sign up'. Enter your email and password to create a new account. Confirm your email address when prompted.", "url": "https://supabase.com", "input_field": null, "uses_variable": null, "timestamp": "06:09", "visual_context": "Supabase homepage, then sign-up/login screen, and email confirmation screen.", "warnings": null}, {"step_number": 12, "title": "Create Supabase Organization and Project", "description": "After confirming your email, create a new organization (e.g., 'Copy My AI Agency'). Then, create a new project within the organization. Provide a project name (e.g., 'CMAA's Project'), set a strong database password, and select a region. Click 'Create new project'.", "url": null, "input_field": {"variable_name": "supabaseProjectID", "label": "Supabase Project ID", "type": "string"}, "uses_variable": null, "timestamp": "07:01", "visual_context": "Supabase 'Create a new organization' form, then 'Create a new project' form.", "warnings": "Supabase offers a free tier that is sufficient for multiple vector databases, making it a cost-effective alternative to other vector database providers."}, {"step_number": 13, "title": "Add Supabase API Key to n8n Credentials", "description": "In Supabase, navigate to 'Project Settings' -> 'API Keys'. Copy the 'Project ID' (from the URL, it's the string between 'project/' and '/settings') and the 'service_role' secret key. In n8n, go to 'Credentials', click 'Create credential', search for 'Supabase API' and select it. Paste the copied 'Project ID' into the 'Host' field (prefixed with 'https://' and suffixed with '.supabase.co') and the 'service_role' secret into the 'Service Role Secret' field. Click 'Save'. Rename the credential to something descriptive (e.g., 'CMAA Supabase').", "url": null, "input_field": {"variable_name": "supabaseCredential", "label": "Supabase Credential Name", "type": "string"}, "uses_variable": null, "timestamp": "08:09", "visual_context": "Supabase project dashboard, 'Project Settings' -> 'API Keys' page, highlighting Project ID in URL and 'service_role' secret. n8n 'Add new credential' dialog for Supabase API.", "warnings": "The 'Host' field in n8n should be formatted as `https://<Project ID>.supabase.co`."}, {"step_number": 14, "title": "Duplicate Vector Database Google Sheet Template", "description": "Open the provided Google Sheet template. Go to 'File' -> 'Make a copy'. Rename the copy to include your client's name (e.g., 'Vector Database Template - Client Name').", "url": "https://docs.google.com/spreadsheets/d/1lcDnvwB9N62s-Uq1IeXDpJLgw_ItGFGvQzYP4EN4ZVk/edit?usp=sharing", "input_field": null, "uses_variable": null, "timestamp": "09:59", "visual_context": "Google Sheet template, 'File' menu, 'Make a copy' dialog.", "warnings": "The template has a formula in the 'Content' column that concatenates 'Question' and 'Answer' to create a single vector for embedding."}, {"step_number": 15, "title": "Share Google Sheet with Service Account", "description": "In your duplicated Google Sheet, click the 'Share' button. Add the Google Service Account email (from Step 10) as an 'Editor'. Click 'Send'.", "url": null, "input_field": null, "uses_variable": "googleServiceAccountCredential", "timestamp": "11:20", "visual_context": "Google Sheet 'Share' dialog, entering service account email and setting permission to 'Editor'.", "warnings": null}, {"step_number": 16, "title": "Create Supabase Database Table and Functions", "description": "In n8n, copy the provided Supabase Database SQL code. In Supabase, navigate to 'SQL Editor'. Paste the copied SQL code into the editor. Ensure the `base_name_text` variable (line 3) is set to 'questions_and_answers_<client_name>' (e.g., 'questions_and_answers_client'). Cli
