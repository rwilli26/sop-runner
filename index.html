le": "Scrape Custom Field IDs", "description": "After execution, double-click the 'Scrape IDs' node. In the 'OUTPUT' panel (right side), copy the values for 'company_type_id' and 'demo_context_id'. These are the custom field IDs needed for the next step.", "url": null, "input_field": {"variable_name": "companyTypeId", "label": "Company Type Custom Field ID", "type": "string"}, "uses_variable": null, "timestamp": "01:13", "visual_context": "n8n 'Scrape IDs' node output, copying custom field IDs."}, {"step_number": 9, "title": "Configure 'Edit Fields' Node", "description": "Double-click the 'Edit Fields' node in the n8n workflow. In its parameters:\n1.  Paste your `ghlLocationId` into the 'Value' field for 'location_id'.\n2.  Paste your `ghlPrivateIntegrationKey` into the 'Value' field for 'private_key'.\n3.  Paste the copied 'demo_context_id' into the 'Value' field for 'demo_context_id'.\n4.  Paste the copied 'company_type_id' into the 'Value' field for 'company_type_id'.", "url": null, "input_field": {"variable_name": "demoContextId", "label": "Demo Context Custom Field ID", "type": "string"}, "uses_variable": ["ghlLocationId", "ghlPrivateIntegrationKey", "companyTypeId"], "timestamp": "01:19", "visual_context": "n8n 'Edit Fields' node parameters, pasting all collected IDs and keys."}, {"step_number": 10, "title": "Save and Publish Live Chat Workflow", "description": "Click 'Save' and then 'Publish' in the top right corner of the n8n editor. Provide a version name (e.g., 'Version 1.0') and click 'Publish'. If you encounter a 'Conflicting Chat Path' error, simply click 'Publish' again; it indicates another workflow might be using the same trigger, but it will still publish correctly.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:44", "visual_context": "n8n workflow editor, saving and publishing the workflow, showing a potential error message."}, {"step_number": 11, "title": "Navigate to 'Send Magic Link V3' Workflow in GHL", "description": "In GoHighLevel, go to 'Automation' -> 'Workflows'. Navigate to 'AI Agency' -> 'AI Demo Magic Automations' and open the 'Send Magic Link V3' workflow.", "url": "https://crm.blackumbrella.app/v2/location/SCA.net/workflows/701/builder", "input_field": null, "uses_variable": null, "timestamp": "02:01", "visual_context": "GoHighLevel Automation workflow list, opening 'Send Magic Link V3'."}, {"step_number": 12, "title": "Update Website URL in Live Chat Demo Email", "description": "In the 'Send Magic Link V3' workflow, locate the 'Email: Send Live Chat Demo Link' action (under 'Live Chat Demo' branch). Click to edit it. In the email body, find the placeholder 'https://yourwebsite.com/ai-live-chat?uid={{contact.email}}' and replace 'https://yourwebsite.com' with the actual URL of your GHL funnel page where the live chat widget will be embedded. Ensure the '/ai-live-chat?uid={{contact.email}}' part remains intact.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:21", "visual_context": "GoHighLevel workflow editor, editing email action, updating website URL in the email body."}, {"step_number": 13, "title": "Save 'Send Magic Link V3' Workflow", "description": "Click 'Save Action' at the bottom right of the email editor, then click 'Save' in the top right corner of the workflow builder to save the changes.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:04", "visual_context": "GoHighLevel workflow editor, saving the email action and the workflow."}, {"step_number": 14, "title": "Navigate to 'AI Agency v4' Funnel", "description": "In GoHighLevel, go to 'Sites' -> 'Funnels'. Open the 'AI Agency v4' funnel.", "url": "https://crm.blackumbrella.app/v2/location/SCA.net/funnels/AI-Agency-v4", "input_field": null, "uses_variable": null, "timestamp": "03:09", "visual_context": "GoHighLevel Funnels list, opening 'AI Agency v4'."}, {"step_number": 15, "title": "Edit 'LIVE CHAT AI Live Chat' Funnel Step", "description": "Within the 'AI Agency v4' funnel, locate the 'LIVE CHAT AI Live Chat' step. Click the 'Edit' button (pencil icon) to open the page builder.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:30", "visual_context": "GoHighLevel funnel steps list, editing 'LIVE CHAT AI Live Chat' page."}, {"step_number": 16, "title": "Open Custom Code Editor", "description": "On the 'LIVE CHAT AI Live Chat' page, locate the 'Custom HTML/Javascript' element. Click on it, then click 'Open Code Editor' in the right-hand panel.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:35", "visual_context": "GoHighLevel page builder, opening custom code editor for the chat widget."}, {"step_number": 17, "title": "Retrieve Live Chat Webhook URL", "description": "Return to your n8n instance and open the 'Live Chat AI Demo [TEMPLATE]' workflow. Double-click the 'When chat message received' node. Copy the 'Chat URL' from the 'Parameters' tab. This is your `liveChatWebhookUrl`.", "url": "https://n8n.cloud.webhook/...", "input_field": {"variable_name": "liveChatWebhookUrl", "label": "Live Chat Webhook URL", "type": "string"}, "uses_variable": null, "timestamp": "04:21", "visual_context": "n8n 'When chat message received' node, copying the Chat URL."}, {"step_number": 18, "title": "Configure Chat Widget Webhook URL", "description": "Back in the GHL custom code editor (from Step 16), scroll down to the `const CONFIG = { ... }` section (around line 787). Locate the `webhookUrl:` field. Replace the existing URL with your copied `liveChatWebhookUrl`. Ensure the URL is enclosed in single quotes and you do not delete the quotes.", "url": null, "input_field": null, "uses_variable": ["liveChatWebhookUrl"], "timestamp": "03:50", "visual_context": "GoHighLevel custom code editor, pasting the webhook URL into the CONFIG section."}, {"step_number": 19, "title": "Save and Publish Live Chat Page", "description": "Click 'Save' in the custom code editor, then click 'Save' and 'Publish' in the top right corner of the GHL page builder.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:47", "visual_context": "GoHighLevel page builder, saving custom code and publishing the page."}, {"step_number": 20, "title": "Navigate to 'Generate Magic Link' Workflow in GHL", "description": "In GoHighLevel, go to 'Automation' -> 'Workflows'. Navigate to 'AI Agency' -> 'NEW Live Chat Demo' and open the '[LIVE CHAT] Generate Magic Link' workflow.", "url": "https://crm.blackumbrella.app/v2/location/SCA.net/workflows/...", "input_field": null, "uses_variable": null, "timestamp": "04:53", "visual_context": "GoHighLevel Automation workflow list, opening '[LIVE CHAT] Generate Magic Link'."}, {"step_number": 21, "title": "Retrieve Magic Link Generator Webhook URL", "description": "Return to your n8n instance and open the 'Magic Link Generator V2 - TEMPLATE' workflow. Double-click the 'Webhook' node. Copy the 'Production URL' from the 'Parameters' tab. This is your `magicLinkGeneratorWebhookUrl`.", "url": "https://n8n.cloud.webhook/...", "input_field": {"variable_name": "magicLinkGeneratorWebhookUrl", "label": "Magic Link Generator Webhook URL", "type": "string"}, "uses_variable": null, "timestamp": "05:10", "visual_context": "n8n 'Webhook' node in 'Magic Link Generator' workflow, copying Production URL."}, {"step_number": 22, "title": "Configure Magic Link Generator Webhook in GHL", "description": "Back in the GHL '[LIVE CHAT] Generate Magic Link' workflow (from Step 20), locate the 'Webhook > Magic Link Generator' action. Click to edit it. In the 'URL' field, replace the placeholder with your copied `magicLinkGeneratorWebhookUrl`.", "url": null, "input_field": null, "uses_variable": ["magicLinkGeneratorWebhookUrl"], "timestamp": "05:05", "visual_context": "GoHighLevel workflow editor, editing webhook action, pasting Magic Link Generator URL."}, {"step_number": 23, "title": "Save 'Generate Magic Link' Workflow", "description": "Click 'Save Action' at the bottom right of the webhook editor, then click 'Save' in the top right corner of the workflow builder to save the changes.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:23", "visual_context": "GoHighLevel workflow editor, saving the webhook action and the workflow."}], "variables_summary": [{"variable_name": "ghlLocationId", "label": "GoHighLevel Location ID", "type": "string", "used_in_future_steps": "Step 6, Step 9"}, {"variable_name": "ghlPrivateIntegrationKey", "label": "GoHighLevel Private Integration Key", "type": "string", "used_in_future_steps": "Step 6, Step 9"}, {"variable_name": "companyTypeId", "label": "Company Type Custom Field ID", "type": "string", "used_in_future_steps": "Step 9"}, {"variable_name": "demoContextId", "label": "Demo Context Custom Field ID", "type": "string", "used_in_future_steps": "Step 9"}, {"variable_name": "liveChatWebhookUrl", "label": "Live Chat Webhook URL", "type": "string", "used_in_future_steps": "Step 18"}, {"variable_name": "magicLinkGeneratorWebhookUrl", "label": "Magic Link Generator Webhook URL", "type": "string", "used_in_future_steps": "Step 22"}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod1-les6"});
loadSop('m1_07', {"title": "AI Voice Demo Agents Setup", "description": "This SOP details the end-to-end setup for the AI Voice Demo Agents, covering configurations in Retell AI, GoHighLevel (GHL), and n8n. It includes importing demo agents, setting up billing and phone numbers in Retell AI, modifying GHL workflows and landing pages, and configuring n8n workflows with GHL integration keys, location IDs, and agent IDs.", "estimated_time": "20 minutes", "steps": [{"step_number": 1, "title": "Open Retell AI Account", "description": "Navigate to the Retell AI website and create a free account. Click on 'Try For Free' and follow the sign-up process.", "url": "https://www.retellai.com/", "input_field": null, "uses_variable": null, "timestamp": "00:05", "visual_context": "Google Docs with setup instructions, then Retell AI website homepage, then Retell AI dashboard showing 'All Agents' section."}, {"step_number": 2, "title": "Delete Existing Template Agents (Optional)", "description": "If there are any pre-loaded template agents on your Retell AI dashboard, click the three dots on the right side of each agent and select 'Delete' to clear the workspace.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:23", "visual_context": "Retell AI dashboard showing 'All Agents' section, empty."}, {"step_number": 3, "title": "Import All 3 Demo Agents", "description": "Locate the provided compressed file 'Voice Demo Agents' from the lesson. Extract the three JSON files inside. On the Retell AI dashboard, click 'Import' (or 'Create an Agent' dropdown then 'Import'), then drag and drop each of the three JSON files ('Orchestrator AI Demo Multi-lingual.json', 'AI Voice Demo Bot (ENG).json', 'AI Voice Demo Bot (ESP).json') one by one into the 'Upload an agent' pop-up. Click 'Save' after each upload.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:30", "visual_context": "Google Docs, Finder window showing 'Voice Demo Agents' folder with three JSON files, Retell AI dashboard with 'Upload an agent' pop-up."}, {"step_number": 4, "title": "Configure Orchestrator AI Demo Multi-lingual Agent Transfers", "description": "After importing, click on the 'Orchestrator AI Demo Multi-lingual' agent. In the workflow builder, locate the 'Agent Transfer Node' connected to 'If the user's reply is in English'. Click on this node, then in the 'Node Settings' panel on the right, select 'AI Voice Demo Bot (ENG)' as the 'Select Agent' and choose 'Latest' for the version. Repeat this process for the 'Agent Transfer Node' connected to 'If the user's reply is in Spanish', selecting 'AI Voice Demo Bot (ESP)' and 'Latest'. Finally, click 'Publish' in the top right corner to save these changes.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:15", "visual_context": "Retell AI workflow builder for 'Orchestrator AI Demo Multi-lingual' agent, showing nodes and 'Node Settings' panel."}, {"step_number": 5, "title": "Configure AI Voice Demo Bot (ESP) Agent Transfer", "description": "Go back to the 'All Agents' list. Click on the 'AI Voice Demo Bot (ESP)' agent. On the right-hand side, under 'Functions', click to expand the 'Functions' section. Click on the 'agent_transfer_english' function. In the 'Agent Transfer' pop-up, select 'AI Voice Demo Bot (ENG)' as the 'Select Agent' and choose 'Latest' for the version. Click 'Update'. Then, click 'Publish' in the top right corner to save these changes.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:44", "visual_context": "Retell AI workflow builder for 'AI Voice Demo Bot (ESP)' agent, showing 'Functions' section and 'Agent Transfer' pop-up."}, {"step_number": 6, "title": "Configure AI Voice Demo Bot (ENG) Agent Transfer", "description": "Go back to the 'All Agents' list. Click on the 'AI Voice Demo Bot (ENG)' agent. On the right-hand side, under 'Functions', click to expand the 'Functions' section. Click on the 'agent_transfer_spanish' function. In the 'Agent Transfer' pop-up, select 'AI Voice Demo Bot (ESP)' as the 'Select Agent' and choose 'Latest' for the version. Click 'Update'. Then, click 'Publish' in the top right corner to save these changes.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:08", "visual_context": "Retell AI workflow builder for 'AI Voice Demo Bot (ENG)' agent, showing 'Functions' section and 'Agent Transfer' pop-up."}, {"step_number": 7, "title": "Add Payment Method to Retell AI", "description": "On the Retell AI dashboard, in the bottom left corner, click on 'Add Payment'. This will redirect you to a Stripe billing page. Enter your credit card details and complete the payment method setup. Once done, click 'Return to Retell AI'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:28", "visual_context": "Retell AI dashboard, then Stripe billing page, then back to Retell AI billing page showing 'Pay As You Go' status."}, {"step_number": 8, "title": "Buy a Phone Number in Retell AI", "description": "On the Retell AI dashboard, navigate to 'Phone Numbers' in the left sidebar. Click the '+' icon to 'Buy New Number'. Select 'Standard ($2/month)' or 'Toll-free ($5/month)' as desired. You can search for numbers by area code (e.g., '786' for Miami). Select a number from the list and click 'Save'.", "url": null, "input_field": {"variable_name": "retellPhoneNumber", "label": "Retell AI Phone Number", "type": "string"}, "uses_variable": null, "timestamp": "02:59", "visual_context": "Retell AI dashboard, 'Phone Numbers' section, 'Buy Phone Number' pop-up with Twilio options."}, {"step_number": 9, "title": "Assign Phone Number to Orchestrator Agent", "description": "After purchasing the number, it will appear in your 'Phone Numbers' list. Click on the newly acquired phone number. In the 'Inbound Call Agent' section, select 'Orchestrator AI Demo Multi-lingual' from the dropdown. You can optionally rename the phone number at the top (e.g., 'AI Agency Demo Number'). The system will automatically save the changes.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:50", "visual_context": "Retell AI 'Phone Numbers' section, details page for the new phone number, 'Inbound Call Agent' dropdown."}, {"step_number": 10, "title": "Modify GHL 'Send Magic Link' Workflow URL", "description": "In your GoHighLevel account, navigate to 'Automation' -> 'Workflows'. Go into the 'AI Agency' folder, then 'AI Demo Magic Automations', and open the 'Send Magic Link' workflow. Locate the 'SMS: Send AI Voice Magic Link' step. In the message body, find the URL starting with 'https://www.blackumbrella.com/magic-demo-landing-ai-voice/'. Replace 'www.blackumbrella.com' with your actual website domain where your landing page is hosted. Ensure the rest of the URL path remains the same. Click 'Save Action' and then 'Save' the workflow.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:50", "visual_context": "Google Docs, GHL Automation -> Workflows, 'Send Magic Link' workflow builder, SMS step with URL field."}, {"step_number": 11, "title": "Copy n8n 'Magic Link Generator' Webhook URL", "description": "In your n8n instance, navigate to the 'Magic Link Generator V2 - TEMPLATE' workflow. Click on the 'Webhook' node (the first node in the workflow). Go to the 'Production URL' tab, copy the entire URL provided. This URL will be used in a GHL workflow.", "url": null, "input_field": {"variable_name": "n8nMagicLinkGeneratorWebhookUrl", "label": "n8n Magic Link Generator Webhook URL", "type": "string"}, "uses_variable": null, "timestamp": "06:05", "visual_context": "n8n workflow builder for 'Magic Link Generator V2 - TEMPLATE', 'Webhook' node settings, 'Production URL' tab."}, {"step_number": 12, "title": "Add n8n Webhook URL to GHL 'AI Voice Generate Magic Link' Workflow", "description": "In your GoHighLevel account, navigate to 'Automation' -> 'Workflows'. Go into the 'AI Agency' folder, then 'NEW AI Voice Demo', and open the '[AI Voice] Generate Magic Link' workflow. Locate the 'Webhook => Magic Link Generator' step. Paste the copied n8n Magic Link Generator Webhook Production URL into the 'URL' field. Click 'Save Action' and then 'Save' the workflow.", "url": null, "input_field": null, "uses_variable": "n8nMagicLinkGeneratorWebhookUrl", "timestamp": "06:30", "visual_context": "GHL Automation -> Workflows, '[AI Voice] Generate Magic Link' workflow builder, 'Webhook' step settings."}, {"step_number": 13, "title": "Add Retell AI Phone Number to GHL Landing Page Button", "description": "In your GoHighLevel account, navigate to 'Sites' -> 'Funnels'. Go into the 'AI Agency' folder, then 'AI Voice Magic Demo Landing'. Click 'Edit' on the landing page. Locate the 'CLICK TO CALL' button. In the button settings on the right, update the 'Text' field to display your Retell AI phone number (e.g., 'CLICK TO CALL +17867555428'). Scroll down to 'Button Actions' and in the 'Phone Number' field, paste your Retell AI phone number. Click 'Save' and then 'Publish' the landing page. Ensure your domain is connected for publishing.", "url": null, "input_field": null, "uses_variable": "retellPhoneNumber", "timestamp": "06:54", "visual_context": "GHL Sites -> Funnels, 'AI Voice Magic Demo Landing' page editor, 'CLICK TO CALL' button settings panel."}, {"step_number": 14, "title": "Get GHL Location ID", "description": "In your GoHighLevel account, navigate to 'Settings' (bottom left) -> 'Business Profile'. Locate the 'Location ID' field at the top of the 'General Information' section. Click the copy icon next to it to copy the ID. Save this ID temporarily (e.g., in a notepad).", "url": null, "input_field": {"variable_name": "ghlLocationId", "label": "GHL Location ID", "type": "string"}, "uses_variable": null, "timestamp": "08:25", "visual_context": "GHL Settings -> Business Profile, 'Location ID' field with copy icon."}, {"step_number": 15, "title": "Get GHL Private Integration Key", "description": "In your GoHighLevel account, navigate to 'Settings' -> 'Private Integrations'. Click 'Create New Integration'. Enter a 'Name' (e.g., 'n8n 2') and click 'Next'. In the 'Scopes' section, click 'Select All' (or select specific scopes if preferred). Click 'Create'. A 'Security Risk' pop-up will appear; click 'Confirm'. Your private integration will be created, and an 'Access Token' (Private Integration Key) will be displayed. Click the copy icon next to it. Save this key temporarily (e.g., in a notepad).", "url": null, "input_field": {"variable_name": "ghlPrivateIntegrationKey", "label": "GHL Private Integration Key", "type": "string"}, "uses_variable": null, "timestamp": "08:56", "visual_context": "GHL Settings -> Private Integrations, 'Create New Integration' wizard, 'Access Token' display."}, {"step_number": 16, "title": "Import AI Voice Demo Workflow into n8n", "description": "In your n8n instance, navigate to 'Workflows'. Click 'Create Workflow'. Once the empty workflow is open, click the three dots in the top right corner, select 'Import from File'. Choose the 'AI Voice Agents Demo (EXAMPLE).json' file that you downloaded from the lesson. Click 'Open'. The workflow will be imported. Click 'Save' in the top right corner.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "09:51", "visual_context": "n8n dashboard, 'Create Workflow' button, empty workflow, then imported 'AI Voice Agents Demo (EXAMPLE)' workflow."}, {"step_number": 17, "title": "Add GHL Private Integration Key and Location ID to 'Get Custom Field ID V2' Node", "description": "In the imported n8n workflow, locate and double-click the 'Get Custom Field ID V2' node. In the 'Parameters' tab, find the 'locationId' field under 'Query Parameters'. Replace 'PASTE LOCATION ID HERE' with your saved GHL Location ID. Scroll down to the 'Authorization' section, find the 'Value' field, and replace 'PASTE PRIVATE KEY HERE' with your saved GHL Private Integration Key. Ensure there is a space after 'Bearer' before pasting the key. Click 'Execute Workflow' (from manual) to run this node and retrieve the custom field IDs. Then, click 'Save' the workflow.", "url": null, "input_field": null, "uses_variable": "ghlLocationId, ghlPrivateIntegrationKey", "timestamp": "10:20", "visual_context": "n8n workflow builder, 'Get Custom Field ID V2' node settings, 'Parameters' tab with fields for locationId and privateKey."}, {"step_number": 18, "title": "Extract GHL Custom Field IDs", "description": "After executing the 'Get Custom Field ID V2' node, double-click the 'Scrape IDs' node. In the 'Output' panel on the right, you will see the extracted custom field IDs for 'company_type_id' and 'demo_context_id'. Copy these two IDs and save them temporarily (e.g., in a notepad).", "url": null, "input_field": {"variable_name": "ghlCompanyTypeId, ghlDemoContextId", "label": "GHL Company Type ID, GHL Demo Context ID", "type": "string"}, "uses_variable": null, "timestamp": "10:56", "visual_context": "n8n workflow builder, 'Scrape IDs' node settings, 'Output' panel showing JSON data with custom field IDs."}, {"step_number": 19, "title": "Add Custom Field IDs to 'Edit Fields' Node", "description": "In the n8n workflow, locate and double-click the 'Edit Fields' node (the one connected to 'Inbound Webhook'). In the 'Parameters' tab, find the 'company_type_id' field and replace 'PASTE ID HERE' with your saved 'ghlCompanyTypeId'. Find the 'demo_context_id' field and replace 'PASTE ID HERE' with your saved 'ghlDemoContextId'. Click 'Save' the workflow.", "url": null, "input_field": null, "uses_variable": "ghlCompanyTypeId, ghlDemoContextId", "timestamp": "11:29", "visual_context": "n8n workflow builder, 'Edit Fields' node settings, 'Parameters' tab with fields for company_type_id and demo_context_id."}, {"step_number": 20, "title": "Add Custom Field IDs to 'Edit Fields1' Node", "description": "In the n8n workflow, locate and double-click the 'Edit Fields1' node (the one connected to 'Outbound Webhook'). In the 'Parameters' tab, find the 'company_type_id' field and replace 'PASTE ID HERE' with your saved 'ghlCompanyTypeId'. Find the 'demo_context_id' field and replace 'PASTE ID HERE' with your saved 'ghlDemoContextId'. Click 'Save' the workflow.", "url": null, "input_field": null, "uses_variable": "ghlCompanyTypeId, ghlDemoContextId", "timestamp": "12:09", "visual_context": "n8n workflow builder, 'Edit Fields1' node settings, 'Parameters' tab with fields for company_type_id and demo_context_id."}, {"step_number": 21, "title": "Copy n8n Inbound Webhook Production URL", "description": "In the n8n workflow, locate and double-click the 'Inbound Webhook' node (the first node in the main flow). Go to the 'Production URL' tab, copy the entire URL provided. This URL will be used in Retell AI.", "url": null, "input_field": {"variable_name": "n8nInboundWebhookUrl", "label": "n8n Inbound Webhook Production URL", "type": "string"}, "uses_variable": null, "timestamp": "12:25", "visual_context": "n8n workflow builder, 'Inbound Webhook' node settings, 'Production URL' tab."}, {"step_number": 22, "title": "Add n8n Inbound Webhook URL to Retell AI Phone Number", "description": "In your Retell AI account, navigate to 'Phone Numbers' in the left sidebar. Click on the 'AI Agency Demo Number' (the phone number you purchased). In the 'Inbound Call Agent' section, check the box 'Add an inbound webhook'. Paste the copied n8n Inbound Webhook Production URL into the provided field. The system will automatically save the changes.", "url": null, "input_field": null, "uses_variable": "n8nInboundWebhookUrl", "timestamp": "12:47", "visual_context": "Retell AI 'Phone Numbers' section, details page for the phone number, 'Add an inbound webhook' field."}, {"step_number": 23, "title": "Copy n8n Outbound Webhook Production URL", "description": "In the n8n workflow, locate and double-click the 'Outbound Webhook' node (the first node in the outbound flow). Go to the 'Production URL' tab, copy the entire URL provided. This URL will be used in Retell AI for all demo agents.", "url": null, "input_field": {"variable_name": "n8nOutboundWebhookUrl", "label": "n8n Outbound Webhook Production URL", "type": "string"}, "uses_variable": null, "timestamp": "13:15", "visual_context": "n8n workflow builder, 'Outbound Webhook' node settings, 'Production URL' tab."}, {"step_number": 24, "title": "Add n8n Outbound Webhook URL to Orchestrator Agent", "description": "In your Retell AI account, navigate to 'Agents' in the left sidebar. Click on the 'Orchestrator AI Demo Multi-lingual' agent. On the right-hand side, scroll down to 'Webhook Settings'. Delete any existing URL in the 'Agent Level Webhook URL' field and paste the copied n8n Outbound Webhook Production URL. Click 'Publish' to save the changes.", "url": null, "input_field": null, "uses_variable": "n8nOutboundWebhookUrl", "timestamp": "13:32", "visual_context": "Retell AI workflow builder for 'Orchestrator AI Demo Multi-lingual' agent, 'Webhook Settings' section."}, {"step_number": 25, "title": "Add n8n Outbound Webhook URL to English Demo Agent", "description": "Go back to the 'All Agents' list. Click on the 'AI Voice Demo Bot (ENG)' agent. On the right-hand side, scroll down to 'Webhook Settings'. Delete any existing URL in the 'Agent Level Webhook URL' field and paste the copied n8n Outbound Webhook Production URL. Click 'Publish' to save the changes.", "url": null, "input_field": null, "uses_variable": "n8nOutboundWebhookUrl", "timestamp": "13:53", "visual_context": "Retell AI workflow builder for 'AI Voice Demo Bot (ENG)' agent, 'Webhook Settings' section."}, {"step_number": 26, "title": "Add n8n Outbound Webhook URL to Spanish Demo Agent", "description": "Go back to the 'All Agents' list. Click on the 'AI Voice Demo Bot (ESP)' agent. On the right-hand side, scroll down to 'Webhook Settings'. Delete any existing URL in the 'Agent Level Webhook URL' field and paste the copied n8n Outbound Webhook Production URL. Click 'Publish' to save the changes.", "url": null, "input_field": null, "uses_variable": "n8nOutboundWebhookUrl", "timestamp": "14:06", "visual_context": "Retell AI workflow builder for 'AI Voice Demo Bot (ESP)' agent, 'Webhook Settings' section."}, {"step_number": 27, "title": "Copy Orchestrator AI Demo Multi-lingual Agent ID", "description": "In your Retell AI account, navigate to 'Agents' in the left sidebar. Click on the 'Orchestrator AI Demo Multi-lingual' agent. At the top of the workflow builder, next to the agent's name, you will see 'Agent ID'. Click the copy icon next to it. Save this ID temporarily (e.g., in a notepad).", "url": null, "input_field": {"variable_name": "retellOrchestratorAgentId", "label": "Retell Orchestrator Agent ID", "type": "string"}, "uses_variable": null, "timestamp": "14:41", "visual_context": "Retell AI workflow builder for 'Orchestrator AI Demo Multi-lingual' agent, 'Agent ID' displayed at the top."}, {"step_number": 28, "title": "Add Orchestrator Agent ID to n8n 'Dynamic Info' Node", "description": "In the n8n workflow, locate and double-click the 'Dynamic Info' node. In the 'Parameters' tab, find the 'agent_id' field at the bottom. Replace 'PASTE AGENT ID HERE' with your copied Retell Orchestrator Agent ID. Click 'Save' the workflow.", "url": null, "input_field": null, "uses_variable": "retellOrchestratorAgentId", "timestamp": "14:50", "visual_context": "n8n workflow builder, 'Dynamic Info' node settings, 'Parameters' tab with 'agent_id' field."}, {"step_number": 29, "title": "Add Timezone to n8n Workflow Settings", "description": "In the n8n workflow, click the three dots in the top right corner and select 'Settings'. In the 'Timezone' dropdown, select your appropriate timezone (e.g., 'America/New_York'). Click 'Save'. Finally, click 'Save' the workflow again, and then click 'Publish' and 'Publish' again to ensure all changes are live.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "15:09", "visual_context": "n8n workflow builder, workflow settings pop-up with 'Timezone' dropdown."}], "variables_summary": [{"variable_name": "n8nRootPassword", "label": "n8n VPS Root Password", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "n8nLoginUrl", "label": "n8n Login URL", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "n8nLicenseKey", "label": "n8n License Key", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "anthropicApiKey", "label": "Anthropic API Key", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "geminiApiKey", "label": "Gemini API Key", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "openaiApiKey", "label": "OpenAI API Key", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "retellPhoneNumber", "label": "Retell AI Phone Number", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "n8nMagicLinkGeneratorWebhookUrl", "label": "n8n Magic Link Generator Webhook URL", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "ghlLocationId", "label": "GHL Location ID", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "ghlPrivateIntegrationKey", "label": "GHL Private Integration Key", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "ghlCompanyTypeId", "label": "GHL Company Type ID", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "ghlDemoContextId", "label": "GHL Demo Context ID", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "n8nInboundWebhookUrl", "label": "n8n Inbound Webhook Production URL", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "n8nOutboundWebhookUrl", "label": "n8n Outbound Webhook Production URL", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "retellOrchestratorAgentId", "label": "Retell Orchestrator Agent ID", "type": "string", "used_in_future_steps": "Yes"}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod1-les8"});
loadSop('m1_08', {"title": "AI Voice Demo Flow - Understanding the Architecture", "description": "This SOP details the complete flow of the AI Voice Demo, from initial lead capture through a landing page form, magic link generation, AI voice bot interaction, and post-call feedback. It outlines the HighLevel automations and n8n workflows involved, highlighting the multi-lingual capabilities and the advantage of not requiring A2P approval for the voice demo.", "estimated_time": "10 minutes", "steps": [{"step_number": 1, "title": "Introduction to AI Voice Demo Flow", "description": "The video begins by providing a high-level overview of the AI Voice Demo Flow, illustrating the complete process from lead capture to AI voice interaction and feedback.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "Overview of the entire flow diagram on a white canvas.", "warnings": null}, {"step_number": 2, "title": "AI Voice Demo Landing Page Form Submission", "description": "The flow initiates with a landing page where prospects can generate an AI Voice Demo. Users are required to fill out a form with their details, including First Name, Phone, Company Name, Company Type, Company Website, and optionally upload a Website Mobile Screenshot. This form is a dedicated version for the AI Voice demo, similar to the SMS/messaging chatbot demo form. Submitting this form triggers the subsequent automation.", "url": "https://www.yourwebsite.com/demo-ai-voice", "input_field": null, "uses_variable": null, "timestamp": "00:05", "visual_context": "A dark-themed form titled 'Generate Your AI Voice Demo with 1-Click' with various input fields and a 'SEND MAGIC DEMO LINK' button. The URL 'https://www.yourwebsite.com/demo-ai-voice' is displayed below.", "warnings": null}, {"step_number": 3, "title": "HighLevel Automation: [AI Voice] Generate Magic Link", "description": "Upon successful submission of the AI Voice Demo form, a HighLevel automation named '[AI Voice] Generate Magic Link' is activated. This automation performs two key actions: first, it adds a tag 'ai voice demo' to the contact's profile. Second, it sends a webhook to the n8n 'Magic Link Generator' workflow. This n8n workflow is responsible for processing the submitted information, scraping the provided website, and creating a unique magic link.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:39", "visual_context": "HighLevel workflow builder showing a trigger 'Form Submitted - [AI Voice] AI Demo Magic Link Generator', followed by 'Add Tag - ai voice demo' and 'Webhook -> Magic Link Generator' actions.", "warnings": null}, {"step_number": 4, "title": "n8n Workflow: Magic Link Generator", "description": "The webhook from HighLevel is received by the n8n 'Magic Link Generator' workflow. This workflow processes the data, including scraping the provided website (if a URL was submitted), and generates a unique magic link. This is the same n8n workflow utilized for other demo types, ensuring consistency in magic link creation.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:12", "visual_context": "A complex n8n workflow diagram with multiple interconnected nodes, labeled 'Magic Link Generator n8n'.", "warnings": null}, {"step_number": 5, "title": "HighLevel Automation: Send Magic Link", "description": "Once the n8n workflow has generated the magic link and updated the contact's magic link field in HighLevel, another HighLevel automation, 'Send Magic Link', is triggered. This automation checks for the 'ai voice demo' tag on the contact. If present, it sends an SMS to the prospect containing a personalized magic link. This link directs them to the AI Voice Receptionist landing page. The message dynamically inserts the unique magic link using `{{contact.magic_link}}`.", "url": "https://www.website.com/magic-demo-landing-ai-voice/{{contact.magic_link}}", "input_field": null, "uses_variable": null, "timestamp": "01:14", "visual_context": "HighLevel workflow builder showing a trigger 'Magic Link Field - Has Changed'. Conditional branches for 'WhatsApp', 'AI Voice' (checking for 'ai voice demo' tag), and 'None'. Under the 'AI Voice' branch, an 'SMS: Send AI Voice Magic Link' action is shown with the message content.", "warnings": "If A2P approval is not in place, the SMS might fail to send, but the contact's magic link field will still be updated."}, {"step_number": 6, "title": "AI Voice Demo Landing Page (Click to Call)", "description": "The magic link received via SMS leads the prospect to a dedicated landing page. This page features a prominent 'CLICK TO CALL' button. A key benefit of this approach is that A2P approval is not required, as the user directly initiates the call. Clicking this button triggers the AI Voice Demo workflow.", "url": "https://www.yourwebsite.com/magic-demo-landing-ai-voice", "input_field": null, "uses_variable": null, "timestamp": "01:43", "visual_context": "A landing page displaying a large orange button that reads 'CLICK TO CALL 555-555-5555 Your AI Voice Demo is waiting for you...'. The URL 'https://www.yourwebsite.com/magic-demo-landing-ai-voice' is visible below.", "warnings": null}, {"step_number": 7, "title": "n8n Workflow: AI Voice Demo n8n Workflow (Inbound Webhook)", "description": "When the prospect clicks the 'CLICK TO CALL' button, an inbound webhook is sent to the 'AI Voice Demo n8n Workflow'. This workflow is designed to capture the prospect's phone number, search for the corresponding contact in HighLevel, retrieve dynamic information (such as company name and type from the initial form submission), and then pass this contextual data to the AI voice bot. This ensures the AI bot has relevant information about the caller.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:31", "visual_context": "An n8n workflow diagram showing nodes for 'Inbound Webhook', 'Edit Fields', 'Search GHL Contact', 'Dynamic Info', and 'Respond to Webhook'.", "warnings": null}, {"step_number": 8, "title": "Orchestrator AI Demo Multi-lingual (Grace)", "description": "The n8n workflow initiates the 'Orchestrator AI Demo Multi-lingual' bot, named Grace. This bot begins with a welcome message, dynamically inserting the company name. It then prompts the user to indicate their preferred language (English or Spanish). Based on the user's verbal response, the orchestrator seamlessly transfers the call to either the dedicated 'AI Voice Demo Bot (ENG)' for English conversations or the 'AI Voice Demo Bot (ESP)' for Spanish conversations. This multi-bot approach is chosen to optimize transcription, voice generation, and language model performance for each specific language, providing a superior conversational experience compared to a single, less specialized multi-lingual bot.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:00", "visual_context": "A workflow diagram for 'Orchestrator AI Demo Multi-lingual'. It shows a 'Welcome Node' with dynamic text, followed by two transition options based on user's reply language (English or Spanish), leading to 'Agent Transfer Node' boxes.", "warnings": null}, {"step_number": 9, "title": "AI Voice Demo Bot (ENG) / AI Voice Demo Bot (ESP)", "description": "After the Orchestrator transfers the call, it is handled by the appropriate dedicated AI Voice Demo Bot (either English or Spanish). These bots are specifically trained and optimized for their respective languages, ensuring highly accurate and natural-sounding conversations. The interaction continues until the user decides to end the call.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:40", "visual_context": "Two separate boxes labeled 'AI Voice Demo Bot (ENG)' and 'AI Voice Demo Bot (ESP)', each indicating 'Single Prompt' and a persona (Grace for ENG, Hailey for ESP).", "warnings": null}, {"step_number": 10, "title": "n8n Workflow: AI Voice Demo n8n Workflow (Outbound Webhook)", "description": "Upon the conclusion of the AI voice call, an outbound webhook is triggered from the AI voice platform to the n8n 'AI Voice Demo n8n Workflow (Outbound Webhook)'. This workflow's primary function is to locate the contact in HighLevel and then add a specific tag, 'ai voice demo completed', to their profile. This tag serves as an indicator that the demo call has successfully finished.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:00", "visual_context": "An n8n workflow diagram showing nodes for 'Outbound Webhook', 'Edit Fields1', 'Search GHL Contact1', and 'Add Tag: ai voice demo completed'.", "warnings": null}, {"step_number": 11, "title": "HighLevel Automation: [Voice AI] Send feedback SMS", "description": "The 'ai voice demo completed' tag, added in the previous step, triggers a HighLevel automation named '[Voice AI] Send feedback SMS'. This automation sends a personalized SMS to the prospect, inquiring about their experience with the AI Voice Demo. The message uses `{{contact.first_name}}` for personalization. This step is crucial for continuing engagement with the lead, gathering feedback, and potentially guiding them towards the next stage of the sales process, such as scheduling a follow-up call or presenting a Video Sales Letter (VSL).", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:25", "visual_context": "HighLevel workflow builder showing a trigger 'Tag Added: ai voice demo completed', followed by a 'Feedback SMS' action. The message content 'hey {{contact.first_name}}, what did you like best about the AI Voice demo?' is displayed.", "warnings": null}, {"step_number": 12, "title": "Summary of AI Voice Demo Flow", "description": "The video concludes with a comprehensive summary of the entire AI Voice Demo Flow. It reiterates the similarities to the SMS demo while emphasizing the unique aspects of using AI voice bots and the significant advantage of not requiring A2P approval for the initial call. This allows for immediate implementation and creation of demos.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:57", "visual_context": "Overview of the entire flow diagram on a white canvas.", "warnings": null}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod1-les7"});
loadSop('m1_09', {"title": "A2P Approval Generator Usage", "description": "This SOP guides you on how to access and understand the A2P Approval Generator tool within Operatorbase. It explains the purpose of the tool, highlights important considerations for business registration, and outlines the information required to generate your A2P compliance package and a dedicated verification website.", "estimated_time": "05 minutes", "steps": [{"step_number": 1, "title": "Navigate to Arsenal", "description": "From the main dashboard, click on the 'Arsenal' tab in the top navigation bar.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "Main dashboard with navigation tabs visible at the top, 'Arsenal' tab is highlighted.", "warnings": null}, {"step_number": 2, "title": "Access A2P Approval Generator", "description": "On the 'Arsenal' page, locate and click on the 'A2P Approval Generator' card. This tool is designed to generate A2P 10DLC compliant websites and registration packets.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:03", "visual_context": "Arsenal page showing various tool cards. The 'A2P Approval Generator' card, described as 'Generate A2P 10DLC compliant websites & registration packets', is clicked.", "warnings": null}, {"step_number": 3, "title": "Review Business Information Form", "description": "The 'A2P Approval Generator' page displays a 'Business Information' form. This form requires specific details about your business to generate the A2P compliance package.", "url": "operatorbase.app/book/a2p-generator", "input_field": null, "uses_variable": null, "timestamp": "00:05", "visual_context": "The A2P Approval Generator form is displayed, showing fields for Business Type, Industry, Business Name, Country, Phone Number, Address, City, State, and Zip Code.", "warnings": null}, {"step_number": 4, "title": "Understand New Company Warning", "description": "Carefully read the warning message at the top of the form. If your company was formed less than 15 days ago, you must wait before submitting. A2P registrations are automatically denied if the business is too new. Ensure your business is at least 15 days old before proceeding.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:12", "visual_context": "A yellow warning box is visible at the top of the form, stating: 'If your company was formed less than 15 days ago, wait before submitting. A2P registrations are automatically denied if the business is too new.'", "warnings": "A2P registrations for businesses less than 15 days old will be automatically denied."}, {"step_number": 5, "title": "Select Business Type", "description": "From the 'Business Type' dropdown menu, select the legal structure of your business (e.g., LLC, Corporation, Sole Proprietorship).", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:10", "visual_context": "The 'Business Type' dropdown field is visible on the form.", "warnings": null}, {"step_number": 6, "title": "Select Industry", "description": "From the 'Industry' dropdown menu, select the primary industry your business operates in. 'AI Agency' is an available option, but you can choose any relevant industry for your business or your clients.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:27", "visual_context": "The 'Industry' dropdown is opened, showing a list of industries including 'AI Agency', 'Marketing', 'Real Estate', etc. 'AI Agency' is highlighted.", "warnings": null}, {"step_number": 7, "title": "Enter Business Name", "description": "In the 'Business Name' text field, enter the exact legal name of your business. This name must match precisely as it appears in your legal formation documents.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:10", "visual_context": "The 'Business Name' text field is visible, pre-filled with 'Acme LLC'.", "warnings": "Must match exactly as it appears in your legal/formation documents."}, {"step_number": 8, "title": "Select Country", "description": "From the 'Country' dropdown menu, select the country where your business is legally registered.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:10", "visual_context": "The 'Country' dropdown field is visible, pre-selected to 'United States (+1)'.", "warnings": null}, {"step_number": 9, "title": "Enter Phone Number", "description": "In the 'Phone Number' text field, enter your business's primary contact phone number.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:10", "visual_context": "The 'Phone Number' text field is visible, pre-filled with '(+1) 800-123-4567'.", "warnings": null}, {"step_number": 10, "title": "Enter Business Address", "description": "In the 'Address' text field, enter the street address of your business. This must match your legal/formation documents.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:10", "visual_context": "The 'Address' text field is visible, pre-filled with '123 Main St'.", "warnings": "Must match exactly as it appears in your legal/formation documents."}, {"step_number": 11, "title": "Enter City", "description": "In the 'City' text field, enter the city corresponding to your business address.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:10", "visual_context": "The 'City' text field is visible, pre-filled with 'Austin'.", "warnings": null}, {"step_number": 12, "title": "Select State", "description": "From the 'State' dropdown menu, select the state corresponding to your business address.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:10", "visual_context": "The 'State' dropdown field is visible.", "warnings": null}, {"step_number": 13, "title": "Enter Zip Code", "description": "In the 'Zip Code' text field, enter the postal code corresponding to your business address.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:10", "visual_context": "The 'Zip Code' text field is visible, pre-filled with '78701'.", "warnings": null}, {"step_number": 14, "title": "Generate Compliance Package", "description": "Once all required business information has been accurately entered, click the 'Generate Compliance Package' button. This will generate your A2P compliance packages and a dedicated website that can be utilized specifically for A2P verification. The website can be discontinued after successful approval.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:44", "visual_context": "A blue button labeled 'Generate Compliance Package' is visible at the bottom of the form.", "warnings": null}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod1-les11"});
loadSop('m1_10', {"title": "AI Demo WhatsApp Setup", "description": "This SOP outlines the steps to set up the AI Demo for WhatsApp, including creating a WhatsApp message template, configuring two GHL workflows for AI replies and sending magic links, and integrating the Magic Link Generator webhook.", "estimated_time": "30 minutes", "steps": [{"step_number": 1, "title": "Set Up WhatsApp for Sub-Account (Prerequisite)", "description": "Ensure your WhatsApp is already added to your sub-location. If not, follow the HighLevel guide on 'How to Set Up WhatsApp For a Sub-Account'. This involves enabling WhatsApp, creating a WhatsApp Business Account, and either creating a new WhatsApp number or adding your own.", "url": "https://help.gohighlevel.com/support/solutions/articles/19000159880-how-to-set-up-whatsapp-for-a-sub-account", "input_field": null, "uses_variable": null, "timestamp": "00:06", "visual_context": "Google Docs document showing the SOP steps, then a HighLevel support portal page titled 'How to Set Up WhatsApp For a Sub-Account'."}, {"step_number": 2, "title": "Create WhatsApp Message Template", "description": "Navigate to Settings > WhatsApp > Templates. Click 'Create Template', select 'AI Template'.\n- **Template Name**: Enter 'ai_demo_bot'.\n- **Category**: Select 'Utility'.\n- **Language**: Select 'English (US)'.\n- **Show Header**: Toggle on.\n- **Header Text**: Enter 'Hello'. Add a variable by clicking 'Add Variable' and selecting 'Contact > First Name'. Enter 'Zalo' as sample content.\n- **Body**: Enter the exact message: 'Thank you for your interest in the AI demo. To confirm your participation, please reply with \"START\". This will help us set up your session accordingly. If you have any questions or need assistance, feel free to reach out.'\n- **Button (Optional)**: Add a Quick Reply button. Enter 'START' (all caps) as the button text. Click 'Create'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:55", "visual_context": "HighLevel CRM interface, navigating to WhatsApp Business settings, creating a new template, filling in details like name, category, language, header text with variable, body text, and a quick reply button."}, {"step_number": 3, "title": "Convert Marketing Template to Utility (if necessary)", "description": "After submitting the template, it might be categorized as 'Marketing' instead of 'Utility'. For US numbers, it needs to be 'Utility' to function correctly. If it's 'Marketing', click 'WhatsApp Template Rewriter', then 'Create Utility Templates Now'. Select your 'ai_demo_bot' template, click 'Convert Marketing Templates into Utility Templates', and confirm 'Convert'. Keep retrying until it's approved as a 'Utility' template.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:09", "visual_context": "HighLevel WhatsApp Business templates list showing 'ai_demo_bot' as 'Marketing'. A pop-up for 'Convert Your Marketing Templates to Utility Templates with AI' appears, followed by the conversion process."}, {"step_number": 4, "title": "Configure 'WhatsApp AI Demo Bot - Base Triggers - (AI Reply)' Workflow", "description": "Navigate to Automation > Workflows > AI Agency > [NEW] WhatsApp AI Demo. Open the workflow named '[WhatsApp] AI Demo Bot - Base Triggers - (AI Reply)' (the one in Draft status).\nLocate the 'If/Else' condition labeled 'If 'Tags' includes 'ai demo optin''. Under the 'Yes' branch, click the '+' icon to add an action. Search for 'WhatsApp' and select the 'WhatsApp' action.\n- **Select WhatsApp Template**: Choose 'None - Free form message'.\n- **Enable Branches**: Toggle off.\n- **Select From Phone Number**: Ensure your WhatsApp phone number is selected.\n- **Enter message to be sent**: Click the tag icon and select 'Custom Fields > contact.assistant_last_message'.\nSave the action, then save and publish the workflow.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:22", "visual_context": "HighLevel Automation workflows list, entering the 'AI Reply' workflow. Adding a WhatsApp action under the 'Yes' branch of an If/Else. Configuring the WhatsApp action with 'None - Free form message' and 'contact.assistant_last_message'."}, {"step_number": 5, "title": "Configure 'Send Magic Link' Workflow", "description": "Navigate back to Automation > Workflows > AI Agency > AI Demo Magic Automations. Open the workflow named 'Send Magic Link'.\nLocate the 'If/Else' condition labeled 'If 'Tag' includes 'whatsapp''. Under the 'Yes' branch, click the '+' icon to add an action. Search for 'WhatsApp' and select the 'WhatsApp' action.\n- **Select WhatsApp Template**: Choose the 'ai_demo_start' template you created earlier.\n- **Enable Branches**: Toggle off.\n- **Select From Phone Number**: Ensure your WhatsApp phone number is selected.\nSave the action, then save and publish the workflow.\nNote: If you recently added your WhatsApp number, it might take up to 24 hours for the WhatsApp template menu to appear.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:41", "visual_context": "HighLevel Automation workflows list, entering the 'Send Magic Link' workflow. Adding a WhatsApp action under the 'Yes' branch of an If/Else. Configuring the WhatsApp action with the 'ai_demo_start' template."}, {"step_number": 6, "title": "Configure 'WhatsApp Generate Magic Link' Workflow", "description": "Navigate back to Automation > Workflows > AI Agency > [NEW] WhatsApp AI Demo. Open the workflow named '[WhatsApp] Generate Magic Link' (the one in Draft status).\nLocate and click on the 'Webhook' step.\n- **URL**: Paste the 'Magic Link Generator Webhook URL' from your n8n setup. To get this URL, go to your n8n instance (using your n8nLoginUrl), navigate to 'Personal' workflows, open the 'Magic Link Generator' workflow, click on the 'Webhook' node, and copy the 'Production URL'.\nSave the action, then save and publish the workflow.", "url": null, "input_field": null, "uses_variable": "n8nLoginUrl", "timestamp": "05:55", "visual_context": "HighLevel Automation workflows list, entering the 'Generate Magic Link' workflow. Clicking the 'Webhook' step. Then, navigating to n8n, opening the 'Magic Link Generator' workflow, copying its 'Production URL', and pasting it back into the HighLevel webhook URL field."}, {"step_number": 7, "title": "Test the AI Demo WhatsApp Setup", "description": "To test the setup, navigate to Sites > Funnels > AI Agency. Open the funnel named '[WhatsApp] AI Demo Magic Link'. Click 'View page' to open the form. Fill out the form with your details and click 'Send Magic Demo Link'. This should trigger the automation and send the WhatsApp message.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "07:04", "visual_context": "HighLevel Sites > Funnels, opening the 'AI Agency' funnel, then viewing the '[WhatsApp] AI Demo Magic Link' page and showing the form fields."}], "variables_summary": [{"variable_name": "n8nLoginUrl", "label": "n8n Login URL", "type": "URL", "used_in_future_steps": "Yes"}, {"variable_name": "MagicLinkGeneratorWebhookUrl", "label": "Magic Link Generator Webhook URL (from n8n)", "type": "URL", "used_in_future_steps": "Yes"}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod1-les9"});
loadSop('m1_11', {"title": "Introduction to AI Delta Response System", "description": "This video serves as a motivational introduction to the next phase of building your AI agency: mastering the AI Delta Response System. It emphasizes the critical need to deeply understand and build a production-ready chatbot to gain the confidence and certainty required for successful sales.", "estimated_time": "2 minutes", "steps": [{"step_number": 1, "title": "Acknowledge Your Progress", "description": "Take a deep breath and acknowledge that you have successfully set up the foundation and infrastructure for your AI agency. This is a significant achievement.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00 - 00:15", "visual_context": "The speaker is looking directly at the camera, speaking in a calm, encouraging tone.", "warnings": null}, {"step_number": 2, "title": "Understand the Next Challenge", "description": "Recognize that while you have the infrastructure (a 'race car in the garage'), you need to learn how to operate it effectively. Infrastructure alone doesn't sell itself; deep understanding and confidence are key.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:16 - 00:29", "visual_context": "The speaker continues to address the camera, using a metaphor of a race car.", "warnings": null}, {"step_number": 3, "title": "Proceed to the AI Delta Response System Module", "description": "Your immediate next step is to go to the AI Delta Response System module. The goal is not just to learn technical skills, but to build a full production-ready AI chatbot. This hands-on experience will allow you to understand data flow, logic jumps, and how to handle unexpected scenarios ('curveballs').", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:30 - 01:25", "visual_context": "The speaker gestures with his hands, emphasizing the importance of the next step.", "warnings": null}, {"step_number": 4, "title": "Master the Machine for Sales Confidence", "description": "Build, break, and fix the chatbot within the AI Delta Response System. By doing so, you will gain absolute certainty in your solution. This deep, personal understanding will eliminate hesitation in your voice when speaking with prospects, allowing you to transfer confidence and close deals effectively.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:26 - 01:58", "visual_context": "The speaker continues to speak with conviction, emphasizing the benefits of mastering the system.", "warnings": null}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod1-les10"});
loadSop('m2_01', {"title": "Private Demo Strategy to Sell AI Chatbots", "description": "This SOP outlines a 4-step 'Private Demo' strategy to effectively sell AI chatbots. It details a process where an agency owner generates a personalized AI demo for potential clients, automates its delivery via SMS, guides the client to a landing page, and allows them to experience a custom-morphed AI chatbot firsthand. This approach aims to demonstrate the AI's capabilities and value directly, leading to easier sales without extensive verbal explanations.", "estimated_time": "02 minutes 19 seconds", "steps": [{"step_number": 1, "title": "Lead Generation & AI Demo Creation", "description": "The agency owner initiates the process by using a 1-click AI demo generator form. They input essential client information including their name, email, company name, and the company's website (if available). After filling out the required fields, the agency owner clicks the 'Generate Demo' button to proceed.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:11", "visual_context": "A computer screen displaying a '1-CLICK AI DEMO GENERATOR FORM' with input fields for 'Name', 'Email', 'Company', and a 'Generate Demo' button. A person (representing the agency owner) is shown next to the computer."}, {"step_number": 2, "title": "Automated N8N Workflow & SMS Delivery", "description": "Upon submission, the client's information is fed into an automated N8N workflow. This workflow performs data processing, which includes scraping the company's website for relevant information (if a URL was provided). It then generates a unique 'magic link' for the demo and integrates with an SMS service to send a new message to the potential customer. The SMS contains the magic link, prompting the client to click it to start their AI chatbot experience.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:24", "visual_context": "A diagram illustrating 'WORKFLOW AUTOMATION' powered by 'n8n'. Arrows show data flowing from a cloud/server icon to N8N, then through 'Data Processing', 'Magic Link Generation', and 'SMS Integration'. An arrow points from N8N to a smartphone receiving a 'NEW MESSAGE' with text 'Please click the link to start your AI chatbot experience: [magic-link-url]'."}, {"step_number": 3, "title": "Landing Page Navigation", "description": "The potential customer receives the SMS and clicks on the provided magic link. This action navigates them to a 'Demo Start Landing Page'. On this page, they will find a prominent 'START YOUR DEMO' button. If the company website was provided during demo creation, a visual representation of their website with a chatbot widget might also be displayed on this landing page, allowing them to visualize the integration.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:49", "visual_context": "A hand holding a smartphone displaying a 'DEMO START LANDING PAGE' with a large 'START YOUR DEMO' button. Text below the button reads 'Experience the future of customer information'."}, {"step_number": 4, "title": "Private AI Chatbot Experience", "description": "Once the client clicks the 'START YOUR DEMO' button on the landing page, the private AI chatbot experience begins immediately. The chatbot starts messaging them directly on their phone via SMS. This demo bot is customized and 'morphed' with their company's specific information and data, allowing the potential customer to interact with it and experience its AI capabilities firsthand in a highly personalized and relevant context.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:04", "visual_context": "A smartphone showing a chat interface titled 'DEMO AI CHATBOT'. The chat displays messages like 'Hi, what can you do?' and the bot's response: 'Hello! I am a demonstration AI chatbot. I can answer questions, provide information, and showcase my conversational abilities. How can I help you today?'. Another message from the user asks 'Are you connected to my company data?', and the bot replies 'Demo Bot: Yes! I am customized with your company's data and information for this exclusive demo.'."}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod2-les1"});
loadSop('m2_02', {"title": "Elite Private Demo Strategy to Close High-Ticket Clients", "description": "This SOP outlines the Elite Private Demo Strategy, leveraging automated tools and workflows to streamline the sales process for high-ticket clients. It covers generating personalized demos, configuring webhooks for engagement tracking, automating SMS/email follow-ups, and integrating a Video Sales Letter (VSL) and booking calendar directly into the demo experience. For Elite members, it also details how to automate further follow-up using AI chatbots.", "estimated_time": "15 minutes", "steps": [{"step_number": 1, "title": "Access the 1-Click Demo Generator", "description": "Navigate to the 'Operator Base' platform. From the main dashboard, click on 'Arsenal' and then select '1-Click Demo Generator'. This tool allows you to create and manage personalized demos for your prospects.", "url": "https://operator-base.app/tools/demo-generator", "input_field": null, "uses_variable": null, "timestamp": "00:27", "visual_context": "Dashboard of 'Operator Base' with 'Arsenal' section highlighted, showing '1-Click Demo Generator' card."}, {"step_number": 2, "title": "Generate or Send Demos", "description": "On the Demo Generator page, you can either create new demos by entering a company website or send existing demos to leads. The system will build a personalized AI demo for the company.", "url": "https://blackumbrella.aidemo.app/", "input_field": null, "uses_variable": null, "timestamp": "00:33", "visual_context": "A page titled 'See AI In Action For Your Business' with an input field 'What's your company website?' and a 'Continue' button."}, {"step_number": 3, "title": "Configure Engagement Webhook", "description": "After demos are generated, you need to configure the 'Engaged Demo Webhook'. Go to the 'Demo Generator' settings, then click on 'Webhooks' in the left-hand menu. Locate the 'Engagement Webhook URL' section.", "url": "https://operator-base.app/tools/demo-generator/settings/webhooks", "input_field": null, "uses_variable": null, "timestamp": "00:53", "visual_context": "Demo Generator settings page, with 'Webhooks' selected in the sidebar. The 'Engagement Webhook URL' field is visible."}, {"step_number": 4, "title": "Understand Webhook Trigger Conditions", "description": "The engagement webhook fires information about the lead and the demo to your CRM (e.g., HighLevel). It triggers either 3 minutes after the prospect interacts with the chatbot or immediately after the prospect completes a voice call with the AI.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:08", "visual_context": "Webhooks settings page, showing 'When does it fire?' section with options for 'Chat: 3 minutes after the prospect texts from the first message' and 'Voice: Immediately when the prospect completes a voice call'."}, {"step_number": 5, "title": "Automate SMS/Email Follow-Up", "description": "Utilize the webhook to trigger an automated SMS and/or email follow-up. The initial message should be simple, like 'What did you like best about your demo experience?' to encourage engagement and gather feedback.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:45", "visual_context": "Diagram showing an SMS message on a phone screen asking 'What did you like best about your demo experience?'"}, {"step_number": 6, "title": "Enable and Configure the Extra Demo Tab (VSL & Booking)", "description": "For Elite demos, you can enable an 'Extra Demo Tab' to integrate your Video Sales Letter (VSL) and a booking calendar directly into the demo page. Go to 'Demo Generator' settings, then 'Extra Demo Tab'. Enable the 'Extra tab on demo pages' option. You can add content blocks with text, embed your VSL video (e.g., from Vimeo), and embed your success session calendar.", "url": "https://operator-base.app/tools/demo-generator/settings/howitworks", "input_field": null, "uses_variable": null, "timestamp": "02:30", "visual_context": "Demo Generator settings page, with 'Extra Demo Tab' selected. Shows fields for 'Tab Name', 'Content Blocks' (text, video URL, code for calendar embed) and a preview on the right."}, {"step_number": 7, "title": "Embed Your Success Session Calendar", "description": "To embed your calendar, navigate to your CRM (e.g., HighLevel) -> 'Calendars' -> 'Calendar Settings'. Select your 'Success Session' calendar, click 'Share calendar', and then 'Embed code'. Copy the provided HTML code. Paste this code into a 'Code' content block within the 'Extra Demo Tab' settings in the Demo Generator.", "url": "https://app.blackumbrella.agency/location/65ca0b93223968001247c4e4/settings/calendars/calendar", "input_field": null, "uses_variable": null, "timestamp": "03:30", "visual_context": "CRM Calendars page, showing 'Share calendar' pop-up with 'Embed code' tab selected and the HTML code displayed. Then shows the 'Extra Demo Tab' settings with the calendar embed code pasted into a 'Code' block."}, {"step_number": 8, "title": "Save Extra Demo Tab Settings", "description": "After configuring all content blocks, including the VSL and embedded calendar, ensure the 'Enable extra tab on demo pages' checkbox is ticked, and then click 'Save' to apply your changes. This creates a seamless experience for prospects to learn more and book a call without leaving the demo environment.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:09", "visual_context": "Extra Demo Tab settings page with 'Enable extra tab on demo pages' checked and 'Save' button highlighted."}, {"step_number": 9, "title": "Utilize the Lost Revenue Calculator", "description": "The landing page (which can be accessed via the 'How It Works' tab or directly) includes a 'Lost Revenue Calculator'. Use this tool during your sales process to demonstrate to prospects how much money they are potentially losing without AI agents, making the value proposition clear.", "url": "https://blackumbrella.aidemo.agency/home", "input_field": null, "uses_variable": null, "timestamp": "05:13", "visual_context": "Landing page with a 'Find Out Your Lost Revenue' calculator, showing input fields for business metrics and a 'Show My Lost Revenue' button."}, {"step_number": 10, "title": "Automate Bot Takeover for Follow-Up (Optional)", "description": "If you want your AI chatbot (Delta Response bot) to automatically take over conversations after the initial demo engagement, you need to add specific tags to the contact. In your CRM's automation workflow, add an 'Add Contact Tag' action. The tags to add are 'ai.optin' and 'sms'. This will enable the bot to continue the conversation, send the VSL, and prompt for a call booking.", "url": "https://app.blackumbrella.agency/location/65ca0b93223968001247c4e4/automation/workflows", "input_field": null, "uses_variable": null, "timestamp": "05:50", "visual_context": "CRM Automation Workflows page, showing a new workflow being built. An 'Add Contact Tag' action is selected, and 'ai.optin' and 'sms' tags are being added."}], "variables_summary": [{"variable_name": "n8nRootPassword", "label": "n8n VPS Root Password", "type": "password", "used_in_future_steps": "No"}, {"variable_name": "n8nLoginUrl", "label": "n8n Login URL", "type": "text", "used_in_future_steps": "No"}, {"variable_name": "n8nLicenseKey", "label": "n8n License Key", "type": "text", "used_in_future_steps": "No"}, {"variable_name": "anthropicApiKey", "label": "Anthropic API Key", "type": "password", "used_in_future_steps": "No"}, {"variable_name": "geminiApiKey", "label": "Gemini API Key", "type": "password", "used_in_future_steps": "No"}, {"variable_name": "openaiApiKey", "label": "OpenAI API Key", "type": "password", "used_in_future_steps": "No"}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/new-lesson-3-5"});
loadSop('m2_03', {"title": "Using Sales Assets", "description": "This SOP outlines how to leverage the provided sales assets, including the AI Chatbot Demo Generator, Video Sales Letter (VSL), and detailed sales process documents, to effectively sell AI chatbot services. It covers the flow from lead generation to booking an onboarding call, emphasizing the self-selling nature of the tools.", "estimated_time": "15 minutes", "steps": [{"step_number": 1, "title": "Understand the Sales Flow", "description": "Review the overall sales flow diagram to understand how traffic (Organic, Ads, Referral, Manual) is directed to the AI Chatbot Demo Generator, leading to lead engagement, follow-up, VSL viewing, and ultimately booking an onboarding call.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "Video showing a flowchart titled 'HOW TO USE YOUR SALES ASSETS' with various lead sources pointing to 'AI CHATBOT DEMO GENERATOR', then 'LEAD TRIES CHATBOT', 'FOLLOW UP', 'SEND VSL', and 'BOOK ONBOARDING'.", "warnings": null}, {"step_number": 2, "title": "Access the AI Demo Magic Link Funnel Step", "description": "Navigate to your CRM account. In the left sidebar, click on 'Sites', then select the 'Funnels' tab. Locate and click on the 'AI Agency' funnel. Within the funnel steps, click on 'AI Demo Magic Link'.", "url": "https://app.blackumbrella.app/funnels", "input_field": null, "uses_variable": null, "timestamp": "00:30", "visual_context": "CRM dashboard, left sidebar with 'Sites' selected, 'Funnels' tab open, showing 'AI Agency' funnel with steps like 'Home', 'Pricing', 'AI Demo Magic Link', 'Magic Demo Landing', 'Privacy Policy'. 'AI Demo Magic Link' step is highlighted.", "warnings": null}, {"step_number": 3, "title": "View the AI Demo Magic Link Page", "description": "On the 'AI Demo Magic Link' funnel step overview, click the 'View page' icon (looks like an eye) to open the demo generation form in a new browser tab.", "url": "https://app.blackumbrella.app/demo-magic-link", "input_field": null, "uses_variable": null, "timestamp": "00:50", "visual_context": "The 'AI Demo Magic Link' funnel step overview with a 'View page' icon. A new browser tab opens showing a form titled 'Generate Your AI Demo with 1-Click'.", "warnings": null}, {"step_number": 4, "title": "Understand the Demo Generation Form", "description": "Familiarize yourself with the fields on the 'Generate Your AI Demo with 1-Click' form: First Name, Phone, Company Name, Company Type (e.g., Roofing Company, Dental Office, Plumber), Company Website, and Website Mobile Screenshot. Note that providing a company website allows the AI to scrape information for the demo, and uploading a mobile screenshot will show how the chat widget would look on their site.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:54", "visual_context": "The 'Generate Your AI Demo with 1-Click' form with input fields for personal and company information, and an upload field for a mobile screenshot.", "warnings": null}, {"step_number": 5, "title": "Download the AI Chatbot Sales Process Document", "description": "Return to the course page. In the 'Attached Files' section, locate 'AI Chatbot Sales Process.pdf' and click the download icon to save it to your computer.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:00", "visual_context": "Course page showing 'Attached Files' section with 'AI Chatbot Sales Process.pdf' and a download icon next to it.", "warnings": null}, {"step_number": 6, "title": "Review the AI Chatbot Sales Process Document", "description": "Open the downloaded 'AI Chatbot Sales Process.pdf'. Read through the document carefully to understand the various sales scenarios, including 'The Inbound Protocol (Dual Flows)', 'The Self-Serve Flow (Landing Page)', 'The Concierge Flow (DM Ad)', 'The Pivot (Universal VSL Handoff)', 'The Closing Loop (The Calculator)', and 'The Onboarding Call (The Close)'. This document provides detailed scripts and instructions for each phase of the sales process.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:09", "visual_context": "PDF viewer displaying 'AI Chatbot Sales Process.pdf', showing different sections and scenarios of the sales process.", "warnings": "Ensure you read this document thoroughly to understand all possible sales scenarios and how to handle them."}, {"step_number": 7, "title": "Access the Video Sales Letter (VSL) Page", "description": "Return to the CRM funnel steps. Click on the 'Home' funnel step. Then, click the 'View page' icon to open the pre-built VSL page in a new browser tab.", "url": "https://app.blackumbrella.app/home", "input_field": null, "uses_variable": null, "timestamp": "03:00", "visual_context": "CRM funnel steps, 'Home' step highlighted, then a new browser tab opens showing the VSL page with a video and text 'You're Losing $90,000+ Every Year Because You Text Back in 2 Hours, Not 2 Seconds'.", "warnings": null}, {"step_number": 8, "title": "Download the VSL Example Script", "description": "Return to the course page. In the 'Attached Files' section, locate 'AI Chatbot - VSL Example (AI Agency).pdf' and click the download icon. This PDF contains the script for the VSL.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:15", "visual_context": "Course page showing 'Attached Files' section with 'AI Chatbot - VSL Example (AI Agency).pdf' and a download icon next to it.", "warnings": null}, {"step_number": 9, "title": "Review and Customize the VSL Script", "description": "Open the downloaded 'AI Chatbot - VSL Example (AI Agency).pdf'. Review the script and modify it with your clients' information or your agency's specifics. You can then record yourself delivering this VSL.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:25", "visual_context": "PDF viewer displaying 'AI Chatbot - VSL Example (AI Agency).pdf', showing the script for the video sales letter.", "warnings": "It is recommended to customize the VSL script to resonate better with your target audience and clients."}, {"step_number": 10, "title": "Utilize the Lost Revenue Calculator", "description": "On the VSL page, scroll down to the 'Find Out Your Lost Revenue' section. Input hypothetical or actual client data into the fields: 'How many new leads do you get per month?', 'How many book appointments?', 'How many appointments become clients?', 'Your close rate', 'How many times do you follow up?', and 'Old contacts who haven't bought 90+ days?'. Click 'SHOW MY LOST REVENUE' to demonstrate to potential clients how much money they are losing by not having an AI chatbot.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:10", "visual_context": "VSL page showing the 'Find Out Your Lost Revenue' calculator with input fields and a 'SHOW MY LOST REVENUE' button. After clicking, it displays a summary of 'Money You're Missing Out On' with figures like $90,000.", "warnings": "This calculator is a powerful tool for demonstrating ROI; use it effectively during sales calls."}, {"step_number": 11, "title": "Access the Pricing Page", "description": "Return to the CRM funnel steps. Click on the 'Pricing' funnel step. Then, click the 'View page' icon to open the pricing page in a new browser tab.", "url": "https://app.blackumbrella.app/pricing", "input_field": null, "uses_variable": null, "timestamp": "05:05", "visual_context": "CRM funnel steps, 'Pricing' step highlighted, then a new browser tab opens showing the pricing page with 'Essential', 'Professional', and 'Custom' AI System plans.", "warnings": null}, {"step_number": 12, "title": "Access the Magic Demo Landing Page", "description": "Return to the CRM funnel steps. Click on the 'Magic Demo Landing' funnel step. Then, click the 'View page' icon to open the demo landing page in a new browser tab. This page is what leads will see on their phone to start their AI demo.", "url": "https://app.blackumbrella.app/magic-demo-landing", "input_field": null, "uses_variable": null, "timestamp": "05:20", "visual_context": "CRM funnel steps, 'Magic Demo Landing' step highlighted, then a new browser tab opens showing a page with 'Click The Button Below To Start Your Demo' and a 'START AI DEMO' button. The page is shown in a mobile view using developer tools.", "warnings": null}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod2-les2"});
