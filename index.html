null, "timestamp": "00:49", "visual_context": "\"Set project instructions\" dialog with the prompt content pasted.", "warnings": null}, {"step_number": 9, "title": "Save the project instructions", "description": "Click the \"Save instructions\" button to apply the prompt content as the project's instructions.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:52", "visual_context": "\"Set project instructions\" dialog with \"Save instructions\" button clicked.", "warnings": null}, {"step_number": 10, "title": "Initiate a conversation with the AI Voice Agent Prompt Forge", "description": "In the chat input field, type \"help me create the ai voice prompt\" and press Enter. This will activate the AI Voice Agent Prompt Forge, which will then guide you through creating a voice agent prompt.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:55", "visual_context": "Chat input field with the message typed and Claude AI responding.", "warnings": null}, {"step_number": 11, "title": "Understand the initial questions from the AI Voice Agent Prompt Forge", "description": "The AI will respond, introducing itself as PromptForge and asking you to specify the type of AI Voice agent you need (Calendar Booking Agent for single timezone/local business or Calendar Link Sending Agent for multi-timezone business) and your business timezone. These are the initial steps to tailor the prompt to your specific needs.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:04", "visual_context": "Claude AI's response with the initial questions.", "warnings": "Follow the prompts from Claude AI to provide details about your business and the desired AI voice agent type."}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod7-les5"});
loadSop('m7_06', {"title": "AI Voice Agent Setup in Retell AI", "description": "This SOP outlines the detailed steps to configure an AI Voice Agent within the Retell AI dashboard, covering various settings from LLM selection and voice models to functions, knowledge base integration, speech settings, call settings, post-call data extraction, security, webhooks, and custom tools.", "estimated_time": "20 minutes", "steps": [{"step_number": 1, "title": "Open AI Voice Agent Settings", "description": "Navigate to the 'Agents' section in the Retell AI dashboard. Select and open the client template for your AI Voice Agent (e.g., 'AI Voice Agent - CLIENT Black Umbrella').", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:05", "visual_context": "Dashboard showing a list of AI Agents, then opening a specific agent's configuration page.", "warnings": null}, {"step_number": 2, "title": "Review Agent ID and Cost Metrics", "description": "Note the 'Agent ID' (e.g., 'id: a17'). This ID is used in n8n workflows to direct calls to this specific agent. Also, observe the 'Retell LLM ID', 'Cost per minute' (e.g., $0.143/min), 'Estimated Latency' (e.g., 1070-1550ms), and 'Estimated Tokens' (e.g., 5222-5502 tokens). The latency should ideally be under 2 seconds.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:29", "visual_context": "Top bar of the agent configuration showing Agent ID, Retell LLM ID, cost, latency, and token count.", "warnings": "Prompts exceeding 3500 tokens will incur a surcharge. Optimize token usage to avoid extra costs."}, {"step_number": 3, "title": "Select LLM and Tier", "description": "Click on the 'GPT 4.1 Fast' dropdown. Select 'GPT 4.1 Fast' and choose 'Fast Tier'. The Fast Tier uses a dedicated resource pool for higher availability and consistent latency, which is recommended despite being slightly more expensive. Avoid slower models like GPT 5 or Claude Sonnet/Opus for real-time interactions.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:16", "visual_context": "Dropdown menu showing various GPT and Claude models with their respective costs and tiers.", "warnings": "Using slower LLMs (e.g., GPT 5, Claude Sonnet/Opus) will result in higher latency (e.g., 5-second responses), which is not ideal for real-time voice agents."}, {"step_number": 4, "title": "Configure LLM Temperature", "description": "Click on the 'LLM Temperature' setting (represented by a thermometer icon). Set the temperature to '0.00'. A lower value yields better function call results and ensures the agent follows the prompt as deterministically as possible.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:33", "visual_context": "LLM Temperature slider and Structured Output toggle.", "warnings": null}, {"step_number": 5, "title": "Select Voice Provider and Voice", "description": "Click on the voice icon (e.g., 'Grace'). In the 'Select Voice' modal, choose 'ElevenLabs' as the provider. Select one of the 'Recommended Voices' (e.g., 'Grace', 'Hailey', 'Nia', 'Nico') by clicking on it. You can preview voices by clicking the play button. You can also add a custom voice from ElevenLabs if you have one generated.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:53", "visual_context": "Select Voice modal with tabs for ElevenLabs, Cartesia, MiniMax, OpenAI, and a list of recommended voices.", "warnings": "ElevenLabs and Cartesia are generally recommended for better voice quality and performance compared to MiniMax and OpenAI for voice agents."}, {"step_number": 6, "title": "Configure Voice Model", "description": "Click on the cogwheel icon next to the voice selection. For 'Voice Model', keep it on 'Auto (ElevenLabs Turbo V2)' if your agent will only speak English. If your agent needs to be multilingual, select 'ElevenLabs Turbo V2.5'. It is recommended to create separate bots for different languages (e.g., one for English, one for Spanish) and explicitly instruct the prompt to 'ALWAYS REPLY IN SPANISH' for the Spanish bot.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:53", "visual_context": "Voice Model dropdown with options like Auto (ElevenLabs Turbo V2), ElevenLabs Turbo V2.5, ElevenLabs Flash V2, and Multilingual options.", "warnings": "For multilingual agents, explicitly state the language in the prompt (e.g., 'ALWAYS REPLY IN SPANISH') for better consistency, rather than relying solely on the multilingual voice model."}, {"step_number": 7, "title": "Set Welcome Message", "description": "Scroll down to the 'Welcome Message' section. Ensure 'AI speaks first' is selected. In the 'Custom message' field, enter a welcoming phrase that also clarifies the agent's nature, such as: 'Hello, this is Maya from Black Umbrella a digital assistant here, how can I help you?'. This helps manage user expectations.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:08", "visual_context": "Welcome Message section with options for AI speaks first/User speaks first and a custom message input field.", "warnings": "Clearly stating that the agent is a 'digital assistant' or 'AI' at the beginning of the call can prevent confusion if unexpected responses occur."}, {"step_number": 8, "title": "Configure 'End Call' Function", "description": "Under the 'Functions' section, click on 'end_call'. The description should be: 'End the call when user has to leave (like says bye) or you are instructed to do so.' You can customize this description if needed. Click 'Update' to save.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "06:12", "visual_context": "Functions section with 'end_call' listed. A modal pops up showing 'End Call' configuration.", "warnings": null}, {"step_number": 9, "title": "Add 'Agent Transfer' Function (for Multilingual Support)", "description": "Click 'Add' under 'Functions' and select 'Agent Transfer'.\n1. Set 'Function Name' to 'agent_transfer_spanish_representative'.\n2. Set 'Description' to 'Use this function to transfer to our spanish representative if the client speaks in spanish or needs a spanish representative.'.\n3. Under 'Select Agent', choose your Spanish-speaking AI agent (e.g., 'AI Voice Demo Bot (ESP) - (Latest)').\n4. Check 'Speak During Execution' and enter an 'Execution Message' like: 'I will transfer you to our spanish rep now'.\n5. For 'Post Call Analysis Setting', select 'Both this agent and transferred agent'.\n6. For 'Webhook Setting', select 'Only this agent'.\n7. Click 'Save'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "07:29", "visual_context": "Functions dropdown, then Agent Transfer modal with fields for Function Name, Description, Select Agent, Execution Message, Post Call Analysis Setting, and Webhook Setting.", "warnings": "Ensure the function name and description are as descriptive as possible, as this information is used by the AI to understand when to trigger the function. Make sure to select the correct agent for the transfer."}, {"step_number": 10, "title": "Add 'Extract Dynamic Variable' Function", "description": "Click 'Add' under 'Functions' and select 'Extract Dynamic Variable'.\n1. Set 'Function Name' to 'extract_user_details'.\n2. Set 'Description' to 'e.g. Extract the user's details like name, email, age, etc. from the conversation'.\n3. Under 'Variables', click 'Add'.\n4. For 'Variable Name', enter 'age'.\n5. For 'Variable Description', enter 'extract the age from the user'.\n6. For 'Variable Type', select 'Number'.\n7. Click 'Save'.\nThis allows the AI to pull specific pieces of information from the conversation.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "09:46", "visual_context": "Functions dropdown, then Extract Dynamic Variable modal with fields for Function Name, Description, and a section to add variables.", "warnings": "The AI will attempt to extract information based on the variable description. Be precise with your descriptions to ensure accurate data extraction."}, {"step_number": 11, "title": "Add Knowledge Base", "description": "Under 'Knowledge Base', click 'Add'.\n1. Enter a 'Knowledge Base Name' (e.g., 'Black umbrella').\n2. Under 'Documents', choose 'Add Text'.\n3. Manually add your articles or Q&A pairs. It is recommended to organize your data in a clear Question and Answer format for optimal AI understanding.\n4. Click 'Save'.\n(Note: 'Add Web Pages' is not recommended as it may pull irrelevant information).", "url": null, "input_field": null, "uses_variable": null, "timestamp": "10:24", "visual_context": "Knowledge Base section, then 'Add Knowledge Base' modal with fields for name and document upload/text input options.", "warnings": "Avoid using 'Add Web Pages' as it can lead to the AI pulling irrelevant information. Manually adding text or uploading structured files (like Q&A) is preferred for better control over the knowledge base content."}, {"step_number": 12, "title": "Configure Speech Settings", "description": "Under 'Speech Settings':\n1. 'Background Sound': Set to 'None' or choose a relevant background sound (e.g., 'Call Center') and adjust 'Background Sound Volume' if desired.\n2. 'Responsiveness': Keep at '1' (fastest response). Lowering it will increase latency.\n3. 'Interruption Sensitivity': Keep at '0.8'. This controls how sensitive the AI is to being interrupted by human speech.\n4. 'Enable Backchanneling': Keep this OFF. This feature allows the AI to say 'yeah' or 'uh-huh' during conversations, which can sometimes sound unnatural.\n5. 'Enable Speech Normalization': Keep this ON. It converts text elements like numbers, currency, and dates into human-like spoken forms.\n6. 'Reminder Message Frequency': Set to '45 seconds' and '1 times'. This reminds the user if they don't speak for an extended period.\n7. 'Pronunciation': Click 'Add' to add custom pronunciations for specific words or names that are not commonly known.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "10:56", "visual_context": "Speech Settings section with various sliders and toggles for background sound, responsiveness, interruption sensitivity, backchanneling, speech normalization, reminder frequency, and pronunciation.", "warnings": "Experiment with responsiveness and interruption sensitivity to find the optimal balance for your agent's conversational flow. Avoid backchanneling unless specifically required for a very human-like interaction."}, {"step_number": 13, "title": "Configure Realtime Transcription Settings", "description": "Under 'Realtime Transcription Settings':\n1. 'Denoising Mode': Select 'Remove noise + background speech'.\n2. 'Transcription Mode': Select 'Optimize for accuracy'.\n3. 'Vocabulary Specialization': Choose 'General' (works well across most industries). If your business uses specific medical terms, select 'Medical'.\n4. 'Boosted Keywords': Provide a comma-separated list of keywords to expand the model's vocabulary (e.g., 'Retell, Walmart'). This helps the AI better understand industry-specific terms.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "12:40", "visual_context": "Realtime Transcription Settings section with options for denoising mode, transcription mode, vocabulary specialization, and boosted keywords.", "warnings": null}, {"step_number": 14, "title": "Configure Call Settings", "description": "Under 'Call Settings':\n1. 'Voicemail Detection': This is primarily for outbound calls. You can choose to 'Hang up' or 'Leave a voicemail' if a voicemail is detected.\n2. 'IVR Hangup': If an IVR system is detected, the agent will hang up.\n3. 'User Keypad Input Detection': Disable this option.\n4. 'End Call on Silence': Set to '1.0m' (1 minute). This ends the call if the user stays silent for an extended period, saving costs.\n5. 'Max Call Duration': Set to '5.0m' (5 minutes). This is a typical average, but you can adjust it to be roughly twice your average call duration.\n6. 'Ring Duration': Set to '30s' (30 seconds). This is the maximum ringing duration before the outbound call/transfer call is deemed no answer.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "13:19", "visual_context": "Call Settings section with toggles and sliders for voicemail detection, IVR hangup, user keypad input, end call on silence, max call duration, and ring duration.", "warnings": "Adjust 'End Call on Silence' and 'Max Call Duration' to optimize for cost efficiency while maintaining a good user experience."}, {"step_number": 15, "title": "Configure Post-Call Data Extraction", "description": "Under 'Post-Call Data Extraction':\n1. 'Call Summary': This is automatically extracted.\n2. 'Call Successful': This is automatically extracted.\n3. To add custom data extraction, click 'Add'.\n   a. For 'Name', enter 'user_gender'.\n   b. For 'Description', enter 'the gender of the user we spoke to.'.\n   c. For 'Format Example (Optional)', enter 'Male (M)'.\n   d. Click 'Save'.\nThese extracted fields will be sent to your n8n Post-Call Analysis workflow.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "14:01", "visual_context": "Post-Call Data Extraction section with default fields and an 'Add' button. A modal for adding a new text field appears.", "warnings": "Ensure the 'Description' and 'Format Example' for custom extractions are clear to guide the AI in accurately extracting the desired data."}, {"step_number": 16, "title": "Configure Security & Fallback Settings", "description": "Under 'Security & Fallback Settings':\n1. 'Data Storage Settings': Choose how Retell stores sensitive data. You can select 'Everything', 'Everything except PII', or 'Basic Attributes Only'.\n2. 'Personal Info Redaction (PII)': Set up if you want to redact specific categories of sensitive data.\n3. 'Opt-in Secure URLs': Add security signatures to URLs if needed.\n4. 'Fallback Voice ID': Click 'Add' and select a different voice from a *different* provider (e.g., Cartesia Grace) than your main voice. This acts as a backup if your primary voice provider experiences API issues.\n5. 'Default Dynamic Variables': Set up if you have any variables in your prompt that might not always be provided. You can add default values here.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "15:36", "visual_context": "Security & Fallback Settings section with data storage, PII, secure URLs, fallback voice ID, and default dynamic variables options.", "warnings": "It is crucial to select a fallback voice from a *different* provider to ensure redundancy in case of API outages with your primary provider. You cannot use two voices from the same provider as main and fallback."}, {"step_number": 17, "title": "Configure Webhook Settings", "description": "Under 'Webhook Settings':\n1. 'Agent Level Webhook URL': Go to your n8n workflow for 'AI Voice Delta Response System - Inbound'. Click on the 'Outbound Post-Call Webhook' node. Switch to 'Production URL' and copy the URL. Paste this URL into the 'Agent Level Webhook URL' field in Retell AI.\n2. 'Webhook Timeout': Set to '5s'. This is the maximum time to wait for a webhook response before timing out.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "16:36", "visual_context": "Webhook Settings section in Retell AI, then switching to n8n workflow to copy the Production URL from the 'Outbound Post-Call Webhook' node.", "warnings": "Always use the 'Production URL' from n8n for live agents. Ensure the webhook timeout is sufficient for your n8n workflow to process the data."}, {"step_number": 18, "title": "Add MCP (Tools) Configuration", "description": "Under 'MCPs':\n1. Click 'Add MCP'.\n2. For 'Enter the name of the MCP', enter 'n8n-blackumbrella' (or your client's name).\n3. For 'Enter the URL of the MCP', go to your n8n workflow for 'AI Voice Delta Response System - Inbound'. Click on the 'MCP Server Trigger' node under 'Agent Tools'. Switch to 'Production URL' and copy the URL. Paste this URL into the 'Enter the URL of the MCP' field in Retell AI.\n4. Set 'Timeout (ms)' to '10000'.\n5. Click 'Save'.\n6. After adding the MCP, click 'Add Tools'.\n7. Select the tools you want the agent to use (e.g., 'book_appointment_tool_blackumbrella').\n8. Check 'Speak During Execution' and enter a message like 'Let me lock that in time in for you.'\n9. Check 'Speak After Execution' to have the agent provide feedback after the tool runs (e.g., for errors or success).\n10. Click 'Save'.\n(Note: If you make any changes to your n8n Agent Tools, you must delete the MCP in Retell AI and re-add it with the updated Production URL from n8n.)", "url": null, "input_field": null, "uses_variable": null, "timestamp": "16:53", "visual_context": "MCPs section in Retell AI, then 'Add MCP' modal. Switching to n8n workflow to copy the Production URL from the 'MCP Server Trigger' node. Then 'Add Tool' modal.", "warnings": "Any changes to n8n Agent Tools (adding/renaming tools) require deleting and re-adding the MCP in Retell AI to ensure synchronization. Ensure tool names are unique across general tools and tools of the state-to-state transitions."}, {"step_number": 19, "title": "Publish Agent", "description": "Once all settings are configured and saved, click the 'Publish' button in the top right corner. Enter a 'Version name' (e.g., 'V1') and an optional 'Description'. Click 'Publish' again to deploy your agent.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "19:32", "visual_context": "Publish button in the top right, then 'Publish' modal with fields for version name and description.", "warnings": "Always publish your agent after making any changes to ensure the new configurations are live."}], "variables_summary": [{"variable_name": "n8nRootPassword", "label": "n8n VPS Root Password", "type": "password", "used_in_future_steps": "No"}, {"variable_name": "n8nLoginUrl", "label": "n8n Login URL", "type": "text", "used_in_future_steps": "No"}, {"variable_name": "n8nLicenseKey", "label": "n8n License Key", "type": "text", "used_in_future_steps": "No"}, {"variable_name": "anthropicApiKey", "label": "Anthropic API Key", "type": "password", "used_in_future_steps": "No"}, {"variable_name": "geminiApiKey", "label": "Gemini API Key", "type": "password", "used_in_future_steps": "No"}, {"variable_name": "openaiApiKey", "label": "OpenAI API Key", "type": "password", "used_in_future_steps": "No"}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod7-les6"});
loadSop('m7_07', {"title": "AI Voice Delta Outbound System Setup", "description": "This SOP guides you through setting up the AI Voice Delta Outbound System, including configuring webhooks in n8n, setting up outbound agents in Retell AI, and integrating with GoHighLevel for call triggering and post-call analysis. It also covers configuring calendar booking and booking link sending functionalities.", "estimated_time": "30 minutes", "steps": [{"step_number": 1, "title": "Configure MCP Server Trigger Path", "description": "In the n8n workflow, navigate to the 'Agent Tools' section and click on the 'MCP Server Trigger' node. In the 'Path' field, change the existing path to include your client's name. For example, if your client is 'Black Umbrella', the path could be 'mcp-outbound-client-blackumbrella'. This ensures a unique identifier for your client's outbound calls.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:54", "visual_context": "n8n workflow editor, 'MCP Server Trigger' node properties open, showing 'Path' field being edited.", "warnings": "Ensure each client has a unique path for their webhooks to prevent conflicts."}, {"step_number": 2, "title": "Configure Booking Link Sender Webhook Path", "description": "Navigate to the 'Booking Link Sender AI Voice Agent - OUTBOUND CALL' section and click on the 'Inbound Webhook2' node. In the 'Path' field, update the path to include your client's name and specify it's for the link sender. For example, 'outbound-client-blackumbrella-link'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:17", "visual_context": "n8n workflow editor, 'Inbound Webhook2' node properties open, showing 'Path' field being edited.", "warnings": "Ensure each client has a unique path for their webhooks to prevent conflicts."}, {"step_number": 3, "title": "Configure Calendar Booking Webhook Path", "description": "Navigate to the 'Calendar Booking AI Voice Agent - OUTBOUND CALL' section and click on the 'Inbound Webhook' node. In the 'Path' field, update the path to include your client's name and specify it's for calendar booking. For example, 'outbound-client-blackumbrella-calendar'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:37", "visual_context": "n8n workflow editor, 'Inbound Webhook' node properties open, showing 'Path' field being edited.", "warnings": "Ensure each client has a unique path for their webhooks to prevent conflicts."}, {"step_number": 4, "title": "Configure Post-Call Analysis Webhook Path", "description": "Navigate to the 'Post-Call Analysis' section and click on the 'Outbound Post-Call Webhook' node. In the 'Path' field, update the path to include your client's name and specify it's for post-call analysis. For example, 'outbound-post-call-analysis-client-blackumbrella'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:51", "visual_context": "n8n workflow editor, 'Outbound Post-Call Webhook' node properties open, showing 'Path' field being edited.", "warnings": "Ensure each client has a unique path for their webhooks to prevent conflicts."}, {"step_number": 5, "title": "Save and Publish n8n Workflow", "description": "After configuring all webhook paths, click the 'Save' button in the top right corner of the n8n editor, then click 'Publish' to make the workflow active.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:09", "visual_context": "n8n workflow editor, showing 'Save' and 'Publish' buttons.", "warnings": "Always save and publish your n8n workflow after making changes for them to take effect."}, {"step_number": 6, "title": "Add Webhook URL to GoHighLevel Outbound Agent Trigger", "description": "In your GoHighLevel account, navigate to 'Automation' -> 'Workflows'. Open the '[Voice AI] Outbound Agent Trigger' workflow. Click on the 'Outbound AI Voice Agent Webhook' node. Copy the 'Production URL' from the 'Inbound Webhook2' node (Booking Link Sender) in n8n (from Step 2) and paste it into the 'URL' field of the GoHighLevel webhook. Save and Publish the GoHighLevel workflow.", "url": "https://crm.blackumbrella.app/v2/workflows", "input_field": null, "uses_variable": null, "timestamp": "02:14", "visual_context": "GoHighLevel workflow editor, 'Outbound AI Voice Agent Webhook' node properties open, showing 'URL' field.", "warnings": "Ensure the GoHighLevel workflow is published for the trigger to work. The video uses the 'Inbound Webhook2' URL for the trigger, implying this workflow is for the booking link sender. If you intend to use the calendar booking agent, use the URL from 'Inbound Webhook' instead."}, {"step_number": 7, "title": "Duplicate Inbound Retell AI Agent for Outbound Use", "description": "In Retell AI, navigate to 'Agents'. Select an existing inbound agent (e.g., 'AI Voice Agent - CLIENT Black Umbrella'). Click the three dots next to it and choose 'Duplicate'. Select the latest version (e.g., 'V2 - Current') and click 'Duplicate'.", "url": "https://dashboard.retellai.com/agents", "input_field": null, "uses_variable": null, "timestamp": "04:50", "visual_context": "Retell AI dashboard, 'All Agents' list, showing duplicate option for an agent.", "warnings": "Duplicating an existing agent saves time as you can reuse its core prompts and settings."}, {"step_number": 8, "title": "Rename Outbound Retell AI Agent", "description": "Open the newly duplicated agent. Change its name to clearly indicate it's an outbound agent (e.g., 'AI Voice Agent - CLIENT Black Umbrella - OUTBOUND'). Click 'Publish' to save the name change.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:20", "visual_context": "Retell AI agent editor, agent name field being edited.", "warnings": "Publishing the agent saves the changes and makes it available for use."}, {"step_number": 9, "title": "Configure MCPs for Outbound Retell AI Agent", "description": "In the Retell AI agent editor, navigate to the 'MCPs' section. Add a new MCP by clicking 'Add MCP'. Enter a name (e.g., 'n8n outbound') and paste the 'Production URL' from the 'MCP Server Trigger' node in n8n (from Step 1) into the 'Enter the URL of the MCP' field. Click 'Save'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:34", "visual_context": "Retell AI agent editor, 'MCPs' section, adding a new MCP.", "warnings": "This step is crucial for the Retell AI agent to communicate with your n8n workflow for outbound calls."}, {"step_number": 10, "title": "Enable Outbound Call Agent for Phone Number in Retell AI", "description": "In Retell AI, navigate to 'Phone Numbers'. Select the phone number you want to use for outbound calls. Under 'Outbound Call Agent', select the newly created outbound agent (e.g., 'AI Voice Agent - CLIENT Black Umbrella - OUTBOUND'). If the agent is in 'Draft' status, ensure you publish it first. You can also configure 'Allowed Outbound Countries' if needed.", "url": "https://dashboard.retellai.com/phone-numbers", "input_field": null, "uses_variable": null, "timestamp": "06:27", "visual_context": "Retell AI phone numbers settings, 'Outbound Call Agent' dropdown being selected.", "warnings": "Ensure the selected agent is published for it to appear in the dropdown. This links your phone number to the outbound AI agent."}, {"step_number": 11, "title": "Get GoHighLevel Location ID and Private Key", "description": "In your GoHighLevel account, navigate to 'Settings' -> 'Business Profile'. Copy the 'Location ID' displayed at the top. Then, go to 'Private Integrations' and create a new private integration (if you don't have one). Name it (e.g., 'n8n-2'), select all scopes, and create it. Copy the generated 'Private Key'. Save both the Location ID and Private Key in a secure place (e.g., a notepad).", "url": "https://crm.blackumbrella.app/settings/business-profile", "input_field": {"variable_name": "ghlLocationId", "label": "GoHighLevel Location ID", "type": "string"}, "uses_variable": null, "timestamp": "07:14", "visual_context": "GoHighLevel settings, 'Business Profile' and 'Private Integrations' sections.", "warnings": "The Private Key is sensitive information; keep it secure. Ensure all scopes are selected for the private integration to grant necessary permissions."}, {"step_number": 12, "title": "Get Retell AI Agent ID", "description": "In Retell AI, navigate to 'Agents'. Click on your newly created outbound agent (e.g., 'AI Voice Agent - CLIENT Black Umbrella - OUTBOUND'). Copy the 'Agent ID' from the URL in your browser (it's usually a long alphanumeric string after '/agent/'). Save this ID in your notes.", "url": null, "input_field": {"variable_name": "retellAgentIdOutbound", "label": "Retell AI Outbound Agent ID", "type": "string"}, "uses_variable": null, "timestamp": "08:29", "visual_context": "Retell AI agent editor, showing the Agent ID in the browser URL.", "warnings": "The Agent ID is unique to your specific Retell AI agent."}, {"step_number": 13, "title": "Get GoHighLevel Calendar ID", "description": "In your GoHighLevel account, navigate to 'Calendars'. Select the calendar you want the AI agent to book appointments in. Copy the 'Calendar ID' from the URL in your browser (it's usually a long alphanumeric string after '/calendars/'). Save this ID in your notes.", "url": "https://crm.blackumbrella.app/calendars", "input_field": {"variable_name": "ghlCalendarId", "label": "GoHighLevel Calendar ID", "type": "string"}, "uses_variable": null, "timestamp": "08:45", "visual_context": "GoHighLevel calendars, showing the Calendar ID in the browser URL.", "warnings": "Ensure you select the correct calendar for bookings."}, {"step_number": 14, "title": "Get Retell AI Phone Number", "description": "In Retell AI, navigate to 'Phone Numbers'. Copy the phone number (e.g., '+17868839886') that you configured for the outbound agent in Step 10. Save this number in your notes.", "url": "https://dashboard.retellai.com/phone-numbers", "input_field": {"variable_name": "retellPhoneNumberOutbound", "label": "Retell AI Outbound Phone Number", "type": "string"}, "uses_variable": null, "timestamp": "09:07", "visual_context": "Retell AI phone numbers settings, showing the phone number.", "warnings": "This is the 'from_number' that the AI agent will use for outbound calls."}, {"step_number": 15, "title": "Get Retell AI API Key", "description": "In Retell AI, navigate to 'Settings' -> 'API Keys'. If you don't have an API key, click 'Add Key', give it a name (e.g., 'n8n'), and click 'Create'. Copy the 'Key Value' (Secret Key) displayed. Save this key in your notes.", "url": "https://dashboard.retellai.com/settings/api-keys", "input_field": {"variable_name": "retellApiKey", "label": "Retell AI API Key", "type": "string"}, "uses_variable": null, "timestamp": "09:25", "visual_context": "Retell AI settings, 'API Keys' section, showing how to create and copy an API key.", "warnings": "The API Key is sensitive information; keep it secure. This key is used for authentication when making API calls to Retell AI."}, {"step_number": 16, "title": "Configure 'Edit Fields1' (Post-Call Analysis) in n8n", "description": "In the n8n workflow, navigate to the 'Post-Call Analysis' section and click on the 'Edit Fields1' node. Paste your GoHighLevel 'Location ID' (from Step 11) into the 'location_id' field and your GoHighLevel 'Private Key' (from Step 11) into the 'private_key' field.", "url": null, "input_field": null, "uses_variable": ["ghlLocationId", "ghlPrivateKey"], "timestamp": "08:05", "visual_context": "n8n workflow editor, 'Edit Fields1' node properties open, showing 'location_id' and 'private_key' fields being populated.", "warnings": null}, {"step_number": 17, "title": "Configure 'Edit Fields' (Calendar Booking) in n8n", "description": "In the n8n workflow, navigate to the 'Calendar Booking AI Voice Agent - OUTBOUND CALL' section and click on the 'Edit Fields' node. Paste the following values into their respective fields:\n- 'location_id': GoHighLevel Location ID (from Step 11)\n- 'private_key': GoHighLevel Private Key (from Step 11)\n- 'agent_id': Retell AI Outbound Agent ID (from Step 12)\n- 'calendar_id': GoHighLevel Calendar ID (from Step 13)\n- 'from_number': Retell AI Outbound Phone Number (from Step 14)\n- 'retell_api_key': Retell AI API Key (from Step 15)", "url": null, "input_field": null, "uses_variable": ["ghlLocationId", "ghlPrivateKey", "retellAgentIdOutbound", "ghlCalendarId", "retellPhoneNumberOutbound", "retellApiKey"], "timestamp": "08:15", "visual_context": "n8n workflow editor, 'Edit Fields' node properties open, showing multiple fields being populated.", "warnings": null}, {"step_number": 18, "title": "Configure 'Edit Fields3' (Booking Link Sender) in n8n", "description": "In the n8n workflow, navigate to the 'Booking Link Sender AI Voice Agent - OUTBOUND CALL' section and click on the 'Edit Fields3' node. Paste the following values into their respective fields:\n- 'location_id': GoHighLevel Location ID (from Step 11)\n- 'private_key': GoHighLevel Private Key (from Step 11)\n- 'agent_id': Retell AI Outbound Agent ID (from Step 12)\n- 'from_number': Retell AI Outbound Phone Number (from Step 14)\n- 'retell_api_key': Retell AI API Key (from Step 15)", "url": null, "input_field": null, "uses_variable": ["ghlLocationId", "ghlPrivateKey", "retellAgentIdOutbound", "retellPhoneNumberOutbound", "retellApiKey"], "timestamp": "09:53", "visual_context": "n8n workflow editor, 'Edit Fields3' node properties open, showing multiple fields being populated.", "warnings": null}, {"step_number": 19, "title": "Configure 'send_booking_link' Tool in n8n", "description": "In the n8n workflow, navigate to the 'Agent Tools' section and click on the 'send_booking_link' tool. Under 'Header Parameters', paste your GoHighLevel 'Private Key' (from Step 11) into the 'Bearer' field for 'Authorization'. Under 'Body Parameters', update the 'message' field with your desired booking link (e.g., 'Here is the booking link: https://www.booking.com').", "url": null, "input_field": null, "uses_variable": ["ghlPrivateKey"], "timestamp": "10:24", "visual_context": "n8n workflow editor, 'send_booking_link' tool properties open, showing 'Authorization' and 'message' fields being populated.", "warnings": "Ensure the booking link is correct and accessible to your clients."}, {"step_number": 20, "title": "Configure 'book_appointment' Tool in n8n", "description": "In the n8n workflow, navigate to the 'Agent Tools' section and click on the 'book_appointment' tool. Under 'Header Parameters', paste your GoHighLevel 'Private Key' (from Step 11) into the 'Bearer' field for 'Authorization'. Under 'Body Parameters', paste your GoHighLevel 'Calendar ID' (from Step 13) into the 'calendarId' field and your GoHighLevel 'Location ID' (from Step 11) into the 'locationId' field.", "url": null, "input_field": null, "uses_variable": ["ghlPrivateKey", "ghlCalendarId", "ghlLocationId"], "timestamp": "10:39", "visual_context": "n8n workflow editor, 'book_appointment' tool properties open, showing 'Authorization', 'calendarId', and 'locationId' fields being populated.", "warnings": "Ensure the calendar ID and location ID are correct for appointment bookings."}, {"step_number": 21, "title": "Save and Publish Final n8n Workflow", "description": "After configuring all tools and fields, click the 'Save' button in the top right corner of the n8n editor, then click 'Publish' to make the workflow active.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "11:05", "visual_context": "n8n workflow editor, showing 'Save' and 'Publish' buttons.", "warnings": "Always save and publish your n8n workflow after making changes for them to take effect."}, {"step_number": 22, "title": "Configure Webhook Settings for Outbound Retell AI Agent", "description": "In the Retell AI agent editor (for your outbound agent), navigate to the 'Webhook Settings' section. Copy the 'Production URL' from the 'Outbound Post-Call Webhook' node in n8n (from Step 4) and paste it into the 'Agent-level Webhook URL' field. This will send call summaries to your n8n workflow.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "11:50", "visual_context": "Retell AI agent editor, 'Webhook Settings' section, showing 'Agent-level Webhook URL' field being populated.", "warnings": "This webhook is essential for receiving post-call analysis data from Retell AI."}, {"step_number": 23, "title": "Adjust Welcome Message and Speaking Behavior for Outbound Retell AI Agent", "description": "In the Retell AI agent editor, navigate to the 'Welcome Message' section. You can choose whether 'AI speaks first' or 'User speaks first'. If 'User speaks first' is selected, you can enable 'AI starts speaking after silence' and set a 'Silence Time' (e.g., 2s) to prompt the AI to speak if the user remains silent. You can also customize the static message or use a dynamic message based on the prompt.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "12:47", "visual_context": "Retell AI agent editor, 'Welcome Message' section, showing options for speaking behavior.", "warnings": "Tailor the welcome message and speaking behavior to suit your outbound call strategy."}, {"step_number": 24, "title": "Generate/Tweak Outbound Agent Prompt using AI Voice Prompt Forge (Optional)", "description": "If you need to create or refine your outbound agent's prompt, go to Claude AI and use the 'AI Voice Prompt Forge'. You can paste your existing inbound prompt and instruct Claude to 'add this system prompt to canvas verbatim so we can edit it.' Then, you can tell it to 'turn this prompt into an outbound agent prompt that will XYZ' (where XYZ is your specific outbound goal). This helps generate a tailored prompt for your outbound agent.", "url": "https://claude.ai/projects/cl1d0ad0c000001jtg3000789/c1d0ad0c000001jtg3000789", "input_field": null, "uses_variable": null, "timestamp": "13:40", "visual_context": "Claude AI interface, showing the 'AI Voice Prompt Forge' and instructions for generating/editing a prompt.", "warnings": "Carefully review the generated prompt to ensure it aligns with your outbound strategy and desired tone."}], "variables_summary": [{"variable_name": "ghlLocationId", "label": "GoHighLevel Location ID", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "ghlPrivateKey", "label": "GoHighLevel Private Key", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "retellAgentIdOutbound", "label": "Retell AI Outbound Agent ID", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "ghlCalendarId", "label": "GoHighLevel Calendar ID", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "retellPhoneNumberOutbound", "label": "Retell AI Outbound Phone Number", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "retellApiKey", "label": "Retell AI API Key", "type": "string", "used_in_future_steps": "Yes"}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod7-les7"});
loadSop('m7_08', {"title": "Extracting Custom Data from AI Voice Agent Calls and Sending to CRM", "description": "This SOP details how to configure an AI Voice Agent to extract custom data (like a user's first name) from conversations, process it using n8n, and then update a contact record in a CRM (HighLevel) with the extracted information. It covers setting up the extraction field in the AI agent, configuring the n8n workflow to pull and send this data, and finally mapping it to a contact field in the CRM.", "estimated_time": "15 minutes", "steps": [{"step_number": 1, "title": "Understand Post-Call Data Extraction", "description": "Familiarize yourself with the 'Post-Call Data Extraction' feature within the AI Voice Agent settings. By default, a 'Call Summary' is extracted from every conversation.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "AI Voice Agent settings page, 'Post-Call Data Extraction' section expanded, showing 'Call Summary' and 'Call Successful' fields.", "warnings": null}, {"step_number": 2, "title": "Review Existing CRM Workflow for Call Summary", "description": "Navigate to your CRM's automation workflow list. Locate and open the 'IVoice AI Post-Call Data Extraction' workflow to understand how the default 'Call Summary' is currently handled.", "url": "https://crm.blackumbrella.app/v2/workflow/620000000000000000000039/edit", "input_field": null, "uses_variable": null, "timestamp": "00:26", "visual_context": "CRM Automation -> Workflow List, showing 'AI Voice Delta Response System' and 'IVoice AI Post-Call Data Extraction' workflows. Then, the workflow builder for 'IVoice AI Post-Call Data Extraction' showing 'Inbound Webhook' triggering 'Update Contact'.", "warnings": null}, {"step_number": 3, "title": "Examine 'Update Contact' Action in CRM Workflow", "description": "Within the 'IVoice AI Post-Call Data Extraction' workflow, click on the 'Update Contact' action. Observe how the 'Phone' and 'AI Voice Call Summary' fields are populated from the inbound webhook request.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:35", "visual_context": "'Update Contact' action details, showing 'Phone' mapped to `{{inboundWebhookRequest.phone}}` and 'AI Voice Call Summary' mapped to `{{inboundWebhookRequest.call_summary}}`.", "warnings": null}, {"step_number": 4, "title": "Review n8n Workflow for Post-Call Analysis", "description": "Access your n8n instance and open the 'AI Voice Delta Response System - Inbound' workflow. Focus on the 'Post-call Analysis' section, which typically includes an 'Outbound Post-Call Webhook' node, 'Edit Fields', 'Search GHL Contact', and 'Send to GHL' nodes.", "url": "https://n8n.ai/workflow/1792/edit", "input_field": null, "uses_variable": null, "timestamp": "00:43", "visual_context": "n8n workflow editor, showing the 'Post-call Analysis' section with interconnected nodes.", "warnings": null}, {"step_number": 5, "title": "Inspect 'Send to GHL' Node in n8n Workflow", "description": "Click on the 'Send to GHL' node in n8n. Go to the 'Parameters' tab to see how `cat_summary` (call summary) and `phone` values are currently being pulled from the webhook data and sent to HighLevel.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:54", "visual_context": "'Send to GHL' node settings, 'Parameters' tab, showing `cat_summary` mapped to `{{$json.body.call.analysis.call_summary}}` and `phone` mapped to `{{$json.body.call.from_number}}`.", "warnings": null}, {"step_number": 6, "title": "Add New Data Extraction Field in AI Voice Agent", "description": "Return to the AI Voice Agent settings. In the 'Post-Call Data Extraction' section, click the '+ Add' button to create a new data extraction field.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:18", "visual_context": "AI Voice Agent settings, 'Post-Call Data Extraction' section. Clicking '+ Add'.", "warnings": null}, {"step_number": 7, "title": "Configure 'first_name' Extraction Field", "description": "In the 'Add Post-Call Data Retrieval' modal, configure the new field:\n- **Name**: `first_name`\n- **Type**: Select 'Text' (default).\n- **Optional**: Toggle this switch ON. This ensures the field is not populated if the AI cannot infer the value.\n- **Description**: Enter 'This is the first name of the user'.\n- **Format Example (Optional)**: Enter 'John' to provide an example of the desired output format.\nClick 'Save'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:29", "visual_context": "'Add Post-Call Data Retrieval' modal with 'Name', 'Optional' toggle, 'Description', and 'Format Example' fields being filled.", "warnings": null}, {"step_number": 8, "title": "Publish AI Voice Agent with New Field", "description": "Click the 'Publish' button in the top right corner of the AI Voice Agent interface. In the 'Publish' modal, click 'Publish' again to apply the changes, including the newly added 'first_name' extraction field.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:24", "visual_context": "'Publish' button clicked, 'Publish' modal appears, then 'Publish' is clicked. A notification 'New version created successfully' appears.", "warnings": null}, {"step_number": 9, "title": "Perform a Test Call to the AI Agent", "description": "Initiate a call to the AI Voice Agent. During the conversation, clearly state your first name (e.g., 'My name is John') to allow the agent to extract this information.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:36", "visual_context": "Phone ringing, AI agent answering, user saying 'My name is John'.", "warnings": null}, {"step_number": 10, "title": "Copy Latest n8n Workflow Execution Data", "description": "After the test call, go to the 'Executions' tab of your n8n workflow. Select the latest successful execution (the one corresponding to your test call) and click 'Copy to editor', then 'Unpin'. This will load the specific webhook data from that call into the editor for inspection.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:00", "visual_context": "n8n 'Executions' tab, clicking on the latest execution, then 'Copy to editor' and 'Unpin'.", "warnings": null}, {"step_number": 11, "title": "Verify 'first_name' in n8n Webhook Data", "description": "In the n8n editor, click on the 'Outbound Post-Call Webhook' node. In the 'Output' tab, navigate through the JSON data to `body.call.analysis.custom_analysis_data`. Confirm that a `first_name` field exists and contains the name you provided during the test call (e.g., 'John').", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:27", "visual_context": "'Outbound Post-Call Webhook' node, 'Output' tab, JSON data showing `custom_analysis_data.first_name: \"John\"`.", "warnings": null}, {"step_number": 12, "title": "Add 'First_name' Parameter to 'Send to GHL' Node in n8n", "description": "Click on the 'Send to GHL' node. In the 'Parameters' tab, click 'Add Parameter'.\n- **Name**: Enter 'First_name'.\n- **Value**: Click 'Fixed Expression' and then use the variable selector to choose the `first_name` from the 'Outbound Post-Call Webhook' data. The expression should look like `{{$json.body.call.analysis.custom_analysis_data.first_name}}`.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:00", "visual_context": "'Send to GHL' node settings, 'Parameters' tab, adding 'First_name' and mapping its value to `{{$json.body.call.analysis.custom_analysis_data.first_name}}`.", "warnings": null}, {"step_number": 13, "title": "Publish n8n Workflow Changes", "description": "Click the 'Publish' button in the n8n workflow editor. In the 'Publish workflow' modal, click 'Publish' to save and activate the changes, ensuring the 'first_name' is now sent to HighLevel.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:45", "visual_context": "'Publish' button clicked, 'Publish workflow' modal, then 'Publish'.", "warnings": null}, {"step_number": 14, "title": "Update CRM Inbound Webhook Trigger Mapping", "description": "Go back to the CRM's 'IVoice AI Post-Call Data Extraction' workflow. Click on the 'Inbound Webhook' trigger. In the 'Mapping Reference' section, select the latest webhook request that includes the 'first_name' field. This updates the webhook's data structure within the CRM workflow.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:54", "visual_context": "CRM workflow editor, 'Inbound Webhook' trigger settings, selecting the latest 'Mapping Reference' which now includes `first_name`.", "warnings": null}, {"step_number": 15, "title": "Map 'First Name' to Contact Field in CRM Workflow", "description": "Click on the 'Update Contact' action in the CRM workflow. Click 'Add field'.\n- **Select Field**: Choose 'First Name'.\n- **Custom Values**: Click the tag icon, then navigate through 'Inbound Webhook Trigger' to find and select 'First Name'. The value should be mapped to `{{inboundWebhookRequest.first_name}}`.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "06:04", "visual_context": "'Update Contact' action details, adding 'First Name' field and mapping it to `{{inboundWebhookRequest.first_name}}`.", "warnings": null}, {"step_number": 16, "title": "Save CRM Workflow Changes", "description": "Click the 'Save' button in the top right corner of the CRM workflow editor to finalize all changes.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "06:34", "visual_context": "'Save' button clicked, confirmation 'Workflow has been saved!'.", "warnings": null}, {"step_number": 17, "title": "Verify End-to-End Data Extraction", "description": "Perform another test call to the AI Voice Agent. After the call, check the contact record in your CRM to ensure that the 'First Name' field has been successfully updated with the name provided during the call.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "06:44", "visual_context": "AI Voice Agent settings, 'Post-Call Data Extraction' section, showing 'Call Summary' and 'First_name'.", "warnings": "This step is a verification step and requires a new test call to fully confirm the setup."}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod7-les8"});
