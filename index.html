ck 'Run' to execute the query and create the database table and necessary functions.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "11:52", "visual_context": "n8n setup instructions with SQL code, Supabase 'SQL Editor' with pasted code, highlighting `base_name_text` variable.", "warnings": "The `base_name_text` should match the name you intend to use for your client's database. Do not change any other part of the SQL code."}, {"step_number": 17, "title": "Verify Supabase Table Creation", "description": "In Supabase, navigate to 'Table Editor'. You should see a new table named 'questions_and_answers_<client_name>' with columns for 'id', 'content', 'metadata', and 'embedding'. It will initially be empty.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "12:54", "visual_context": "Supabase 'Table Editor' showing the newly created table.", "warnings": "It's normal for 'RLS disabled' to be shown; do not worry about it."}, {"step_number": 18, "title": "Configure 'Delete All Database Rows' Node", "description": "In the n8n workflow, open the 'Delete All Database Rows' node. In the 'URL' field, replace `<supabase_project_id>` with your actual Supabase Project ID (from Step 13) and `<database_name>` with your database table name (e.g., 'questions_and_answers_client'). Ensure the URL format is `https://<Supabase Project ID>.supabase.co/rest/v1/<database_name>`. Select your 'Supabase API' credential (from Step 13).", "url": null, "input_field": null, "uses_variable": "supabaseProjectID, supabaseCredential", "timestamp": "13:05", "visual_context": "n8n 'Delete All Database Rows' node parameters, highlighting URL and credential selection.", "warnings": "Make sure to include the dot between the Project ID and 'supabase.co'."}, {"step_number": 19, "title": "Configure 'Get row(s) in sheet' Node", "description": "Open the 'Get row(s) in sheet' node. Select your 'Google Service Account API' credential (from Step 10). In the 'Document' field, select your duplicated Google Sheet (e.g., 'CMAA Q&A DB'). In the 'Sheet' field, select 'Sheet1'.", "url": null, "input_field": null, "uses_variable": "googleServiceAccountCredential", "timestamp": "14:17", "visual_context": "n8n 'Get row(s) in sheet' node parameters, highlighting credential, document, and sheet selection.", "warnings": null}, {"step_number": 20, "title": "Configure 'INSERT Supabase Vector Store' Node", "description": "Open the 'INSERT Supabase Vector Store' node. Select your 'Supabase API' credential (from Step 13). In the 'Table Name' field, select your database table (e.g., 'questions_and_answers_client'). IMPORTANT: Do NOT select the option that starts with 'rpc_'.", "url": null, "input_field": null, "uses_variable": "supabaseCredential", "timestamp": "14:38", "visual_context": "n8n 'INSERT Supabase Vector Store' node parameters, highlighting credential and table name selection.", "warnings": "Always select the table name without the 'rpc_' prefix, as 'rpc_' indicates a function, not the table itself."}, {"step_number": 21, "title": "Configure 'Embeddings OpenAI' Node", "description": "Open the 'Embeddings OpenAI' node. Select your 'OpenAI account' credential (from Prerequisites Setup). Ensure the 'Model' is set to 'text-embedding-3-small'.", "url": null, "input_field": null, "uses_variable": "openaiApiKey", "timestamp": "15:54", "visual_context": "n8n 'Embeddings OpenAI' node parameters, highlighting credential and model selection.", "warnings": null}, {"step_number": 22, "title": "Execute Workflow to Load Data", "description": "In n8n, click on the 'Manual' trigger node. Then, click 'Execute Workflow' to run the workflow. This will delete existing rows (if any), fetch data from your Google Sheet, embed the content using OpenAI, and insert the vectors into your Supabase database.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "16:18", "visual_context": "n8n workflow, clicking 'Manual' trigger and 'Execute Workflow' button.", "warnings": "If you encounter an 'Authorization failed' error, ensure the correct Supabase API credential is selected in the 'Delete All Database Rows' node (Step 18)."}, {"step_number": 23, "title": "Verify Data in Supabase Table", "description": "In Supabase, refresh the 'Table Editor' page for your database. You should now see the embedded content, metadata, and vector embeddings for all the questions and answers from your Google Sheet.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "17:00", "visual_context": "Supabase 'Table Editor' showing populated data with content, metadata, and embedding vectors.", "warnings": null}, {"step_number": 24, "title": "Configure 'Vector Knowledge Base' Node for Testing", "description": "In the n8n workflow, open the 'Vector Knowledge Base' node (in the 'Test Database' section). Select your 'Supabase API' credential (from Step 13). Set the 'Description' to explain what this tool does (e.g., 'Use this tool to search answers about our program Copy My AI Agency'). In the 'Table Name' field, select your database table (e.g., 'questions_and_answers_client'). Set 'Limit' to '5'. In the 'Query Name' field, ensure it's set to `match_questions_and_answers_client` (replace 'questions_and_answers_client' with your actual table name).", "url": null, "input_field": null, "uses_variable": "supabaseCredential", "timestamp": "17:58", "visual_context": "n8n 'Vector Knowledge Base' node parameters, highlighting credential, description, table name, limit, and query name fields.", "warnings": "The 'Query Name' must follow the format `match_<your_table_name>` exactly."}, {"step_number": 25, "title": "Test Knowledge Base with AI Agent", "description": "In n8n, click 'Open Chat' (in the 'Test Database' section). Type a relevant question into the chat (e.g., 'Can I use the $97 bot account with copy my ai agency?'). The AI agent will process the query, search the vector database, and provide an answer based on the information in your Supabase database.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "20:05", "visual_context": "n8n chat interface, typing a question and receiving an AI-generated answer.", "warnings": "The AI agent might be slightly slower to respond as it needs to query the vector database."}, {"step_number": 26, "title": "Optional: Schedule Daily Database Updates", "description": "To automate daily updates, connect the 'Schedule Trigger Daily @ Midnight' node to the 'Manual' trigger node. This will ensure your Supabase database is automatically updated every day at midnight with any new or modified data from your Google Sheet. Save and publish the workflow.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "22:11", "visual_context": "n8n workflow, connecting 'Schedule Trigger Daily @ Midnight' node to 'Manual' trigger, then saving and publishing the workflow.", "warnings": "Daily updates are generally inexpensive and ensure your AI agent always has the latest information."}, {"step_number": 27, "title": "Optional: Add Vector Knowledge Base to Other AI Agent Workflows", "description": "To integrate the 'Vector Knowledge Base' tool into other AI agent workflows (e.g., a Delta Response System), copy the 'Vector Knowledge Base' and 'Embeddings OpenAI' nodes (Ctrl+C or Cmd+C). Paste them into your desired AI agent workflow. Connect the 'Vector Knowledge Base' node as a tool to your AI agent. Ensure the description, database connection, and query name are correctly configured for the new workflow.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "23:12", "visual_context": "n8n workflow, copying 'Vector Knowledge Base' and 'Embeddings OpenAI' nodes, then pasting them into another AI agent workflow and connecting them as a tool.", "warnings": "This allows your AI agents to leverage the custom knowledge base for more accurate and relevant responses."}], "variables_summary": [{"variable_name": "n8nRootPassword", "label": "n8n VPS Root Password", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "n8nLoginUrl", "label": "n8n Login URL", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "n8nLicenseKey", "label": "n8n License Key", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "anthropicApiKey", "label": "Anthropic API Key", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "geminiApiKey", "label": "Gemini API Key", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "openaiApiKey", "label": "OpenAI API Key", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "googleServiceAccountCredential", "label": "Google Service Account Credential Name", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "supabaseProjectID", "label": "Supabase Project ID", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "supabaseCredential", "label": "Supabase Credential Name", "type": "string", "used_in_future_steps": "Yes"}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod6-les10"});
loadSop('m6_11', {"title": "How to Get Any Winning Sales Script to Build a New Prompt", "description": "This SOP outlines how to leverage Google Gemini's Deep Research feature to find and extract high-converting sales scripts for any niche, which can then be used as a foundation for building AI chatbot prompts or other communication flows.", "estimated_time": "15 minutes", "steps": [{"step_number": 1, "title": "Access Google Gemini", "description": "Open your web browser and navigate to Google Gemini. Ensure you are logged into your Google account. The video mentions using the Pro version, which costs $20/month, for access to advanced features like Deep Research.", "url": "https://gemini.google.com", "input_field": null, "uses_variable": null, "timestamp": "00:21", "visual_context": "Browser showing gemini.google.com, with 'Hi Zalo' and an input field. 'PRO' badge visible in the top right.", "warnings": "The Deep Research feature might not be available in the free version of Gemini. Consider upgrading to Gemini Advanced (formerly Gemini Pro) for full functionality."}, {"step_number": 2, "title": "Copy the Initial Research Prompt", "description": "From the course material or provided text, copy the first prompt: \"Find me the current best and highest converting message script to convert leads to appointments/sales for the [NICHE] industry. Include all possible scenarios.\"", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:34", "visual_context": "Course page showing 'Step 1. Gemini Deep Research' with the prompt highlighted.", "warnings": null}, {"step_number": 3, "title": "Initiate Deep Research in Gemini", "description": "In the Gemini chat interface, click on the 'Tools' button (represented by a '+' icon) next to the input field. From the dropdown menu, select 'Deep Research'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:40", "visual_context": "Gemini interface, red arrow pointing to 'Tools' and 'Deep Research' selected in the dropdown."}, {"step_number": 4, "title": "Paste Prompt and Specify Niche", "description": "Paste the copied prompt into the 'What do you want to research?' field. Replace '[NICHE]' with the specific industry you need scripts for. For example, the video uses 'roofing'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:43", "visual_context": "Gemini input field with the prompt pasted, 'roofing' typed into the '[NICHE]' placeholder."}, {"step_number": 5, "title": "Start the Research Process", "description": "Click the 'Send' button (paper airplane icon) to submit the prompt. Gemini will then display a 'Research Plan' and begin its deep research. This process typically takes 5-10 minutes.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:50", "visual_context": "Gemini showing 'Roofing Sales Script Research Plan' and a loading animation, indicating research is in progress."}, {"step_number": 6, "title": "Export Research to Google Docs", "description": "Once Gemini completes its research and presents the full report, locate the 'Share & Export' button (usually near the top right of the response). Click on it and select 'Export to Docs'. This will open a new Google Doc containing the entire research report.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:26", "visual_context": "Gemini displaying the full research report, then a new browser tab opening with a Google Doc containing the report."}, {"step_number": 7, "title": "Copy the Full Research Document Content", "description": "In the newly opened Google Doc, select all the content (Ctrl+A or Cmd+A) and copy it (Ctrl+C or Cmd+C).", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:45", "visual_context": "Google Doc with all text highlighted, right-click menu showing 'Copy'."}, {"step_number": 8, "title": "Copy the Sales Script Extraction Prompt", "description": "Return to the course material or provided text and copy the second prompt: \"Based on this research give me the full document with only the sales scripts with all scenarios\".", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:50", "visual_context": "Course page showing 'Step 2. Gemini Prompt' with the prompt highlighted."}, {"step_number": 9, "title": "Open a New Gemini Chat", "description": "Open a new chat session in Google Gemini. This ensures a clean slate for the next prompt.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:00", "visual_context": "New Gemini chat window with 'Hi Zalo' and an empty input field."}, {"step_number": 10, "title": "Paste Extraction Prompt and Research Content", "description": "First, paste the sales script extraction prompt into the Gemini input field. Then, press Shift+Enter to create a new line without submitting. Below the prompt, paste the entire content of the research document that you copied in Step 7.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:04", "visual_context": "Gemini input field with the extraction prompt, followed by the entire research document content."}, {"step_number": 11, "title": "Submit for Sales Script Extraction", "description": "Click the 'Send' button to submit the combined prompt and research content. Gemini will now process the information and extract only the sales scripts and their scenarios.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:17", "visual_context": "Gemini processing the input, showing 'Developing Sales Strategies' and 'Organizing Sales Scripts' loading indicators."}, {"step_number": 12, "title": "Verify Gemini Model (Optional but Recommended)", "description": "While Gemini is processing or after it has provided the output, ensure that the 'Thinking' model selected is 'Thinking with 3 Pro' (or the most advanced available model) for optimal results. This can usually be found in a dropdown next to the input field.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:50", "visual_context": "Gemini interface, dropdown menu showing 'Thinking with 3 Pro' selected."}, {"step_number": 13, "title": "Copy Extracted Sales Scripts", "description": "Once Gemini presents the consolidated sales scripts, select all the generated script content and copy it.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:09", "visual_context": "Gemini displaying the extracted sales scripts, with text highlighted for copying."}, {"step_number": 14, "title": "Paste and Save Sales Scripts", "description": "Open a new Google Doc (or clear the previous one) and paste the copied sales scripts. You can then download this document as a PDF for easy sharing and reference.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:13", "visual_context": "Google Doc with the extracted sales scripts pasted, then showing the 'File' menu with 'Download' and 'PDF Document' options."}, {"step_number": 15, "title": "Utilize Sales Scripts for AI Chatbot Prompts", "description": "The downloaded PDF containing the sales scripts can now be used as foundational knowledge or direct input for building AI chatbot prompts within your AI employee system, ensuring the chatbot's conversational flow is based on proven, high-converting strategies.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:20", "visual_context": "Side-by-side view of the downloaded sales script PDF and a 'Anatomy of a Black Umbrella AI Chatbot Prompt' diagram, illustrating how the scripts fit into chatbot creation."}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod6-les11"});
loadSop('m6_12', {"title": "Database Reactivation Campaigns (SPEAR Methodology)", "description": "This SOP outlines the process for implementing a 'Dead Lead Resurrection' campaign using the SPEAR Methodology, focusing on SMS reactivation. It covers A2P 10DLC compliance, message content guidelines, a 'STOP' compliance hack, and step-by-step instructions for setting up and launching the campaign within the GoHighLevel CRM.", "estimated_time": "30 minutes", "steps": [{"step_number": 1, "title": "Understand the SPEAR Methodology Infographic", "description": "Review the provided infographic titled 'THE MECHANICS OF \"DEAD LEAD\" RESURRECTION: THE SPEAR Methodology'. This infographic visually explains the core concepts of fresh lead follow-up, dead lead resurrection (patience & empathy), the SPEAR methodology sequence (Day 1: The Spear, Day 3: The Nudge, Day 7: The Breakup), the psychology behind the breakup text (highest response rate, loss aversion), strategic segmentation ('Golden' Segments), and list hygiene prerequisites for blasting.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "Infographic displayed on screen with various sections and arrows illustrating the methodology."}, {"step_number": 2, "title": "Download Campaign Resources", "description": "Download the attached files: 'Database Reactivation Campaign (A2P Regulated).pdf' and 'SPEAR Methodology.png'. These documents contain detailed information about A2P regulations, trigger words, compliance checklists, and template libraries, as well as the infographic itself.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:13", "visual_context": "GoHighLevel course page showing 'Attached Files' section with download links for 'Database Reactivation Campaign (A2P Regulated).pdf' and 'SPEAR Methodology.png'."}, {"step_number": 3, "title": "Review A2P 10DLC Regulations and Compliance", "description": "Carefully read the 'Database Reactivation Campaign (A2P Regulated).pdf' document, specifically focusing on 'The Regulatory Fortress: A2P 10DLC and Carrier Compliance'. Understand the A2P 10DLC Framework, including Campaign Registry (TCR), Brand Registration, Campaign Registration, and Trust Score. Pay close attention to throttling limits (e.g., limit of 2 messages per second or daily caps of 2,000 messages/day) and the 'SHAFT Rule and Prohibited Content' to avoid spam filters related to Sex, Hate, Alcohol, Firearms, and Tobacco, as well as 'High-Risk Financial' or 'Aggressive Marketing' patterns.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:17", "visual_context": "PDF document titled 'Database Reactivation Campaigns (A2P Regulated).pdf' open, showing sections on 'The Regulatory Fortress: A2P 10DLC and Carrier Compliance' and 'The A2P 10DLC Framework'."}, {"step_number": 4, "title": "Identify Trigger Words and Safe Alternatives", "description": "Consult the 'Trigger Words to Avoid' table in the PDF. This table categorizes words (e.g., Financial/Money, Exaggerated Claims, Urgency/FOMO, Lottery/Winning, Links, Formatting) that commonly trigger spam filters and provides 'Safe Alternatives'. For example, instead of 'Free Estimate', use 'Complimentary Estimate' or 'No-obligation Quote'. Avoid public shorteners and excessive punctuation/emojis.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:04", "visual_context": "PDF document showing a table with 'Category', 'Trigger Words to Avoid', and 'Safe Alternatives'."}, {"step_number": 5, "title": "Understand Compliance Checklist for Templates", "description": "Review 'The Compliance Checklist for Templates' in the PDF. Ensure that: 1. The sender is identified (business name or sender's name immediately, e.g., 'Hi John, this is Mike from Mike's Plumbing.'). 2. An Opt-Out Mechanism is included in the first message of any new campaign sequence (e.g., 'Reply STOP to opt out'). 3. Consent Verification is performed for existing leads, especially those older than 12 months, by re-verifying consent or scrubbing against the DNC registry.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:42", "visual_context": "PDF document showing 'The Compliance Checklist for Templates' with numbered points."}, {"step_number": 6, "title": "Review SPEAR Methodology Text Templates", "description": "Familiarize yourself with the text templates for the SPEAR Methodology: 1. The 'Spear' (Day 1): A 9-word text like 'Are you still looking...'. 2. The 'Nudge' (Day 3): If no reply, 'Hi [Name], just bumping this. Still interested?'. 3. The 'Breakup' (Day 7): 'I assume you're all set with the project. I'll close your file on my end. Let me know if that changes!'. Understand that no further messages should be sent after the breakup text if there's no reply.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:31", "visual_context": "PDF document showing 'The Spear Methodology' section with the three SMS templates."}, {"step_number": 7, "title": "Understand Reply Handling for 'Not Interested' vs. 'Stop'", "description": "Learn how to handle different lead replies: - 'STOP': This is an immediate compliance requirement to cease messaging. - 'Not Interested': This is a soft 'no'. Acknowledge and exit gracefully. - 'Not Right Now': This is a nurture opportunity. Set a CRM task to check back later (e.g., in October). Do not text again until then.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:09", "visual_context": "PDF document showing 'Handling the \"Not Interested\" vs. \"Stop\"' section with bullet points."}, {"step_number": 8, "title": "Implement Strategic Segmentation and List Hygiene", "description": "To maximize ROI, prioritize 'Golden' Segments: 1. Unsold Estimates (30-90 Days): Hottest segment, high intent but stalled. 2. Dormant Customers (12-24 Months): Past buyers needing a reminder. 3. Equipment Age (10+ Years): High-value replacement leads. 4. Cross-Sell Opportunities: Customers who bought one service but not another. Perform list hygiene before importing for SMS reactivation: Remove Landlines, Verify Numbers (using tools like Twilio Lookup), Check DNC (federal or internal), and Remove 'Bad' Customers (marked as 'Do Not Service', 'Non-Pay', or 'Abusive' in CRM).", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:39", "visual_context": "PDF document showing 'Strategic Segmentation: The Secret Sauce' and 'List Hygiene: The Prerequisite to Blasting' sections."}, {"step_number": 9, "title": "Add AI Chatbot Prompt Add-on", "description": "To ensure the AI chatbot handles reactivation campaign replies correctly without flagging your phone number, add the following block of text to the `<context>` section of your AI chatbot's prompt: 'If the user has a tag \"database-reactivation\" it means that is opting in from an SMS reactivation campaign we performed and they have received the following text \"[PASTE HERE THE FIRST DBR TEXT]\". If they reply with a soft negative intent like \"not right now\", \"not interested\", \"no thank you\". Do not use the \"dnd tool\", only if they've expressed hard negative sentiment.' Replace '[PASTE HERE THE FIRST DBR TEXT]' with the actual text of your first SMS message.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:55", "visual_context": "PDF document showing 'AI Chatbot Prompt Add-on' section with the text block to be added to the prompt."}, {"step_number": 10, "title": "Change Opt-Out Wording in GHL Settings", "description": "To implement the 'STOP' Compliance Hack, navigate to your GoHighLevel account. Go to 'Settings' (bottom left gear icon) > 'Business Profile' > 'Phone System' > 'Messaging'. Under 'Opt-Out Message & Sender ID', click 'Customize' next to 'Reply STOP to Unsubscribe'. Change the message from 'Reply STOP to Unsubscribe' to 'Reply DND to Unsubscribe'. Click 'Save'. This will make it so that the opt-out does not count towards your phone number's reputation score.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "07:11", "visual_context": "GoHighLevel interface showing navigation to 'Settings' > 'Business Profile' > 'Phone System' > 'Messaging'. A pop-up window to 'Customize Opt-Out Message' is shown, where 'Reply STOP to Unsubscribe' is changed to 'Reply DND to Unsubscribe'."}, {"step_number": 11, "title": "Create DND Hack Workflow in GHL", "description": "In your GoHighLevel account, go to 'Automation' > 'Workflows'. Click 'Create Workflow' and select 'Start from Scratch'. 1. Add a new trigger: Select 'Customer Replied'. 2. Add a filter: 'Reply channel' is 'SMS'. 3. Add another filter: 'Exact match phrase' is 'DND' (add both 'DND' and 'dnd' for case insensitivity). Save the trigger. 4. Add an action: Search for 'DND' and select 'Enable/Disable DND'. 5. In the DND settings, select 'Enable DND for specific channels' and choose 'SMS'. Save the action. 6. Name the workflow (e.g., 'DND Hack'), save it, and publish it by toggling the switch to 'Published'. This workflow will automatically set contacts to DND on SMS if they reply with 'DND', preventing further messages and protecting your phone number's reputation.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "07:44", "visual_context": "GoHighLevel interface showing creation of a new workflow. Steps for adding 'Customer Replied' trigger with SMS and DND filters, and 'Enable/Disable DND' action for SMS are demonstrated. The workflow is named 'DND Hack' and published."}, {"step_number": 12, "title": "Review Database Reactivation Campaign Template Workflow", "description": "In GoHighLevel, navigate to 'Automation' > 'Workflows' and open the 'Database Reactivation Campaign Template' workflow. Understand its structure: - It starts by adding tags: 'database-reactivation', 'ai-optin', and 'sms'. - It includes a 'Drip Mode' set to '1 SMS per minute' to control sending speed. - It sends 'SMS #1' (the Spear message). - It waits 2 days. - It checks for 'Contact Reply' or 'Time Out'. - If no reply, it sends 'SMS #2' (the Nudge message). - It waits 4 days. - It checks for 'Contact Reply' or 'Time Out'. - If no reply, it sends 'SMS #3' (the Breakup message). Review the content of each SMS message within the workflow actions.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "08:57", "visual_context": "GoHighLevel workflow builder showing the 'Database Reactivation Campaign Template' with its sequence of tags, drip mode, SMS messages, and wait steps. The content of SMS #1 is displayed."}, {"step_number": 13, "title": "Configure Workflow Settings (Time Window)", "description": "Within the 'Database Reactivation Campaign Template' workflow, go to the 'Settings' tab. - Ensure 'Allow re-entry' is OFF. - Ensure 'Allow multiple opportunities' is ON. - Ensure 'Stop on response' is ON. - Under 'Communication', set 'Specific Time' to ON. - Set 'Start Time' to '4:00 PM' and 'End Time' to '5:30 PM'. - Include 'Wednesday' and 'Thursday' as the days to send messages. These settings ensure messages are sent during optimal times and days, and stop if a contact replies.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "10:33", "visual_context": "GoHighLevel workflow settings tab showing 'Contact', 'Communication', and 'Time Window' configurations. Specific time and days (Wednesday, Thursday) are selected."}, {"step_number": 14, "title": "Publish the Database Reactivation Campaign Workflow", "description": "Before adding contacts, ensure the 'Database Reactivation Campaign Template' workflow is published. In the workflow list, click the three dots next to the workflow name and select 'Publish Workflow'. Confirm the publication.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "11:29", "visual_context": "GoHighLevel workflow list showing the 'Database Reactivation Campaign Template' and a pop-up to 'Publish Workflow'."}, {"step_number": 15, "title": "Add Contacts to the Reactivation Campaign", "description": "Navigate to 'Contacts' in your GoHighLevel account. Select all the contacts you wish to add to the database reactivation campaign. Click the 'Add to Automation' icon (a circular arrow). In the 'Add to Automation' pop-up: - Enter an 'Action name' for tracking (e.g., 'DBR Campaign #1'). - Ensure 'Automation Type' is 'Workflow'. - Select the 'Database Reactivation Campaign Template' from the 'Workflow' dropdown. - For 'Mode', choose 'Send All at Once' (the workflow has a built-in drip mode, so sending all at once here is fine). Click 'Add to Automation'. The contacts will now be enrolled in the campaign and receive messages according to the workflow's schedule and drip settings.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "11:03", "visual_context": "GoHighLevel 'Contacts' page. A contact is selected, and the 'Add to Automation' pop-up is shown with fields for action name, workflow selection ('Database Reactivation Campaign Template'), and 'Send All at Once' mode."}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod6-les12"});
loadSop('m7_01', {"title": "How AI Voice Agents Work: A Simple Conversation", "description": "This video explains the fundamental process behind how AI voice agents function during a simple conversation. It outlines the continuous loop of listening, understanding, thinking, and speaking, emphasizing the role of various APIs and external knowledge in making the interaction feel natural and responsive. The speaker highlights the speed requirements for voice agents compared to text-based chatbots.", "estimated_time": "03 minutes", "steps": [{"step_number": 1, "title": "User Initiates Conversation", "description": "The process begins when a user speaks, typically over the phone or through a voice interface.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "Diagram showing a person speaking into a microphone, with an arrow pointing to '1. THE EARS (Listen & Transcribe)'.", "warnings": null}, {"step_number": 2, "title": "Listen & Transcribe (The Ears)", "description": "The AI's 'ears' component, which includes a transcription service (Speech to Text API), listens to the user's audio input and converts it into written text. This step is crucial for the AI to understand the spoken words.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:16", "visual_context": "Diagram highlighting '1. THE EARS (Listen & Transcribe)' with a microphone icon and 'Speech to Text' label. An arrow points from 'YOU SPEAK' to this section, and another arrow points from 'Speech to Text' to '2. THE BRAIN'.", "warnings": null}, {"step_number": 3, "title": "Understand & Think (The Brain)", "description": "The transcribed text is then fed into the AI's 'brain' (typically a Large Language Model or LLM). This component analyzes the meaning, intent, and context of the user's query to figure out what the user wants and plan an appropriate response.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:26", "visual_context": "Diagram highlighting '2. THE BRAIN (Understand & Think)' with gears, a lightbulb, and a magnifying glass icon. An arrow points from 'Speech to Text' to this section.", "warnings": null}, {"step_number": 4, "title": "Access External Knowledge (Tools & Memory)", "description": "While processing the user's input, the AI's brain can access external knowledge, past chat history, and various services or tools. This 'Tools & Memory' component provides the AI with additional information to enhance its understanding and formulate a more comprehensive and accurate response, similar to how a chatbot uses external functions.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:33", "visual_context": "Diagram highlighting 'TOOLS & MEMORY (External Knowledge)' with icons for information, past chats, and services. An arrow points from '2. THE BRAIN' to this section, and another arrow points back from 'TOOLS & MEMORY' to '2. THE BRAIN'.", "warnings": null}, {"step_number": 5, "title": "Convert Text to Speech (The Voice)", "description": "Once the AI's brain has formulated a text-based answer, this text is sent to a Text-to-Speech API. This service converts the written answer back into spoken words, giving the AI its 'voice'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:47", "visual_context": "Diagram highlighting '3. THE VOICE (Speak Back)' with a document icon and a speaker icon, and 'Text to Speech' label. An arrow points from '2. THE BRAIN' to this section.", "warnings": null}, {"step_number": 6, "title": "AI Responds", "description": "Finally, the converted spoken words are delivered to the user as the AI's response. The entire loop, from user speaking to AI responding, needs to happen within approximately one second to ensure a natural and fluid conversational experience, unlike text-based interactions where longer response times are more acceptable.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:59", "visual_context": "Diagram highlighting 'AI RESPONDS' with a speaker icon. An arrow points from 'Text to Speech' to this section, and another arrow loops back from 'AI RESPONDS' to 'YOU SPEAK', indicating a continuous conversation.", "warnings": "The speaker emphasizes that the entire process must be very fast (around one second) for voice agents to sound natural, which means the LLMs used for voice agents might need to be optimized for speed over maximum intelligence compared to those used for text-based interactions. Prompting for these LLMs must be very good to ensure they follow instructions efficiently."}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod7-les1"});
loadSop('m7_02', {"title": "AI Voice Delta Response System Overview", "description": "This SOP provides an overview of the AI Voice Delta Response System, detailing how it integrates with Retell, n8n, and HighLevel to manage inbound calls, utilize AI voice agents with specific tools, and perform post-call analysis for data extraction into HighLevel. It highlights two main types of inbound AI voice agents: Calendar Booking and Booking Link Sender, and explains their respective workflows and use cases.", "estimated_time": "05 minutes", "steps": [{"step_number": 1, "title": "Understand the AI Voice Delta Response System Overview", "description": "The AI Voice Delta Response System is designed to seamlessly integrate with Retell, n8n, and HighLevel. It handles inbound calls, processes them through AI voice agents, utilizes agent tools, and performs post-call analysis to update contact information in HighLevel.", "url": "https://app.mural.co/t/live4563/m/live4563/1705802501766/65ae547ce055a20c8d1877f6?sender=u1877648d15bc423af92f", "input_field": null, "uses_variable": null, "timestamp": "00:00"}, {"step_number": 2, "title": "Inbound Call Processing with n8n Webhooks", "description": "When an inbound phone call is received, it triggers an Inbound Webhook in n8n. This webhook acts as the entry point for the AI voice agents.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:12"}, {"step_number": 3, "title": "Identify AI Voice Agent Types", "description": "There are two primary types of AI voice agents that can be utilized for inbound calls:\n1.  **Calendar Booking AI Voice Agent (Red Workflow):** Designed to book appointments directly into a calendar.\n2.  **Booking Link Sender AI Voice Agent (Green Workflow):** Designed to send a booking link via SMS for the user to schedule their own appointment.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:20"}, {"step_number": 4, "title": "Understand Calendar Booking AI Voice Agent Workflow", "description": "This agent is typically used for businesses operating within a single time zone or local businesses. The workflow involves:\n1.  **Inbound Webhook:** Receives the call.\n2.  **Edit Fields:** Manual step for data manipulation.\n3.  **Search GHL Contact:** Searches for the contact in HighLevel.\n4.  **If (Contact Exists):** Conditional logic.\n5.  **Create Contact in GHL:** If the contact doesn't exist, it's created in HighLevel.\n6.  **Get Calendar Availability (Next 30 Days):** Fetches available time slots from the calendar.\n7.  **Truncate Time Slots:** Processes and formats the time slots.\n8.  **Dynamic Info:** Manual step for dynamic information.\n9.  **Respond to Webhook:** Sends a response back.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:44"}, {"step_number": 5, "title": "Understand Booking Link Sender AI Voice Agent Workflow", "description": "This agent is recommended for businesses operating nationwide or across multiple time zones, as it simplifies scheduling by allowing the user to book themselves. The workflow involves:\n1.  **Inbound Webhook:** Receives the call.\n2.  **Edit Fields:** Manual step for data manipulation.\n3.  **Search GHL Contact:** Searches for the contact in HighLevel.\n4.  **If (Contact Exists):** Conditional logic.\n5.  **Create Contact in GHL:** If the contact doesn't exist, it's created in HighLevel.\n6.  **Dynamic Info:** Manual step for dynamic information.\n7.  **Respond to Webhook:** Sends a response back (e.g., with a booking link).", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:17"}, {"step_number": 6, "title": "Connect to Retell AI Voice Agent and Agent Tools", "description": "After the initial inbound processing, the call is routed to the Retell AI Voice Agent (CLIENT). This agent is connected to 'Agent Tools' within n8n, which function similarly to chatbot tools. The main tools available are:\n*   `send_booking_link` (POST request)\n*   `book_appointment_tool` (POST request)\nThese tools can be enabled or disabled based on the specific requirements of the AI agent. Additional tools can be added to extend the agent's capabilities and connect to other services.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:40"}, {"step_number": 7, "title": "Outbound Post-Call Analysis Webhook", "description": "Once the conversation with the AI voice agent concludes and the call ends, an Outbound Post-Call Webhook is triggered. This webhook initiates the post-call analysis flow:\n1.  **Outbound Post-Call Webhook:** Receives call data.\n2.  **If:** Conditional logic.\n3.  **Edit Fields:** Manual step for data manipulation.\n4.  **Search GHL Contact:** Searches for the contact in HighLevel.\n5.  **Send to GHL:** Sends the extracted information to HighLevel.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:35"}, {"step_number": 8, "title": "HighLevel Post-Call Data Extraction Workflow", "description": "In HighLevel, a workflow named 'VOICE All Post-call Data Extraction' is set up to receive the post-call information. This workflow is triggered by an Inbound Webhook and performs the following action:\n1.  **Update Contact:** It updates an existing contact or creates a new one if it doesn't exist.\n    *   **Fields:**\n        *   **Phone:** Uses the phone number from the inbound webhook request (`{{inboundWebhookRequest.ph}}`) to identify the contact.\n        *   **AI Voice Call Summary:** Updates a custom field named 'AI Voice Call Summary' with the summary of the call (`{{inboundWebhookRequest.ca}}`).\nThis completes the loop, ensuring that call data is captured and stored in HighLevel for further analysis or follow-up.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:16"}], "variables_summary": [{"variable_name": "n8nRootPassword", "label": "n8n VPS Root Password", "type": "password", "used_in_future_steps": "No"}, {"variable_name": "n8nLoginUrl", "label": "n8n Login URL", "type": "text", "used_in_future_steps": "No"}, {"variable_name": "n8nLicenseKey", "label": "n8n License Key", "type": "text", "used_in_future_steps": "No"}, {"variable_name": "anthropicApiKey", "label": "Anthropic API Key", "type": "password", "used_in_future_steps": "No"}, {"variable_name": "geminiApiKey", "label": "Gemini API Key", "type": "password", "used_in_future_steps": "No"}, {"variable_name": "openaiApiKey", "label": "OpenAI API Key", "type": "password", "used_in_future_steps": "No"}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod7-les2"});
loadSop('m7_03', {"title": "Retell AI Dashboard Walkthrough", "description": "This SOP provides a comprehensive walkthrough of the Retell AI dashboard, covering agent management, knowledge base creation, phone number configuration, batch calling, call/chat history, analytics, AI quality assurance, alerting, billing, and workspace settings. It demonstrates the various features and how to navigate the platform.", "estimated_time": "15 minutes", "steps": [{"step_number": 1, "title": "Login to Retell AI", "description": "Log in to your Retell AI account. Upon successful login, you will be directed to the main dashboard interface, typically starting with the 'Agents' section.", "url": "dashboard.retellai.com/agents", "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "Retell AI dashboard, 'Agents' section selected in the left sidebar.", "warnings": null}, {"step_number": 2, "title": "Navigate Agent Folders", "description": "In the left sidebar, under the 'BUILD' section, click on 'Agents'. You will see a 'FOLDERS' section. Click on 'AI Voice Demo Bots' to view agents organized within that specific folder. This allows for better organization of multiple AI agents.", "url": "dashboard.retellai.com/agents", "input_field": null, "uses_variable": null, "timestamp": "00:05", "visual_context": "Left sidebar showing 'Agents' selected, main content area showing 'All Agents' and 'FOLDERS'. 'AI Voice Demo Bots' folder is clicked.", "warnings": null}, {"step_number": 3, "title": "Import or Create New Agents", "description": "From the 'All Agents' view, you have two options: \n1. Click the 'Import' button to upload agent templates from files. \n2. Click the 'Create an Agent' button and select either 'Voice Agent' or 'Chat Agent' from the dropdown to build a new agent from scratch.", "url": "dashboard.retellai.com/agents", "input_field": null, "uses_variable": null, "timestamp": "00:15", "visual_context": "Buttons 'Import' and 'Create an Agent' visible. 'Create an Agent' dropdown shows 'Voice Agent' and 'Chat Agent'.", "warnings": null}, {"step_number": 4, "title": "Configure Transfer Agents", "description": "In the left sidebar, under 'TRANSFER AGENTS', click on 'Transfer Agents'. This section allows you to create and manage agents designed to seamlessly transfer calls between different AI agents or to human agents. Click 'Create Transfer Agent' to set up a new transfer flow, including options for 'Warm Transfer'.", "url": "dashboard.retellai.com/agents/folder/transfer-agents", "input_field": null, "uses_variable": null, "timestamp": "00:28", "visual_context": "'Transfer Agents' is clicked in the left sidebar. A 'Create Transfer Agent' button is visible, and a popup for 'Transfer Call' with 'Warm Transfer' option.", "warnings": null}, {"step_number": 5, "title": "Create a Knowledge Base", "description": "In the left sidebar, under 'BUILD', click on 'Knowledge Base'. To add new information for your AI agents, click the '+' icon or 'Add Knowledge Base'. In the 'Add Knowledge Base' popup:\n1. Enter a 'Knowledge Base Name', e.g., 'Black Umbrella'.\n2. Click 'Add' under 'Documents' to choose how to input information:\n   - 'Add Web Pages': Crawl and sync content from a website.\n   - 'Upload Files': Upload documents (file size should be less than 100MB).\n   - 'Add Text': Manually add articles or text snippets.\n3. Click 'Save' once you've added your desired information. These knowledge bases can be referenced by your AI voice agents.", "url": "dashboard.retellai.com/knowledgebase", "input_field": {"variable_name": "knowledgeBaseName", "label": "Knowledge Base Name", "type": "text"}, "uses_variable": null, "timestamp": "00:46", "visual_context": "'Knowledge Base' is clicked. A popup 'Add Knowledge Base' appears, showing fields for 'Knowledge Base Name' and 'Documents' with 'Add' button. 'Add' dropdown shows 'Add Web Pages', 'Upload Files', 'Add Text'.", "warnings": null}, {"step_number": 6, "title": "Manage Phone Numbers", "description": "In the left sidebar, under 'DEPLOY', click on 'Phone Numbers'. Here you can manage your phone numbers. Select a phone number (e.g., 'Client Agent') to configure its settings. You can assign different AI agents for 'Inbound Call Agent' and 'Outbound Call Agent'. Additionally, you can enable 'Advanced Add-Ons' such as SMS (requires A2P verification), 'Verified Phone Number', and 'Branded Call' for specific phone numbers.", "url": "dashboard.retellai.com/phoneNumbers", "input_field": null, "uses_variable": null, "timestamp": "01:09", "visual_context": "'Phone Numbers' is clicked. A list of phone numbers appears, and 'Client Agent' number details are shown. Options for 'Inbound Call Agent', 'Outbound Call Agent', 'SMS', 'Verified Phone Number', 'Branded Call'.", "warnings": "A2P verification is required for SMS functionality."}, {"step_number": 7, "title": "Create a Batch Call Campaign", "description": "In the left sidebar, under 'DEPLOY', click on 'Batch Call'. To initiate a batch calling campaign, click the 'Create a batch call' button. In the 'Create a batch call' form:\n1. Enter a 'Batch Call Name'.\n2. Select the 'From number' that will be used for the calls.\n3. 'Upload Recipients': Choose a CSV file containing the list of phone numbers or contacts to call. You can download a template for the CSV format.\n4. 'When to send the calls': Select 'Send Now' to start immediately or 'Schedule' to set a future date and time.\n5. Review 'Reserved Concurrency for Other Calls' and 'Concurrency allocated to batch calling'. The platform supports up to 15 concurrent calls for batch calling, with 5 reserved for inbound calls.\n6. Click 'Send' to start the campaign or 'Save as draft' to save it for later.", "url": "dashboard.retellai.com/batchCall", "input_field": {"variable_name": "batchCallName", "label": "Batch Call Name", "type": "text"}, "uses_variable": null, "timestamp": "01:29", "visual_context": "'Batch Call' is clicked. 'Create a batch call' button is clicked, showing a form with 'Batch Call Name', 'From number', 'Upload Recipients (CSV)', 'When to send the calls (Send Now/Schedule)', 'Reserved Concurrency for Other Calls', 'Concurrency allocated to batch calling'.", "warnings": "Ensure your CSV file is correctly formatted and within the size limit (up to 50 KB). Concurrency limits apply to simultaneous calls."}, {"step_number": 8, "title": "Review Call History", "description": "In the left sidebar, under 'MONITOR', click on 'Call History'. This section displays a detailed log of all calls made within your workspace. You can:\n1. Use 'Date Range' and 'Filter' options to narrow down your search.\n2. Click on any call record to view more details. This includes 'Conversation Analysis' (success, status, sentiment, disconnection reason), a 'Summary' of the interaction, 'Transcription' of the call, and 'Detail Logs' which provide comprehensive data about the call, including dynamic variables and tool usage.", "url": "dashboard.retellai.com/history", "input_field": null, "uses_variable": null, "timestamp": "01:56", "visual_context": "'Call History' is clicked. A table of call records is displayed. One record is clicked, showing 'Conversation Analysis', 'Summary', 'Transcription', and 'Detail Logs'.", "warnings": null}, {"step_number": 9, "title": "Review Chat History", "description": "In the left sidebar, under 'MONITOR', click on 'Chat History'. This section will display the history of interactions for any messaging chat bots you have configured.", "url": "dashboard.retellai.com/chat-history", "input_field": null, "uses_variable": null, "timestamp": "02:29", "visual_context": "'Chat History' is clicked. An empty table is shown.", "warnings": null}, {"step_number": 10, "title": "Analyze Performance with Analytics", "description": "In the left sidebar, under 'MONITOR', click on 'Analytics'. This dashboard provides a comprehensive overview of your AI agent's performance. You can view metrics such as:\n- 'Call Counts'\n- 'Call Duration'\n- 'Call Latency' (average response time of the bot)\n- 'Concurrency Used'\n- 'Call Successful' rates\n- 'Disconnection Reason'\n- 'User Sentiment'\n- 'Phone inbound/outbound' breakdown\n- 'Call Picked Up Rate'\n- 'Call Successful Rate'\n- 'Call Transfer Rate'\n- 'Voicemail Rate'\n- 'Average Call Duration' and 'Average Latency'.\nYou can 'Select date range' and 'Filter' the data, and 'Add' or 'Edit' the displayed widgets to customize your view.", "url": "dashboard.retellai.com/analytics", "input_field": null, "uses_variable": null, "timestamp": "02:35", "visual_context": "'Analytics' is clicked. A dashboard with various charts and metrics: 'Call Counts', 'Call Duration', 'Call Latency', 'Concurrency Used', 'Call Successful', 'Disconnection Reason', 'User Sentiment', 'Phone inbound/outbound', 'Call Picked Up Rate', 'Call Successful Rate', 'Call Transfer Rate', 'Voicemail Rate', 'Average Call Duration', 'Average Latency'.", "warnings": null}, {"step_number": 11, "title": "Configure AI Quality Assurance", "description": "In the left sidebar, under 'MONITOR', click on 'AI Quality Assurance'. This feature helps evaluate calls based on audio, language, and performance. To set up a new QA cohort:\n1. Click the 'Create QA' button.\n2. In the 'Create Cohort' form, enter a 'Cohort Name'.\n3. Define 'Filter Calls by Agent and Criteria' using options like 'Agents', 'Date Range', 'Call Duration' (e.g., > 30 seconds), 'Disconnect Reasons', and 'Filter by Post Call Analysis'.\n4. Set the 'Set Sampling Percentage' (e.g., 100% weekly max 100 calls).\n5. Click 'Next' to proceed with defining successful resolution criteria.", "url": "dashboard.retellai.com/quality-assurance", "input_field": {"variable_name": "qaCohortName", "label": "Cohort Name", "type": "text"}, "uses_variable": null, "timestamp": "03:09", "visual_context": "'AI Quality Assurance' is clicked. A dashboard showing 'Calls Analysed', 'Average Score', 'Call Resolution Rate', 'Transfer Success Rate', 'Transfer Wait Time'. 'Create QA' button is clicked, showing a form to 'Create Cohort' with filters for 'Agents', 'Date Range', 'Call Duration', 'Disconnect Reasons', 'Filter by Post Call Analysis', 'Set Sampling Percentage'.", "warnings": null}, {"step_number": 12, "title": "Set Up Custom Alerts", "description": "In the left sidebar, under 'MONITOR', click on 'Alerting'. To create custom notifications for specific events:\n1. Click the 'Create Alert' button.\n2. In the 'Create Alert' form, enter an 'Alert Name' (e.g., 'Payment Failure Rate Spike').\n3. Define the 'Metric Condition' (e.g., 'Compare to certain value' or 'Compare to last cycle').\n4. Specify the 'Number of Calls / Chats' and any optional 'disconnect reasons'.\n5. Select the 'Agents' to monitor (e.g., 'All Agents').\n6. Choose 'View by' (e.g., 30 min) and 'Notify Frequency' (e.g., 5 min).\n7. Configure 'Notify via' by adding an 'Email address' or a 'Webhook URL'.\n8. Click 'Save' to activate the alert.", "url": "dashboard.retellai.com/alerting", "input_field": {"variable_name": "alertName", "label": "Alert Name", "type": "text"}, "uses_variable": null, "timestamp": "03:24", "visual_context": "'Alerting' is clicked. 'Create Alert' button is clicked, showing a form for 'Create Alert' with fields for 'Alert Name', 'Metric Condition', 'Number of Calls / Chats', 'Agents', 'View by', 'Notify Frequency', 'Notify via (Email, Webhook URL)'.", "warnings": null}, {"step_number": 13, "title": "View Billing Information", "description": "In the left sidebar, under 'SYSTEM', click on 'Billing'. This section provides an overview of your billing history and usage. Navigate between the 'Billing History' and 'Usage' tabs to see details such as total cost, call minutes, and average cost per minute over specific periods.", "url": "dashboard.retellai.com/billing", "input_field": null, "uses_variable": null, "timestamp": "03:35", "visual_context": "'Billing' is clicked, showing 'Billing History' and 'Usage' tabs. 'Usage' tab is selected, showing graphs for 'Total Cost', 'Call Minutes', 'Average Cost Per Minute', 'Call + Chat Cost'.", "warnings": null}, {"step_number": 14, "title": "Adjust Account Limits", "description": "In the left sidebar, under 'SYSTEM', click on 'Settings', then select 'Limits'. Here you can view and adjust various limits for your account:\n- 'Concurrent Calls Limit': The default is 20. Click 'Adjust Limit' to increase this, noting that additional concurrent calls will incur extra monthly costs (e.g., $8.00 per additional concurrent call per month).\n- 'LLM Token Limit': The maximum token limit for Large Language Models.\n- 'Telnyx CPS', 'Twilio CPS', 'Custom Telephony CPS': Calls per second limits for different telephony providers.\nAdjust limits as needed for your operational scale.", "url": "dashboard.retellai.com/settings/limits", "input_field": null, "uses_variable": null, "timestamp": "03:40", "visual_context": "'Settings' is clicked, then 'Limits'. Shows 'Concurrent Calls Limit', 'LLM Token Limit', 'Telnyx CPS', 'Twilio CPS', 'Custom Telephony CPS'. 'Adjust Limit' for 'Concurrent Calls Limit' is clicked, showing a popup to adjust the number of concurrent calls and associated pricing.", "warnings": "Increasing concurrent calls will result in additional charges on your monthly bill."}, {"step_number": 15, "title": "Access API Keys", "description": "In the left sidebar, under 'SYSTEM', click on 'Settings', then select 'API Keys'. This section provides your 'API Keys' (Secret Key) and 'Public Keys' (Webhook key) which are essential for integrating Retell AI with external applications and services.", "url": "dashboard.retellai.com/settings/api-keys", "input_field": null, "uses_variable": null, "timestamp": "04:06", "visual_context": "'API Keys' is clicked. Shows 'API Keys' and 'Public Keys' tabs. 'API Keys' tab shows 'Secret Key' and 'Webhook' key values.", "warnings": "Keep your Secret Key confidential to prevent unauthorized access to your account."}, {"step_number": 16, "title": "Configure Webhooks", "description": "In the left sidebar, under 'SYSTEM', click on 'Settings', then select 'Webhooks'. Enter a 'webhook URL' in the provided field to configure real-time event notifications. You can also set a 'Timeout' for the webhook request (default 5s). This allows you to receive instant updates about events within your Retell AI account.", "url": "dashboard.retellai.com/settings/webhooks", "input_field": null, "uses_variable": null, "timestamp": "04:12", "visual_context": "'Webhooks' is clicked. Shows a field to 'Enter webhook URL' and 'Timeout: 5s'.", "warnings": null}, {"step_number": 17, "title": "Manage Workspaces and Users", "description": "In the left sidebar, under 'SYSTEM', click on 'Settings', then select 'Workspace'. This section allows you to manage your workspace details, including the 'Workspace Name' and 'Workspace ID'. Click on 'Users' to view and manage team members associated with this workspace. You can 'Invite a member' to add new users and assign their roles. Each workspace acts as a separate environment, ideal for managing different clients or projects, each with its own billing information.", "url": "dashboard.retellai.com/settings/workspace", "input_field": null, "uses_variable": null, "timestamp": "04:19", "visual_context": "'Workspace' is clicked, showing 'Workspace Name' and 'Workspace ID'. 'Users' is clicked, showing a list of users with their email and role.", "warnings": null}, {"step_number": 18, "title": "Switch Between Workspaces", "description": "To switch between different workspaces or add a new one, click on the dropdown menu located at the top-left corner of the dashboard (e.g., 'Black Umbrell... Workspace'). From this menu, you can select an existing workspace (e.g., 'AI Agency', 'Black Umbrella A...') or click 'Add another workspace' to create a new one for a different client or project.", "url": "dashboard.retellai.com/agents", "input_field": null, "uses_variable": null, "timestamp": "04:50", "visual_context": "Top left dropdown showing 'Black Umbrell... Workspace' is clicked, revealing 'AI Agency' and 'Black Umbrella A...' as other workspaces, and 'Add another workspace'.", "warnings": null}], "variables_summary": [{"variable_name": "n8nRootPassword", "label": "n8n VPS Root Password", "type": "password", "used_in_future_steps": "No direct usage in this walkthrough, but required for n8n setup."}, {"variable_name": "n8nLoginUrl", "label": "n8n Login URL", "type": "url", "used_in_future_steps": "No direct usage in this walkthrough, but required for n8n setup."}, {"variable_name": "n8nLicenseKey", "label": "n8n License Key", "type": "text", "used_in_future_steps": "No direct usage in this walkthrough, but required for n8n setup."}, {"variable_name": "anthropicApiKey", "label": "Anthropic API Key", "type": "password", "used_in_future_steps": "No direct usage in this walkthrough, but required for AI agent functionality."}, {"variable_name": "geminiApiKey", "label": "Gemini API Key", "type": "password", "used_in_future_steps": "No direct usage in this walkthrough, but required for AI agent functionality."}, {"variable_name": "openaiApiKey", "label": "OpenAI API Key", "type": "password", "used_in_future_steps": "No direct usage in this walkthrough, but required for AI agent functionality."}, {"variable_name": "knowledgeBaseName", "label": "Knowledge Base Name", "type": "text", "used_in_future_steps": "No direct usage in future steps within this SOP, but this value would be used to identify the created knowledge base."}, {"variable_name": "batchCallName", "label": "Batch Call Name", "type": "text", "used_in_future_steps": "No direct usage in future steps within this SOP, but this value would be used to identify the created batch call campaign."}, {"variable_name": "qaCohortName", "label": "Cohort Name", "type": "text", "used_in_future_steps": "No direct usage in future steps within this SOP, but this value would be used to identify the created QA cohort."}, {"variable_name": "alertName", "label": "Alert Name", "type": "text", "used_in_future_steps": "No direct usage in future steps within this SOP, but this value would be used to identify the created alert."}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod7-les3"});
loadSop('m7_04', {"title": "AI Voice Delta Response System Setup", "description": "This SOP outlines the steps to set up the AI Voice Delta Response System by importing a workflow into n8n, configuring webhooks, integrating with HighLevel CRM for Location ID, Private Key, and Calendar ID, and setting up the Retell AI agent with MCPs and phone number webhooks.", "estimated_time": "15 minutes", "steps": [{"step_number": 1, "title": "Create New Workflow in n8n", "description": "Navigate to your personal space in n8n and create a new workflow.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "n8n dashboard, 'Personal' section, 'Create workflow' button"}, {"step_number": 2, "title": "Import Workflow Template", "description": "Import the provided AI Voice Delta Response System Inbound Template JSON file into your new n8n workflow.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:15", "visual_context": "n8n workflow editor, 'Import from file' option selected, file explorer showing 'AI Voice Delta Response - Inbound [TEMPLATE].json'"}, {"step_number": 3, "title": "Configure MCP Server Trigger Path", "description": "Open the 'MCP Server Trigger' node and change the 'Path' to include your client's name, ensuring it's unique.", "url": null, "input_field": {"variable_name": "clientName", "label": "Client Name", "type": "text"}, "uses_variable": null, "timestamp": "00:38", "visual_context": "n8n workflow editor, 'MCP Server Trigger' node settings, 'Path' field being edited to 'mcp-client-blackumbrella'"}, {"step_number": 4, "title": "Configure Booking Link Sender Webhook Path", "description": "Open the 'Inbound Webhook1' node within the 'Booking Link Sender AI Voice Agent' section and update its 'Path' with your client's name.", "url": null, "input_field": null, "uses_variable": "clientName", "timestamp": "00:58", "visual_context": "n8n workflow editor, 'Inbound Webhook1' node settings, 'Path' field being edited to 'link-client-blackumbrella'"}, {"step_number": 5, "title": "Configure Calendar Booking Webhook Path", "description": "Open the 'Inbound Webhook' node within the 'Calendar Booking AI Voice Agent' section and update its 'Path' with your client's name.", "url": null, "input_field": null, "uses_variable": "clientName", "timestamp": "01:17", "visual_context": "n8n workflow editor, 'Inbound Webhook' node settings, 'Path' field being edited to 'calendar-client-blackumbrella'"}, {"step_number": 6, "title": "Configure Outbound Post-Call Webhook Path", "description": "Open the 'Outbound Post-Call Webhook' node and update its 'Path' with your client's name.", "url": null, "input_field": null, "uses_variable": "clientName", "timestamp": "01:32", "visual_context": "n8n workflow editor, 'Outbound Post-Call Webhook' node settings, 'Path' field being edited to 'outbound-post-call-client-blackumbrella'"}, {"step_number": 7, "title": "Save Workflow", "description": "Save the n8n workflow after configuring all webhook paths.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:53", "visual_context": "n8n workflow editor, 'Save' button clicked"}, {"step_number": 8, "title": "Retrieve HighLevel Location ID", "description": "Navigate to your HighLevel CRM, go to 'Settings' -> 'Business Profile', and copy your 'Location ID'.", "url": "https://crm.blackumbrella.app/v2/location/B3WJvXSDN6VjNOBEL650c/settings/company", "input_field": {"variable_name": "locationId", "label": "HighLevel Location ID", "type": "text"}, "uses_variable": null, "timestamp": "02:07", "visual_context": "HighLevel CRM dashboard, 'Business Profile Settings' showing 'Location ID'"}, {"step_number": 9, "title": "Create HighLevel Private Integration Key", "description": "In HighLevel, go to 'Settings' -> 'Private Integrations', create a new integration named 'n8n', select all scopes, and copy the generated Private Key.", "url": "https://crm.blackumbrella.app/v2/location/B3WJvXSDN6VjNOBEL650c/settings/private-integrations", "input_field": {"variable_name": "privateKey", "label": "HighLevel Private Key", "type": "text"}, "uses_variable": null, "timestamp": "02:31", "visual_context": "HighLevel CRM dashboard, 'Private Integrations' section, 'Create new integration' modal, 'Scopes' tab, generated private key displayed"}, {"step_number": 10, "title": "Add Location ID and Private Key to Post-Call Analysis", "description": "In n8n, open the 'Edit Fields1' node within the 'Post-call Analysis' section and paste the HighLevel Location ID and Private Key into their respective fields.", "url": null, "input_field": null, "uses_variable": "locationId, privateKey", "timestamp": "02:57", "visual_context": "n8n workflow editor, 'Edit Fields1' node settings, 'location_id' and 'private_key' fields being updated"}, {"step_number": 11, "title": "Import Retell AI Agent", "description": "In Retell AI, go to 'Agents', click 'Import', and upload the 'AI Voice Agent - CLIENT [TEMPLATE].json' file. Rename the agent to include your client's name.", "url": "https://dashboard.retellai.com/agents", "input_field": null, "uses_variable": "clientName", "timestamp": "04:04", "visual_context": "Retell AI dashboard, 'All Agents' list, 'Import' button, 'Upload an agent' modal, agent name being edited"}, {"step_number": 12, "title": "Retrieve Retell AI Agent ID", "description": "After importing and renaming, copy the 'Agent ID' displayed next to the agent's name in Retell AI.", "url": null, "input_field": {"variable_name": "voiceAgentId", "label": "Retell AI Voice Agent ID", "type": "text"}, "uses_variable": null, "timestamp": "04:41", "visual_context": "Retell AI agent settings page, 'Agent ID' displayed at the top"}, {"step_number": 13, "title": "Add Location ID, Private Key, and Agent ID to Calendar Booking Agent", "description": "In n8n, open the 'Edit Fields' node within the 'Calendar Booking AI Voice Agent' section and paste the HighLevel Location ID, Private Key, and Retell AI Agent ID.", "url": null, "input_field": null, "uses_variable": "locationId, privateKey, voiceAgentId", "timestamp": "03:36", "visual_context": "n8n workflow editor, 'Edit Fields' node settings, 'location_id', 'private_key', and 'agent_id' fields being updated"}, {"step_number": 14, "title": "Retrieve HighLevel Calendar ID", "description": "In HighLevel, go to 'Settings' -> 'Calendars', ensure your desired calendar is active, and copy its 'ID'.", "url": "https://crm.blackumbrella.app/v2/location/B3WJvXSDN6VjNOBEL650c/settings/calendars", "input_field": {"variable_name": "calendarId", "label": "HighLevel Calendar ID", "type": "text"}, "uses_variable": null, "timestamp": "04:53", "visual_context": "HighLevel CRM dashboard, 'Calendars' section, calendar list showing 'ID'"}, {"step_number": 15, "title": "Add Calendar ID to Calendar Booking Agent", "description": "In n8n, open the 'Edit Fields' node within the 'Calendar Booking AI Voice Agent' section and paste the HighLevel Calendar ID.", "url": null, "input_field": null, "uses_variable": "calendarId", "timestamp": "05:28", "visual_context": "n8n workflow editor, 'Edit Fields' node settings, 'calendar_id' field being updated"}, {"step_number": 16, "title": "Add Location ID, Private Key, and Agent ID to Booking Link Sender Agent", "description": "In n8n, open the 'Edit Fields2' node within the 'Booking Link Sender AI Voice Agent' section and paste the HighLevel Location ID, Private Key, and Retell AI Agent ID.", "url": null, "input_field": null, "uses_variable": "locationId, privateKey, voiceAgentId", "timestamp": "05:36", "visual_context": "n8n workflow editor, 'Edit Fields2' node settings, 'location_id', 'private_key', and 'agent_id' fields being updated"}, {"step_number": 17, "title": "Add Private Key to Send Booking Link Tool", "description": "In n8n, open the 'send_booking_link' tool node and paste the HighLevel Private Key into the 'Authorization' header's 'Value' field, prefixed with 'Bearer ' (note the space).", "url": null, "input_field": null, "uses_variable": "privateKey", "timestamp": "06:18", "visual_context": "n8n workflow editor, 'send_booking_link' node settings, 'Authorization' header 'Value' field being updated"}, {"step_number": 18, "title": "Add Booking Link URL to Send Booking Link Tool", "description": "In n8n, open the 'send_booking_link' tool node and paste your HighLevel calendar's permanent booking link into the 'message' body 'Value' field.", "url": null, "input_field": null, "uses_variable": "calendarId", "timestamp": "06:46", "visual_context": "n8n workflow editor, 'send_booking_link' node settings, 'message' body 'Value' field being updated with a booking URL"}, {"step_number": 19, "title": "Add Private Key, Calendar ID, and Location ID to Book Appointment Tool", "description": "In n8n, open the 'book_appointment_tool' node and paste the HighLevel Private Key (prefixed with 'Bearer '), Calendar ID, and Location ID into their respective fields.", "url": null, "input_field": null, "uses_variable": "privateKey, calendarId, locationId", "timestamp": "07:44", "visual_context": "n8n workflow editor, 'book_appointment_tool' node settings, 'Authorization' header 'Value', 'calendarId', and 'locationId' fields being updated"}, {"step_number": 20, "title": "Retrieve GHL Post-Call Data Extraction Webhook URL", "description": "In HighLevel, navigate to 'Automation' -> 'Workflows', open the '[VOICE AI] Post-call Data Extraction' workflow, and copy the 'Inbound Webhook' URL.", "url": "https://crm.blackumbrella.app/v2/location/B3WJvXSDN6VjNOBEL650c/workflows/1081-9969-4d01-b8a1-6da99f8d5444/edit", "input_field": {"variable_name": "ghlPostCallWebhookUrl", "label": "GHL Post-Call Webhook URL", "type": "url"}, "uses_variable": null, "timestamp": "08:30", "visual_context": "HighLevel CRM dashboard, 'Workflow' editor, 'Inbound Webhook' trigger settings, 'URL (POST/GET/PUT)' field"}, {"step_number": 21, "title": "Add GHL Post-Call Webhook URL to n8n Workflow", "description": "In n8n, open the 'Send to GHL' node within the 'Post-call Analysis' section and paste the copied HighLevel Post-Call Webhook URL into the 'URL' field.", "url": null, "input_field": null, "uses_variable": "ghlPostCallWebhookUrl", "timestamp": "09:20", "visual_context": "n8n workflow editor, 'Send to GHL' node settings, 'URL' field being updated"}, {"step_number": 22, "title": "Add Agent Level Webhook URL in Retell AI", "description": "In Retell AI, open your client agent, go to 'Webhook Settings', and paste the 'Outbound Post-Call Webhook' Production URL from n8n into the 'Agent Level Webhook URL' field.", "url": null, "input_field": null, "uses_variable": "clientName", "timestamp": "09:49", "visual_context": "Retell AI agent settings page, 'Webhook Settings' section, 'Agent Level Webhook URL' field being updated"}, {"step_number": 23, "title": "Add MCP to Retell AI Agent", "description": "In Retell AI, open your client agent, go to 'MCPs', click 'Add MCP', name it 'n8n-client', paste the 'MCP Server Trigger' Production URL from n8n, and add both 'book_appointment_tool' and 'send_booking_link' tools. Configure 'Speak During Execution' and 'Speak After Execution' for the appointment tool.", "url": null, "input_field": null, "uses_variable": "clientName", "timestamp": "10:21", "visual_context": "Retell AI agent settings page, 'MCPs' section, 'Add MCP' modal, tool selection and execution speech configuration"}, {"step_number": 24, "title": "Rename Book Appointment Tool in n8n (if necessary)", "description": "If you encounter a 'duplicate name' error when adding the MCP tool, rename the 'book_appointment_tool' node in n8n (e.g., to 'book_appointment_bu_tool') and then delete and re-add the MCP in Retell AI with the new tool name.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "11:52", "visual_context": "n8n workflow editor, 'book_appointment_tool' node name being edited"}, {"step_number": 25, "title": "Add Inbound Webhook to Retell AI Phone Number", "description": "In Retell AI, go to 'Phone Numbers', select your client agent's phone number, click 'Add an inbound webhook', and paste the 'Inbound Webhook' Production URL from n8n (Calendar Booking AI Voice Agent) into the 'Enter Url' field.", "url": null, "input_field": null, "uses_variable": "clientName", "timestamp": "13:01", "visual_context": "Retell AI phone number settings, 'Inbound Call Agent' section, 'Add an inbound webhook' field being updated"}, {"step_number": 26, "title": "Set n8n Workflow Timezone", "description": "In n8n, go to the workflow settings (three dots menu), set the 'Timezone' to your client's timezone, and save the changes.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "13:56", "visual_context": "n8n workflow editor, 'Settings' modal, 'Timezone' dropdown being selected"}, {"step_number": 27, "title": "Publish n8n Workflow", "description": "Save and publish your n8n workflow to activate all changes.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "14:07", "visual_context": "n8n workflow editor, 'Save' and 'Publish' buttons clicked, green checkmark indicating active workflow"}], "variables_summary": [{"variable_name": "clientName", "label": "Client Name", "type": "text", "description": "The unique name of your client, used as a suffix in webhook paths and MCP names."}, {"variable_name": "locationId", "label": "HighLevel Location ID", "type": "text", "description": "The unique identifier for your location in HighLevel CRM."}, {"variable_name": "privateKey", "label": "HighLevel Private Key", "type": "text", "description": "An API key generated in HighLevel for private integrations, used for authentication."}, {"variable_name": "voiceAgentId", "label": "Retell AI Voice Agent ID", "type": "text", "description": "The unique identifier for your AI Voice Agent in Retell AI."}, {"variable_name": "calendarId", "label": "HighLevel Calendar ID", "type": "text", "description": "The unique identifier for your calendar in HighLevel CRM, used for booking appointments and generating booking links."}, {"variable_name": "ghlPostCallWebhookUrl", "label": "GHL Post-Call Webhook URL", "type": "url", "description": "The webhook URL from your HighLevel workflow designed to receive post-call data."}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod7-les4"});
loadSop('m7_05', {"title": "Set up AI Voice Agent Prompt Forge in Claude AI", "description": "This SOP guides you through setting up the AI Voice Agent Prompt Forge in Claude AI, allowing you to generate high-converting AI voice agent prompts for various business needs. You will copy a pre-written prompt and configure it within a new Claude AI project.", "estimated_time": "5 minutes", "steps": [{"step_number": 1, "title": "Open the AI Voice Agent Prompt Forge file", "description": "Locate and open the \"AI Voice Agent Prompt Forge.md\" file from your downloaded course materials. This file contains the core prompt for setting up your AI voice agent. The speaker uses \"Cursor\" (a text editor) to open it, but any text editor will work.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "Finder window showing \"Prompts\" folder with \"AI Voice Agent Prompt Forge.md\" selected. Then the file is opened in a text editor.", "warnings": null}, {"step_number": 2, "title": "Copy the entire content of the AI Voice Agent Prompt Forge", "description": "Select and copy all the text content from the \"AI Voice Agent Prompt Forge.md\" file. This content defines the identity, purpose, and capabilities of the AI Voice Agent Prompt Forge.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:08", "visual_context": "The text editor showing the content of \"AI Voice Agent Prompt Forge.md\" with all text selected.", "warnings": null}, {"step_number": 3, "title": "Navigate to Claude AI projects", "description": "Open your web browser and go to claude.ai. Once logged in, click on the \"Projects\" icon (looks like a folder or stacked squares) in the left sidebar to access your projects.", "url": "https://claude.ai/projects", "input_field": null, "uses_variable": null, "timestamp": "00:31", "visual_context": "Browser showing claude.ai/new, then clicking the \"Projects\" icon.", "warnings": null}, {"step_number": 4, "title": "Create a new personal project in Claude AI", "description": "On the \"Projects\" page, click the \"+ New project\" button to start creating a new project.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:36", "visual_context": "Claude AI \"Projects\" page with \"+ New project\" button highlighted.", "warnings": null}, {"step_number": 5, "title": "Name the new project and provide a description", "description": "In the \"Create a personal project\" dialog:\n- Enter \"AI Voice Prompt Forge\" in the \"Name your project\" field.\n- Enter \"Use to create AI voice agent prompts\" in the \"Describe your project, goals, subject, etc...\" field.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:38", "visual_context": "\"Create a personal project\" dialog with project name and description being typed.", "warnings": null}, {"step_number": 6, "title": "Confirm project creation", "description": "Click the \"Create project\" button to finalize the creation of your new project.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:47", "visual_context": "\"Create a personal project\" dialog with \"Create project\" button clicked.", "warnings": null}, {"step_number": 7, "title": "Set project instructions", "description": "In the newly created project, locate the \"Instructions\" section on the right sidebar and click the \"+\" icon to add instructions.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:48", "visual_context": "Project page with \"Instructions\" section and \"+\" icon highlighted.", "warnings": null}, {"step_number": 8, "title": "Paste the AI Voice Agent Prompt Forge content into instructions", "description": "Paste the entire content you copied from the \"AI Voice Agent Prompt Forge.md\" file into the \"Set project instructions\" text area. This will configure Claude AI to act as your AI Voice Agent Prompt Forge.", "url": null, "input_field": null, "uses_variable":
