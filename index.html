<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOP Runner — Copy My AI Agency</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2d3140;
    --text: #e4e6eb;
    --text-muted: #8b8f9e;
    --accent: #4f8cff;
    --accent-dim: #2a4a8a;
    --success: #34d399;
    --success-dim: #065f46;
    --warning: #fbbf24;
    --warning-dim: #78350f;
    --danger: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* Layout */
  .app { display: flex; min-height: 100vh; }
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    overflow-y: auto;
    z-index: 10;
  }
  .main {
    margin-left: 280px;
    flex: 1;
    padding: 40px;
    max-width: 860px;
  }

  /* Sidebar */
  .sidebar h2 { font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .sidebar h3 { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 20px 0 8px; }
  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 8px;
    cursor: pointer; font-size: 13px; color: var(--text-muted);
    transition: all 0.15s;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); }
  .nav-item .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); flex-shrink: 0;
  }
  .nav-item .status-dot.complete { background: var(--success); }
  .nav-item .status-dot.in-progress { background: var(--warning); }

  .vault-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 10px 12px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; font-size: 13px;
    transition: all 0.15s; margin-top: 12px;
  }
  .vault-btn:hover { border-color: var(--accent); }

  /* Header */
  .sop-header { margin-bottom: 32px; }
  .sop-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .sop-header .meta { display: flex; gap: 16px; color: var(--text-muted); font-size: 14px; }
  .sop-header .meta span { display: flex; align-items: center; gap: 4px; }
  .progress-bar {
    height: 4px; background: var(--surface2); border-radius: 2px;
    margin-top: 16px; overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%; background: var(--accent);
    border-radius: 2px; transition: width 0.3s;
  }

  /* Steps */
  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
    transition: all 0.2s;
  }
  .step.completed { border-color: var(--success-dim); opacity: 0.7; }
  .step.completed:hover { opacity: 1; }
  .step.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-dim); }

  .step-header {
    display: flex; align-items: flex-start; gap: 12px; cursor: pointer;
  }
  .step-checkbox {
    width: 24px; height: 24px; border-radius: 6px;
    border: 2px solid var(--border); background: transparent;
    cursor: pointer; flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; color: transparent;
  }
  .step-checkbox:hover { border-color: var(--accent); }
  .step.completed .step-checkbox {
    background: var(--success); border-color: var(--success); color: white;
  }
  .step-number {
    background: var(--surface2); color: var(--text-muted);
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
  }
  .step.completed .step-number { background: var(--success-dim); color: var(--success); }
  .step-title { font-size: 16px; font-weight: 600; flex: 1; }
  .step-timestamp {
    font-size: 12px; color: var(--text-muted); background: var(--surface2);
    padding: 2px 8px; border-radius: 4px; flex-shrink: 0;
  }

  .step-body { margin-left: 64px; margin-top: 12px; }
  .step-description { color: var(--text-muted); font-size: 14px; margin-bottom: 12px; }

  .step-url {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--accent); font-size: 13px;
    text-decoration: none; padding: 4px 10px;
    background: var(--accent-dim); border-radius: 6px;
    margin-bottom: 12px;
  }
  .step-url:hover { filter: brightness(1.2); }

  .step-warning {
    display: flex; align-items: flex-start; gap: 8px;
    background: var(--warning-dim); border-radius: 8px;
    padding: 10px 14px; font-size: 13px; color: var(--warning);
    margin-bottom: 12px;
  }

  .step-visual {
    font-size: 12px; color: var(--text-muted); font-style: italic;
    padding: 8px 12px; background: var(--surface2); border-radius: 6px;
    margin-bottom: 12px; border-left: 3px solid var(--border);
  }

  /* Training link */
  .training-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--warning); font-size: 14px; font-weight: 500;
    text-decoration: none; padding: 8px 16px;
    background: var(--warning-dim); border: 1px solid var(--warning);
    border-radius: 8px; margin-top: 12px;
    transition: all 0.15s;
  }
  .training-link:hover { filter: brightness(1.2); transform: translateY(-1px); }

  /* Input fields */
  .input-group {
    background: var(--surface2); border-radius: 8px;
    padding: 14px; margin-top: 12px;
    border: 1px solid var(--border);
  }
  .input-group label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--accent); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .input-group .input-row { display: flex; gap: 8px; }
  .input-group input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px; color: var(--text);
    font-size: 14px; font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .input-group input:focus { outline: none; border-color: var(--accent); }
  .input-group input.has-value { border-color: var(--success-dim); }
  .input-group .save-indicator {
    font-size: 11px; color: var(--success); margin-top: 4px;
    display: none;
  }
  .input-group .save-indicator.show { display: block; }
  .input-group button {
    padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); cursor: pointer;
    font-size: 12px; white-space: nowrap;
  }
  .input-group button:hover { background: var(--accent-dim); border-color: var(--accent); }

  /* Uses variable (auto-fill from vault) */
  .uses-var {
    display: flex; align-items: flex-start; gap: 10px;
    border-radius: 8px; padding: 12px 14px; font-size: 13px;
    margin-bottom: 12px;
  }
  .uses-var.filled {
    background: var(--success-dim); border: 1px solid var(--success);
  }
  .uses-var.empty {
    background: var(--warning-dim); border: 1px solid var(--warning);
  }
  .uses-var-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .uses-var-label { color: var(--text); margin-bottom: 2px; }
  .uses-var-value {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px; color: var(--success); background: rgba(0,0,0,0.2);
    padding: 2px 6px; border-radius: 4px;
  }
  .uses-var-hint { color: var(--warning); font-size: 12px; }

  /* Vault modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px; width: 520px;
    max-height: 80vh; overflow-y: auto;
  }
  .modal h2 { font-size: 20px; margin-bottom: 4px; }
  .modal .subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }
  .vault-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .vault-item:last-child { border-bottom: none; }
  .vault-item .vault-label { flex: 1; font-size: 13px; }
  .vault-item .vault-value {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px; color: var(--text-muted);
    max-width: 200px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
  }
  .vault-item .vault-value.empty { color: var(--danger); font-style: italic; }
  .vault-status {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .vault-status.filled { background: var(--success); }
  .vault-status.empty { background: var(--danger); }

  .modal-close {
    float: right; background: none; border: none;
    color: var(--text-muted); cursor: pointer; font-size: 20px;
  }
  .modal-actions { margin-top: 20px; display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button {
    padding: 8px 16px; border-radius: 8px; border: none;
    cursor: pointer; font-size: 13px;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border) !important; }
  .btn-danger { background: var(--danger); color: white; }

  /* Home page */
  .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 24px; }
  .sop-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; cursor: pointer;
    transition: all 0.15s;
  }
  .sop-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .sop-card h3 { font-size: 15px; margin-bottom: 4px; }
  .sop-card .card-meta { font-size: 12px; color: var(--text-muted); }
  .sop-card .card-progress {
    margin-top: 10px; height: 3px; background: var(--surface2);
    border-radius: 2px; overflow: hidden;
  }
  .sop-card .card-progress .fill { height: 100%; background: var(--success); }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 20px; }
    .home-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar" id="sidebar">
    <h2>SOP Runner</h2>
    <div id="nav-home" class="nav-item active" onclick="showHome()">
      <span>📋</span> All SOPs
    </div>
    <button class="vault-btn" onclick="openVault()">
      🔑 Credential Vault <span id="vault-count" style="margin-left:auto; font-size:11px; color:var(--text-muted)">0/0</span>
    </button>
    <h3>SOPs</h3>
    <div id="nav-list"></div>
  </div>

  <div class="main" id="main-content">
    <!-- Content rendered by JS -->
  </div>
</div>

<!-- Vault Modal -->
<div class="modal-overlay" id="vault-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeVault()">&times;</button>
    <h2>🔑 Credential Vault</h2>
    <p class="subtitle">Values saved here auto-fill across all SOPs</p>
    <div id="vault-contents"></div>
    <div class="modal-actions">
      <button class="btn-danger" onclick="if(confirm('Clear all saved values?')){localStorage.removeItem('sop-vault');location.reload()}">Clear All</button>
      <button class="btn-secondary" onclick="importVault()">Import JSON</button>
      <button class="btn-secondary" onclick="exportVault()">Export JSON</button>
      <button class="btn-primary" onclick="closeVault()">Done</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">
    </div>
  </div>
</div>

<script>
// ===== SOP DATA STORE =====
const SOPs = {};
const MODULE_ORDER = [
  { id: 'm0', name: 'Welcome' },
  { id: 'm1', name: 'AI Agency Setup' },
  { id: 'm2', name: 'Sales Process' },
  { id: 'm3', name: 'Organic Client Acquisition' },
  { id: 'm4', name: 'Paid Client Acquisition' },
  { id: 'm5', name: 'Client Onboarding' },
  { id: 'm6', name: 'AI Delta Response System' },
  { id: 'm7', name: 'AI Voice Delta Response System' },
];

// ===== VAULT (persisted in localStorage) =====
function getVault() {
  return JSON.parse(localStorage.getItem('sop-vault') || '{}');
}
function setVaultValue(key, value) {
  const vault = getVault();
  vault[key] = value;
  localStorage.setItem('sop-vault', JSON.stringify(vault));
  updateVaultCount();
}
function getVaultValue(key) {
  return getVault()[key] || '';
}

// ===== PROGRESS (persisted in localStorage) =====
function getProgress(sopId) {
  return JSON.parse(localStorage.getItem(`sop-progress-${sopId}`) || '{}');
}
function setStepComplete(sopId, stepNum, complete) {
  const progress = getProgress(sopId);
  progress[stepNum] = complete;
  localStorage.setItem(`sop-progress-${sopId}`, JSON.stringify(progress));
}

// ===== NAVIGATION =====
let currentSop = null;

function showHome() {
  currentSop = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-home').classList.add('active');
  renderHome();
}

function showSop(sopId) {
  currentSop = sopId;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItem = document.querySelector(`[data-sop="${sopId}"]`);
  if (navItem) navItem.classList.add('active');
  renderSop(sopId);
}

// ===== RENDER HOME =====
function renderHome() {
  const sopIds = Object.keys(SOPs);
  let html = `<div class="sop-header"><h1>Copy My AI Agency — SOPs</h1>
    <p style="color:var(--text-muted);font-size:14px;margin-top:8px">
      Interactive step-by-step procedures. Values you enter (API keys, IDs, URLs) are saved to your Credential Vault and auto-fill across all SOPs.
    </p></div>`;

  if (sopIds.length === 0) {
    html += `<div style="text-align:center;padding:60px 20px;color:var(--text-muted)">
      <p style="font-size:48px;margin-bottom:12px">📋</p>
      <p>No SOPs loaded yet.</p>
    </div>`;
  } else {
    for (const mod of MODULE_ORDER) {
      const modSops = sopIds.filter(id => id.startsWith(mod.id + '_') || id.startsWith(mod.id + '-'));
      if (modSops.length === 0) continue;
      html += `<h3 style="font-size:14px;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin:24px 0 12px">${mod.name}</h3>`;
      html += '<div class="home-grid">';
      for (const id of modSops) {
        const sop = SOPs[id];
        const progress = getProgress(id);
        const done = Object.values(progress).filter(Boolean).length;
        const total = sop.steps.length;
        const pct = total ? Math.round((done / total) * 100) : 0;
        html += `<div class="sop-card" onclick="showSop('${id}')">
          <h3>${sop.title}</h3>
          <div class="card-meta">${total} steps · ${sop.estimated_time} · ${pct}% complete</div>
          <div class="card-progress"><div class="fill" style="width:${pct}%"></div></div>
        </div>`;
      }
      html += '</div>';
    }
  }

  // Vault summary
  const vault = getVault();
  const allVars = getAllVariables();
  if (allVars.length > 0) {
    html += `<div style="margin-top:32px"><h3 style="font-size:14px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">Credential Vault</h3>`;
    for (const v of allVars) {
      const val = vault[v.variable_name] || '';
      const filled = val.length > 0;
      html += `<div class="vault-item">
        <div class="vault-status ${filled ? 'filled' : 'empty'}"></div>
        <div class="vault-label">${v.label}</div>
        <div class="vault-value ${filled ? '' : 'empty'}">${filled ? maskValue(val) : 'Not set'}</div>
      </div>`;
    }
    html += '</div>';
  }

  document.getElementById('main-content').innerHTML = html;
}

// ===== RENDER SOP =====
function renderSop(sopId) {
  const sop = SOPs[sopId];
  if (!sop) return;
  const progress = getProgress(sopId);
  const done = Object.values(progress).filter(Boolean).length;
  const pct = sop.steps.length ? Math.round((done / sop.steps.length) * 100) : 0;

  let html = `<div class="sop-header">
    <h1>${sop.title}</h1>
    <div class="meta">
      <span>⏱ ${sop.estimated_time}</span>
      <span>📝 ${sop.steps.length} steps</span>
      <span>✅ ${done}/${sop.steps.length} complete (${pct}%)</span>
    </div>
    <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>
    <p style="color:var(--text-muted);font-size:14px;margin-top:12px">${sop.description}</p>
    ${sop.lesson_url ? `<a href="${sop.lesson_url}" target="_blank" class="training-link">🎓 Watch Training Video on Operator Base</a>` : ''}
  </div>`;

  for (const step of sop.steps) {
    const isComplete = progress[step.step_number];
    const vault = getVault();
    const inputVal = step.input_field ? (vault[step.input_field.variable_name] || '') : '';

    html += `<div class="step ${isComplete ? 'completed' : ''}" id="step-${step.step_number}">
      <div class="step-header" onclick="toggleStep('${sopId}', ${step.step_number})">
        <div class="step-checkbox">${isComplete ? '✓' : ''}</div>
        <div class="step-number">${step.step_number}</div>
        <div class="step-title">${step.title}</div>
        ${step.timestamp ? `<div class="step-timestamp">${step.timestamp}</div>` : ''}
      </div>
      <div class="step-body">
        <div class="step-description">${step.description}</div>
        ${step.url ? `<a class="step-url" href="${step.url}" target="_blank">🔗 ${new URL(step.url).hostname}${new URL(step.url).pathname.substring(0, 30)}</a>` : ''}
        ${step.warnings ? `<div class="step-warning">⚠️ ${step.warnings}</div>` : ''}
        ${step.visual_context ? `<div class="step-visual">👁 ${step.visual_context}</div>` : ''}
        ${step.uses_variable ? renderUsesVariable(step.uses_variable) : ''}
        ${step.input_field ? renderInputField(step.input_field, inputVal) : ''}
      </div>
    </div>`;
  }

  document.getElementById('main-content').innerHTML = html;
  updateNav();
}

function renderUsesVariable(varNameInput) {
  const vault = getVault();
  const allVars = getAllVariables();
  const varNames = Array.isArray(varNameInput) ? varNameInput : String(varNameInput).split(',').map(s => s.trim());
  let out = '';
  for (const varName of varNames) {
    const val = vault[varName] || '';
    const varInfo = allVars.find(v => v.variable_name === varName);
    const label = varInfo ? varInfo.label : varName;
    if (val) {
      out += `<div class="uses-var filled">
        <span class="uses-var-icon">🔑</span>
        <div>
          <div class="uses-var-label">Auto-filled from vault: <strong>${label}</strong></div>
          <code class="uses-var-value">${maskValue(val)}</code>
        </div>
      </div>`;
    } else {
      out += `<div class="uses-var empty">
        <span class="uses-var-icon">⚠️</span>
        <div>
          <div class="uses-var-label">Requires: <strong>${label}</strong></div>
          <div class="uses-var-hint">Not yet saved. Complete the earlier SOP that provides this value.</div>
        </div>
      </div>`;
    }
  }
  return out;
}

function renderInputField(field, currentValue) {
  // Obfuscate all sensitive fields by default (api_key, password, license keys, tokens)
  const sensitive = ['password', 'api_key', 'key', 'token', 'secret'].some(t => (field.type || '').includes(t)) ||
    /key|password|token|secret/i.test(field.label);
  const inputType = sensitive ? 'password' : 'text';
  return `<div class="input-group">
    <label>💾 Save: ${field.label}</label>
    <div class="input-row">
      <input type="${inputType}"
        id="input-${field.variable_name}"
        placeholder="Paste your ${field.label} here..."
        value="${escapeHtml(currentValue)}"
        class="${currentValue ? 'has-value' : ''}"
        oninput="onInputChange('${field.variable_name}', this)">
      <button onclick="toggleVisibility('input-${field.variable_name}')" title="Show/Hide">👁</button>
      <button onclick="copyFromField('input-${field.variable_name}')" title="Copy to clipboard">📋</button>
      <button onclick="pasteFromClipboard('input-${field.variable_name}', '${field.variable_name}')" title="Paste from clipboard">📥 Paste</button>
    </div>
    <div class="save-indicator ${currentValue ? 'show' : ''}" id="saved-${field.variable_name}">✓ Saved to vault</div>
  </div>`;
}

// ===== INTERACTIONS =====
function toggleStep(sopId, stepNum) {
  const progress = getProgress(sopId);
  const newState = !progress[stepNum];
  setStepComplete(sopId, stepNum, newState);
  renderSop(sopId);
}

let saveTimeout = null;
function onInputChange(varName, input) {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    setVaultValue(varName, input.value);
    input.classList.toggle('has-value', input.value.length > 0);
    const indicator = document.getElementById(`saved-${varName}`);
    if (indicator) {
      indicator.classList.add('show');
      indicator.textContent = '✓ Saved to vault';
    }
  }, 500);
}

function toggleVisibility(inputId) {
  const input = document.getElementById(inputId);
  input.type = input.type === 'password' ? 'text' : 'password';
}

async function copyFromField(inputId) {
  const input = document.getElementById(inputId);
  if (!input.value) return;
  try {
    await navigator.clipboard.writeText(input.value);
    // Brief visual feedback
    const btn = input.parentElement.querySelectorAll('button')[1];
    const orig = btn.textContent;
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = orig, 1500);
  } catch(e) {
    // Fallback: select the text
    const origType = input.type;
    input.type = 'text';
    input.select();
    document.execCommand('copy');
    input.type = origType;
  }
}

async function pasteFromClipboard(inputId, varName) {
  try {
    const text = await navigator.clipboard.readText();
    const input = document.getElementById(inputId);
    input.value = text;
    setVaultValue(varName, text);
    input.classList.add('has-value');
    const indicator = document.getElementById(`saved-${varName}`);
    if (indicator) { indicator.classList.add('show'); indicator.textContent = '✓ Pasted & saved to vault'; }
  } catch(e) {
    alert('Clipboard access denied. Please paste manually.');
  }
}

// ===== VAULT MODAL =====
function openVault() {
  const vault = getVault();
  const allVars = getAllVariables();
  let html = '';
  for (const v of allVars) {
    const val = vault[v.variable_name] || '';
    const filled = val.length > 0;
    html += `<div class="vault-item">
      <div class="vault-status ${filled ? 'filled' : 'empty'}"></div>
      <div class="vault-label">
        <div>${v.label}</div>
        <div style="font-size:11px;color:var(--text-muted)">${v.used_in_future_steps || ''}</div>
      </div>
      <div class="vault-value ${filled ? '' : 'empty'}">${filled ? maskValue(val) : 'Not set'}</div>
    </div>`;
  }
  if (allVars.length === 0) html = '<p style="color:var(--text-muted);padding:20px 0">No variables defined in any SOP yet.</p>';
  document.getElementById('vault-contents').innerHTML = html;
  document.getElementById('vault-modal').classList.add('open');
}
function closeVault() {
  document.getElementById('vault-modal').classList.remove('open');
}
function exportVault() {
  const vault = getVault();
  const allProgress = {};
  for (const id of Object.keys(SOPs)) {
    allProgress[id] = getProgress(id);
  }
  const exportData = { vault, progress: allProgress, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sop-credential-vault.json';
  a.click();
}
function importVault() {
  document.getElementById('import-file').click();
}
function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.vault) {
        localStorage.setItem('sop-vault', JSON.stringify(data.vault));
      }
      if (data.progress) {
        for (const [id, prog] of Object.entries(data.progress)) {
          localStorage.setItem(`sop-progress-${id}`, JSON.stringify(prog));
        }
      }
      alert('Vault imported successfully!');
      location.reload();
    } catch(err) {
      alert('Invalid file. Please select a valid SOP vault JSON file.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ===== HELPERS =====
function getAllVariables() {
  const vars = [];
  const seen = new Set();
  for (const sop of Object.values(SOPs)) {
    for (const v of (sop.variables_summary || [])) {
      if (!seen.has(v.variable_name)) {
        seen.add(v.variable_name);
        vars.push(v);
      }
    }
  }
  return vars;
}

function updateVaultCount() {
  const vault = getVault();
  const allVars = getAllVariables();
  const filled = allVars.filter(v => vault[v.variable_name]).length;
  document.getElementById('vault-count').textContent = `${filled}/${allVars.length}`;
}

function updateNav() {
  let html = '';
  for (const mod of MODULE_ORDER) {
    // Find SOPs belonging to this module
    const modSops = Object.entries(SOPs).filter(([id]) => id.startsWith(mod.id + '_') || id.startsWith(mod.id + '-'));
    if (modSops.length === 0) continue;
    html += `<div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin:14px 0 6px;padding:0 12px">${mod.name}</div>`;
    for (const [id, sop] of modSops) {
      const progress = getProgress(id);
      const done = Object.values(progress).filter(Boolean).length;
      const total = sop.steps.length;
      let statusClass = '';
      if (done === total && total > 0) statusClass = 'complete';
      else if (done > 0) statusClass = 'in-progress';
      html += `<div class="nav-item ${currentSop === id ? 'active' : ''}" data-sop="${id}" onclick="showSop('${id}')">
        <div class="status-dot ${statusClass}"></div>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sop.title}</span>
      </div>`;
    }
  }
  // Also show any SOPs not matching module pattern (like prerequisites-setup)
  const moduleIds = Object.keys(SOPs).filter(id => !MODULE_ORDER.some(m => id.startsWith(m.id + '_') || id.startsWith(m.id + '-')));
  for (const id of moduleIds) {
    const sop = SOPs[id];
    const progress = getProgress(id);
    const done = Object.values(progress).filter(Boolean).length;
    const total = sop.steps.length;
    let statusClass = '';
    if (done === total && total > 0) statusClass = 'complete';
    else if (done > 0) statusClass = 'in-progress';
    html += `<div class="nav-item ${currentSop === id ? 'active' : ''}" data-sop="${id}" onclick="showSop('${id}')">
      <div class="status-dot ${statusClass}"></div>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sop.title}</span>
    </div>`;
  }
  document.getElementById('nav-list').innerHTML = html;
}

function maskValue(val) {
  if (val.length <= 8) return '••••••••';
  return val.substring(0, 4) + '••••' + val.substring(val.length - 4);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== LOAD SOP DATA =====
function loadSop(id, data) {
  SOPs[id] = data;
  updateNav();
  updateVaultCount();
}

 Agency Snapshot - CMAA' from the dropdown menu and proceed.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:34", "visual_context": "GHL 'Sub-accounts' page. The user hovers over the 'Manage Client' icon for '1bite Studio', then clicks 'Actions' and 'Load Snapshot'. A 'Load Snapshot' modal appears with a dropdown to choose a snapshot."}, {"step_number": 4, "title": "Create New Sub-Account with Snapshot (Alternative)", "description": "If you are starting from scratch, click 'Create Sub-Account' on the 'Sub-accounts' page. Select the 'AI Agency Snapshot - CMAA' template from 'My Snapshots'. Click 'Select & Continue'. Then, click 'Add Manually' and fill in the required business information (First Name, Last Name, Email, Business Name, Business Phone, Address, City, State, Country, Zip, Time Zone). Click 'Add Sub-Account' to create the new sub-account with the snapshot.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:58", "visual_context": "GHL 'Sub-accounts' page. The user clicks 'Create Sub-Account', selects 'AI Agency Snapshot - CMAA' from 'My Snapshots', clicks 'Select & Continue', then 'Add Manually'. A form to 'Add Sub-Account' is displayed, which the user fills out."}, {"step_number": 5, "title": "Activate GHL Calendars", "description": "Once inside your sub-account, navigate to 'Settings' in the left sidebar, then click on 'Calendars'. You will see two calendars: 'AI Follow Up Reminder' and 'Success Session'. Click the three dots next to each calendar and select 'Activate Calendar'. Confirm by clicking 'Save' in the pop-up.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:08", "visual_context": "GHL Dashboard, then 'Settings' -> 'Calendars'. The calendar list shows 'AI Follow Up Reminder' and 'Success Session' as 'Inactive'. The user clicks the three dots and activates each one."}, {"step_number": 6, "title": "Add Team Member to Success Session Calendar", "description": "If this is a brand new account and there are no team members, you need to add one. Go to 'My Staff' under 'Settings'. Click 'Add User', fill in your First Name, Last Name, Email, Phone, and set a Password. Click 'Next', then 'Save' to create the user. Once the user is created, go back to 'Calendars', click the three dots next to 'Success Session', and select 'Edit Calendar'. Under 'Meeting Details', in the 'Select Team Members & Assign Meeting Location' section, select the newly created team member. Ensure 'Custom' is selected for 'Meeting Location' and paste your Zoom link there if you plan to use Zoom for calls. Click 'Save' at the top right.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:30", "visual_context": "GHL 'Calendars' page. The user navigates to 'My Staff', adds a new user, fills in details, saves. Then returns to 'Calendars', edits 'Success Session', and selects the new user as a team member. The user also shows where to paste a Zoom link."}, {"step_number": 7, "title": "Configure Success Session Calendar Forms & Payment", "description": "While editing the 'Success Session' calendar, navigate to 'Forms & Payment'. The 'DFY Success Call Form' should already be selected. For the 'Confirmation page', you can either leave it as 'Default' (which shows a thank you message) or select 'Redirect URL' and enter your custom thank-you page URL. You can also optionally add your Meta pixel ID here. Click 'Save' at the top right.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:44", "visual_context": "Editing 'Success Session' calendar, 'Forms & Payment' tab. 'DFY Success Call Form' is selected. Options for 'Confirmation page' (Default/Redirect URL) and 'Meta pixel ID' are shown."}, {"step_number": 8, "title": "Configure Success Session Calendar Notifications & Customizations", "description": "While editing the 'Success Session' calendar, review the 'Notifications & Additional Options' and 'Customizations' tabs. These settings allow you to configure email notifications, reminders, and the visual style of your calendar widget. Adjust as needed. Click 'Save' at the top right when done.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:09", "visual_context": "Editing 'Success Session' calendar, 'Notifications & Additional Options' and 'Customizations' tabs are shown, highlighting various settings for notifications and widget appearance."}, {"step_number": 9, "title": "Integrate Facebook Messenger and Instagram (if needed)", "description": "To enable messaging through Facebook Messenger and Instagram, navigate to 'Settings' in the left sidebar, then click on 'Integrations'. Locate the Facebook integration and click 'Connect'. Follow the prompts to log in to your Facebook account and connect your Facebook Pages and Instagram handles.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:24", "visual_context": "GHL 'Settings' -> 'Integrations' page. The Facebook integration card is highlighted with a 'Connect' button."}, {"step_number": 10, "title": "Add Domain to the 'AI Agency' Funnel", "description": "To ensure your funnel works correctly and for A2P registration, you need to add a domain. Navigate to 'Settings' in the left sidebar, then click on 'Domains & URL Redirects'. You can either 'Purchase a Domain' directly through GHL or 'Transfer in Domain' if you already own one. Follow the prompts to add your domain. This domain will be used for your 'AI Agency' funnel.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:46", "visual_context": "GHL 'Settings' -> 'Domains & URL Redirects' page. Options to 'Purchase a Domain' or 'Transfer in Domain' are shown. The user demonstrates entering a domain for transfer."}, {"step_number": 11, "title": "Upload Company Logo to Media Storage", "description": "Upload your company logo to GHL's Media Storage. Navigate to 'Media Storage' in the left sidebar. Click 'Upload' and select your logo file (PNG, JPG, JPEG, or GIF, max 2.5MB). Once uploaded, click the three dots next to your logo and select 'Get Link' to copy the image URL.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:31", "visual_context": "GHL 'Media Storage' page. The user clicks 'Upload', selects an image file, and then copies the link of the uploaded image."}, {"step_number": 12, "title": "Update 'agency_logo' Custom Value", "description": "Navigate to 'Settings' in the left sidebar, then click on 'Custom Values'. Locate the custom value named 'agency_logo'. Click the three dots next to it, select 'Edit', and paste the copied image URL into the 'Value' field. Click 'Update'. This will automatically apply your logo to all your funnel steps.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:55", "visual_context": "GHL 'Settings' -> 'Custom Values' page. The user edits the 'agency_logo' custom value and pastes the image URL into the 'Value' field."}, {"step_number": 13, "title": "Update 'privacy policy url' Custom Value", "description": "First, get the URL of your Privacy Policy page from your 'AI Agency' funnel. Navigate to 'Sites' -> 'Funnels', click on your 'AI Agency' funnel, and then click on the 'Privacy Policy' step. Copy the full URL displayed in your browser's address bar (e.g., www.aiagency.com/privacy). Then, navigate to 'Settings' -> 'Custom Values'. Locate the custom value named 'privacy policy url'. Click the three dots next to it, select 'Edit', and paste your Privacy Policy URL into the 'Value' field. Click 'Update'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "06:15", "visual_context": "GHL 'Sites' -> 'Funnels' -> 'AI Agency' -> 'Privacy Policy' page. The user then navigates to 'Settings' -> 'Custom Values', edits 'privacy policy url', and pastes the URL."}, {"step_number": 14, "title": "Update 'legal company name' Custom Value", "description": "Navigate to 'Settings' in the left sidebar, then click on 'Custom Values'. Locate the custom value named 'legal company name'. Click the three dots next to it, select 'Edit', and enter your exact legal company name as it appears in your tax returns (e.g., 'Agency LLC') into the 'Value' field. Click 'Update'. This is crucial for A2P registration.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "07:00", "visual_context": "GHL 'Settings' -> 'Custom Values' page. The user edits 'legal company name' and enters 'Company LLC' as an example."}, {"step_number": 15, "title": "Update Business Profile for A2P Approval", "description": "Navigate to 'Settings' in the left sidebar, then click on 'Business Profile'. Fill out all the required fields under 'General Information' and 'Business Physical Address'. Ensure the 'Legal Business Name' matches your tax returns. The 'Business Email' and 'Branded Domain' must use the same domain as your funnel (e.g., if your funnel domain is www.aiagency.com, your business email should be something@aiagency.com). Also, ensure your 'Business Phone' is correctly entered. Fill in the 'Business Niche' and 'Business Currency'. Complete the 'Authorized Representative' section with the correct information. Finally, fill out the 'Business Information' section, including Business Type, Industry, Registration ID Type, Registration Number, and Business Regions of Operations. This entire page needs to be filled out completely and accurately for A2P approval of your phone services. Click 'Update Information' to save all changes.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "07:27", "visual_context": "GHL 'Settings' -> 'Business Profile' page. The user fills in various fields like Legal Business Name, Business Email, Business Phone, Branded Domain, Business Website, Business Niche, Physical Address, and highlights the importance of matching domains for email and website for A2P approval."}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod1-les2"});
loadSop('m1_03', {"title": "n8n AI Agency Setup - Workflow Configuration", "description": "This SOP guides you through loading and configuring the n8n workflow templates for the AI Agency, including setting up private integrations, custom fields, API keys, and linking them to your GoHighLevel (GHL) account for the SMS demo system.", "estimated_time": "15 minutes", "steps": [{"step_number": 1, "title": "Load n8n Workflows", "description": "Open your n8n instance. Click on 'Create workflow'. Click the three dots in the top right corner and select 'Import from file'. Select and upload the 'AI Demo v3 - TEMPLATE.json' file. Save the workflow. Go back to your personal workflows. Click 'Create workflow' again. Click the three dots and select 'Import from file'. Select and upload the 'Magic Link Generator v2 - TEMPLATE.json' file. Save the workflow.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:10", "visual_context": "n8n interface, 'Workflows' tab, 'Create workflow' button, file browser, workflow diagrams."}, {"step_number": 2, "title": "Get GHL Location ID", "description": "Navigate to your GoHighLevel (GHL) account. Go to 'Settings' (bottom left gear icon) and then 'Business Profile'. Copy the 'Location ID' displayed at the top of the General Information section.", "url": null, "input_field": {"variable_name": "ghl_location_id", "label": "GHL Location ID", "type": "string"}, "uses_variable": null, "timestamp": "01:31", "visual_context": "GHL Dashboard, Settings menu, Business Profile page, Location ID field."}, {"step_number": 3, "title": "Create GHL Private Integration Key", "description": "In your GHL account, go to 'Settings' and then 'Private Integrations'. Click 'Create New Integration'. Enter 'n8n' as the name. Click 'Next'. Select 'Select All' for scopes. Click 'Create'. Confirm the security risk. Copy the generated private integration key (starts with 'ph-'). Make sure to save this key as it will not be visible again.", "url": null, "input_field": {"variable_name": "ghl_private_integration_key", "label": "GHL Private Integration Key", "type": "string"}, "uses_variable": null, "timestamp": "01:51", "visual_context": "GHL Settings menu, Private Integrations page, Create New Integration wizard, copying the generated token.", "warnings": "The private integration key is only shown once. Copy and save it immediately."}, {"step_number": 4, "title": "Configure 'Magic Link Generator' Workflow - GHL Credentials", "description": "In n8n, open the 'Magic Link Generator v2 - TEMPLATE' workflow. Double-click the 'Get Custom Field ID V2' node. In the 'Parameters' tab, paste your 'GHL Location ID' into the 'located' field. Scroll down to 'Authorization' under 'Send Headers'. In the 'Value' field, type 'Bearer ' (with a space after 'Bearer') and then paste your 'GHL Private Integration Key'. Close the node. Click 'Execute workflow' from 'Manual' (small arrow next to 'Execute workflow' button).", "url": null, "input_field": null, "uses_variable": ["ghl_location_id", "ghl_private_integration_key"], "timestamp": "02:39", "visual_context": "n8n 'Magic Link Generator' workflow, 'Get Custom Field ID V2' node parameters, pasting IDs."}, {"step_number": 5, "title": "Configure 'Magic Link Generator' Workflow - Custom Field IDs", "description": "Double-click the 'Scrape IDs' node. Copy the value for 'magic_link_id' and 'demo_context_id' from the output. Close the node. Double-click the 'Edit Fields' node. Paste the copied 'magic_link_id' into the 'field_id_magic_link' field. Paste the copied 'demo_context_id' into the 'field_id_demo_context' field. Paste your 'GHL Private Integration Key' into the 'private_token' field. Close the node.", "url": null, "input_field": {"variable_name": "magic_link_id", "label": "Magic Link Custom Field ID", "type": "string"}, "uses_variable": ["ghl_private_integration_key"], "timestamp": "03:26", "visual_context": "n8n 'Scrape IDs' node output, 'Edit Fields' node parameters, pasting IDs."}, {"step_number": 6, "title": "Configure 'Magic Link Generator' Workflow - Gemini API Key", "description": "Double-click the 'Gemini 2.5 Flash' node. Click 'Create new credential'. In the 'API Key' field, paste your 'Gemini API Key'. Click 'Save'. Ensure the 'Model' dropdown has 'models/gemini-2.5-flash' selected. Close the node.", "url": null, "input_field": null, "uses_variable": ["geminiApiKey"], "timestamp": "04:04", "visual_context": "n8n 'Gemini 2.5 Flash' node parameters, creating new credential, pasting API key."}, {"step_number": 7, "title": "Publish 'Magic Link Generator' Workflow", "description": "Click 'Save' in the top right corner. Then, click 'Publish' (very important). Confirm the publish action. Dismiss any production checklist warnings by clicking 'Ignore for all workflows'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:38", "visual_context": "n8n 'Magic Link Generator' workflow, 'Save' and 'Publish' buttons, confirmation pop-ups."}, {"step_number": 8, "title": "Get 'Magic Link Generator' Webhook Production URL", "description": "In the 'Magic Link Generator v2 - TEMPLATE' workflow, double-click the 'Webhook' node. Click on the 'Production URL' tab. Copy the URL displayed.", "url": null, "input_field": {"variable_name": "magic_link_generator_webhook_url", "label": "Magic Link Generator Webhook URL", "type": "string"}, "uses_variable": null, "timestamp": "05:20", "visual_context": "n8n 'Magic Link Generator' workflow, 'Webhook' node, 'Production URL' tab, copying URL."}, {"step_number": 9, "title": "Add Webhook URL to GHL 'Generate Magic Link' Workflow", "description": "In your GHL account, navigate to 'Automation'. Go to the 'AI Agency' folder, then 'AI Demo Magic Automations', and open the 'Generate Magic Link' workflow. Double-click the 'Webhook' step. Paste the 'Magic Link Generator Webhook URL' into the 'URL' field. Click 'Save Action'. Click 'Save' in the top right corner of the workflow builder.", "url": null, "input_field": null, "uses_variable": ["magic_link_generator_webhook_url"], "timestamp": "05:35", "visual_context": "GHL Automation, 'Generate Magic Link' workflow, 'Webhook' step, pasting URL."}, {"step_number": 10, "title": "Get GHL Base Landing Page URL", "description": "In your GHL account, navigate to 'Sites'. Go to 'Funnels', then open your 'AI Agency v4' funnel. Click on the 'Home' step. Copy the base URL displayed (e.g., 'https://raingravity.deltaignup.agency/home').", "url": null, "input_field": {"variable_name": "ghl_base_landing_page_url", "label": "GHL Base Landing Page URL", "type": "string"}, "uses_variable": null, "timestamp": "06:15", "visual_context": "GHL Sites, Funnels, AI Agency v4, Home step, copying URL."}, {"step_number": 11, "title": "Update GHL 'Send Magic Link' SMS Step", "description": "In your GHL account, navigate to 'Automation'. Go to the 'AI Agency' folder, then 'AI Demo Magic Automations', and open the 'Send Magic Link v3' workflow. Double-click the 'SMS: Send Magic Link' step. In the message body, replace 'https://yourwebsite.com' with your 'GHL Base Landing Page URL'. Ensure there is only a single slash after the domain. Click 'Save Action'. Click 'Save' in the top right corner of the workflow builder.", "url": null, "input_field": null, "uses_variable": ["ghl_base_landing_page_url"], "timestamp": "06:41", "visual_context": "GHL Automation, 'Send Magic Link v3' workflow, 'SMS: Send Magic Link' step, editing message body."}, {"step_number": 12, "title": "Configure 'AI Demo' Workflow - GHL Credentials", "description": "In n8n, open the 'AI Demo v3 - TEMPLATE' workflow. Double-click the 'Get Custom Fields' node. In the 'Parameters' tab, paste your 'GHL Location ID' into the 'located' field. Scroll down to 'Authorization' under 'Send Headers'. In the 'Value' field, type 'Bearer ' (with a space after 'Bearer') and then paste your 'GHL Private Integration Key'. Close the node. Click 'Execute workflow' from 'Manual'.", "url": null, "input_field": null, "uses_variable": ["ghl_location_id", "ghl_private_integration_key"], "timestamp": "07:26", "visual_context": "n8n 'AI Demo' workflow, 'Get Custom Fields' node parameters, pasting IDs."}, {"step_number": 13, "title": "Configure 'AI Demo' Workflow - Custom Field ID", "description": "Double-click the 'Scrape ID' node. Copy the value for 'assistant_chat_last_message' from the output. Close the node. Double-click the 'Edit Fields' node. Paste the copied 'assistant_chat_last_message' ID into the 'custom_field_id_assistant_chat_last_message' field. Paste your 'GHL Private Integration Key' into the 'private_integration' field. Close the node.", "url": null, "input_field": {"variable_name": "ai_demo_assistant_chat_last_message_id", "label": "Assistant Chat Last Message Custom Field ID", "type": "string"}, "uses_variable": ["ghl_private_integration_key"], "timestamp": "08:02", "visual_context": "n8n 'Scrape ID' node output, 'Edit Fields' node parameters, pasting IDs."}, {"step_number": 14, "title": "Configure 'AI Demo' Workflow - Anthropic API Key", "description": "Double-click the 'Anthropic Chat Model' node. Click 'Create new credential'. In the 'API Key' field, paste your 'Anthropic API Key'. Click 'Save'. Ensure the 'Model' dropdown has 'Claude Sonnet 4.5' selected and 'Sampling Temperature' is '0.7'. Close the node.", "url": null, "input_field": null, "uses_variable": ["anthropicApiKey"], "timestamp": "08:35", "visual_context": "n8n 'Anthropic Chat Model' node parameters, creating new credential, pasting API key.", "warnings": "If the connection errors out when adding your Anthropic API key, just save it and it should work."}, {"step_number": 15, "title": "Configure 'AI Demo' Workflow - Gemini API Key", "description": "Double-click the 'Google Gemini Chat Model' node. Ensure the 'Credential to connect with' dropdown has your 'Google GeminiPaLM1 Api account' selected. Ensure the 'Model' dropdown has 'models/gemini-1.0-pro-preview' (or the latest Pro version) selected. Close the node.", "url": null, "input_field": null, "uses_variable": ["geminiApiKey"], "timestamp": "09:03", "visual_context": "n8n 'Google Gemini Chat Model' node parameters, selecting credential and model."}, {"step_number": 16, "title": "Create 'bot' Database in n8n", "description": "In n8n, navigate to 'Personal' (left sidebar) and then 'Data Tables'. Click 'Create data table'. Name the table 'bot'. Click 'Create'. Click 'Add Column'. Name the first column 'message' (Type: String). Click 'Add Column'. Name the second column 'contact' (Type: String). Click 'Add Column'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "09:23", "visual_context": "n8n Data Tables, creating new table 'bot', adding 'message' and 'contact' columns."}, {"step_number": 17, "title": "Configure 'AI Demo' Workflow - Database Nodes", "description": "Go back to the 'AI Demo v3 - TEMPLATE' workflow. For each of the five database nodes ('Get row(s)', 'Update message', 'Create Message', 'Get full message', 'Delete row(s)'): Double-click the node. In the 'Parameters' tab, select 'bot' from the 'Data table' dropdown. For the 'Columns' section, click the three dots next to 'Contact (string)' and select 'Refresh List'. Repeat for 'Message' if applicable. For the 'Create Message' node specifically, ensure the 'contact' and 'message' fields are set to 'Fixed Expression' and contain the correct webhook variables (as shown in the video). Close each node after configuration.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "09:56", "visual_context": "n8n 'AI Demo' workflow, configuring 'Get row(s)', 'Update message', 'Create Message', 'Get full message', 'Delete row(s)' nodes, selecting 'bot' database and refreshing columns."}, {"step_number": 18, "title": "Publish 'AI Demo' Workflow", "description": "Click 'Save' in the top right corner. Then, click 'Publish' (very important). Confirm the publish action. Dismiss any production checklist warnings by clicking 'Ignore for all workflows'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "12:41", "visual_context": "n8n 'AI Demo' workflow, 'Save' and 'Publish' buttons, confirmation pop-ups."}, {"step_number": 19, "title": "Get 'AI Demo' Webhook Production URL", "description": "In the 'AI Demo v3 - TEMPLATE' workflow, double-click the 'Webhook' node. Click on the 'Production URL' tab. Copy the URL displayed.", "url": null, "input_field": {"variable_name": "ai_demo_webhook_url", "label": "AI Demo Webhook URL", "type": "string"}, "uses_variable": null, "timestamp": "13:13", "visual_context": "n8n 'AI Demo' workflow, 'Webhook' node, 'Production URL' tab, copying URL."}, {"step_number": 20, "title": "Add Webhook URL to GHL Custom Value", "description": "In your GHL account, navigate to 'Settings' and then 'Custom Values'. Find the custom value with the key 'ai_demo_webhook'. Click the three dots next to it and select 'Edit'. Paste the 'AI Demo Webhook URL' into the 'Value' field. Click 'Update'.", "url": null, "input_field": null, "uses_variable": ["ai_demo_webhook_url"], "timestamp": "13:24", "visual_context": "GHL Settings, Custom Values page, editing 'ai_demo_webhook' custom value, pasting URL."}, {"step_number": 21, "title": "Test the AI Demo System", "description": "In your GHL account, navigate to 'Sites'. Go to 'Funnels', then open your 'AI Agency v4' funnel. Click on the 'AI Demo Magic Link' step. Open the funnel link. Fill out the form with your details (First Name, Phone, Company Name, Company Type, Company Website). Click 'Send Magic Demo Link'. Check your GHL 'Contacts' section. Open the contact you just created. You should see the SMS message with the Magic Link and the AI's initial response in the conversation history.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "13:43", "visual_context": "GHL Funnel landing page, filling out form, GHL Contacts, conversation history."}], "variables_summary": [{"variable_name": "n8nRootPassword", "label": "n8n VPS Root Password", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "n8nLoginUrl", "label": "n8n Login URL", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "n8nLicenseKey", "label": "n8n License Key", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "anthropicApiKey", "label": "Anthropic API Key", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "geminiApiKey", "label": "Gemini API Key", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "openaiApiKey", "label": "OpenAI API Key", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "ghl_location_id", "label": "GHL Location ID", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "ghl_private_integration_key", "label": "GHL Private Integration Key", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "magic_link_id", "label": "Magic Link Custom Field ID", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "demo_context_id", "label": "Demo Context Custom Field ID", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "ai_demo_assistant_chat_last_message_id", "label": "Assistant Chat Last Message Custom Field ID", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "magic_link_generator_webhook_url", "label": "Magic Link Generator Webhook URL", "type": "string", "used_in_future_steps": "Yes"}, {"variable_name": "ai_demo_webhook_url", "label": "AI Demo Webhook URL", "type": "string", "used_in_future_steps": "No"}, {"variable_name": "ghl_base_landing_page_url", "label": "GHL Base Landing Page URL", "type": "string", "used_in_future_steps": "No"}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod1-les3"});
loadSop('m1_04', {"title": "Troubleshooting the AI SMS Demo System", "description": "This SOP provides a detailed breakdown of the AI SMS Demo System's workflow and common troubleshooting steps to ensure proper functionality. It covers the entire process from generating a magic link to handling lead replies, with specific focus on debugging potential issues within HighLevel (GHL) and n8n automations.", "estimated_time": "15 minutes", "steps": [{"step_number": 1, "title": "Understand the AI Demo Bot Full System Overview", "description": "Familiarize yourself with the overall architecture and interconnectedness of the AI Demo Bot Full System. This includes understanding how each component (landing page, HighLevel workflows, n8n workflows, and SMS communication) ties together to deliver the AI chatbot experience.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "Miro board showing the 'AI Demo Bot Full System' title and various interconnected components."}, {"step_number": 2, "title": "Access the AI Demo Magic Link Landing Page", "description": "Navigate to the landing page where users can generate their AI demo. This page contains a form that collects necessary information to initiate the demo creation process. You can also use this page to manually test the system.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:30", "visual_context": "Miro board showing the 'Generate Your AI Demo with 1-Click' form. Then, a HighLevel screenshot showing 'Sites > Funnels > AI Demo Magic Link' and the preview of the form."}, {"step_number": 3, "title": "Fill Out the Demo Generation Form", "description": "Complete the form fields on the landing page. 'First Name', 'Phone', 'Company Name', and 'Company Type' are required. 'Company Website' and 'Website Mobile Screenshot' are optional. If 'Company Website' is provided, the AI bot will scrape it for context. If a 'Website Mobile Screenshot' is uploaded, it will be used for the chat widget preview. Ensure that if you upload a screenshot, it is a mobile screenshot.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:57", "visual_context": "Close-up of the 'Generate Your AI Demo with 1-Click' form, highlighting the input fields."}, {"step_number": 4, "title": "Trigger the 'Generate Magic Link' HighLevel Workflow", "description": "Submitting the form on the landing page triggers the 'Generate Magic Link' workflow in HighLevel. This workflow is responsible for initiating the backend process of creating the unique magic link for the AI demo.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:34", "visual_context": "Miro board showing the connection from the form to the 'Generate Magic Link' workflow. HighLevel workflow builder showing 'Trigger: Form Submitted - AI Demo Magic Link Generator'."}, {"step_number": 5, "title": "Process Data via n8n 'Magic Link Generator' Workflow", "description": "The 'Generate Magic Link' HighLevel workflow sends the form data to an n8n webhook. This webhook is the entry point for the 'Magic Link Generator v2 - TEMPLATE' workflow in n8n. This workflow processes the submitted information, including handling the website screenshot (if provided) and scraping the company website (if provided) to generate the demo context.", "url": "https://n8n.io/", "input_field": null, "uses_variable": null, "timestamp": "01:51", "visual_context": "Miro board showing the n8n workflow 'Magic Link Generator v2 - TEMPLATE' with various nodes for image processing, website scraping, and AI context generation."}, {"step_number": 6, "title": "Update Contact with Magic Link in HighLevel", "description": "After processing in n8n, the workflow updates a custom field named 'Magic Link' within the contact record in HighLevel. This 'Magic Link' field will contain a unique URL that includes the user's phone number and, if applicable, the image URL for the chat widget preview.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:40", "visual_context": "HighLevel CRM Contacts section, showing a contact record with 'AI Demo' custom fields, including 'Magic Link'."}, {"step_number": 7, "title": "Trigger the 'Send Magic Link' HighLevel Workflow", "description": "The 'Magic Link Field - Has Changed' trigger in HighLevel initiates the 'Send Magic Link' workflow. This workflow is designed to send the newly generated magic link to the customer.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:10", "visual_context": "Miro board showing the connection from the n8n workflow to the 'Send Magic Link' workflow. HighLevel workflow builder showing 'Trigger: Magic Link Field - Has Changed'."}, {"step_number": 8, "title": "Send Magic Link SMS to Customer", "description": "The 'Send Magic Link' workflow sends an SMS to the customer. The SMS contains a message prompting them to click the link to start their AI chatbot experience. The link dynamically includes the contact's magic link variable.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:22", "visual_context": "Miro board showing the SMS message content with the 'contact.magic_link' variable. An example of the generated Magic Link URL is displayed, highlighting the 'uid' (phone number) and 'bg' (image URL) parameters."}, {"step_number": 9, "title": "Access the 'Start Your Demo' Landing Page", "description": "When the customer clicks the Magic Link, they are directed to the 'Start Your Demo' landing page. This page features a 'CHAT WIDGET PREVIEW' (displaying the uploaded mobile screenshot if available) and a 'START AI DEMO' button. The phone number and image URL from the Magic Link are pulled into hidden fields on this page.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:19", "visual_context": "Screenshot of the 'Start Your Demo' landing page with the 'CHAT WIDGET PREVIEW' and 'START AI DEMO' button."}, {"step_number": 10, "title": "Trigger the 'AI Demo Optin Tag > Start Demo' HighLevel Workflow", "description": "Clicking the 'START AI DEMO' button on the landing page submits the 'AI Demo Starter' form, which triggers the 'AI Demo Optin Tag > Start Demo' workflow in HighLevel. This workflow prepares the contact for interaction with the AI demo bot.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:37", "visual_context": "Miro board showing the connection from the 'Start Your Demo' button to the 'AI Demo Optin Tag > Start Demo' workflow. HighLevel workflow builder showing the trigger 'Form Submitted - AI Demo Starter'."}, {"step_number": 11, "title": "Add/Remove Tags and Create Opportunity", "description": "Within the 'AI Demo Optin Tag > Start Demo' workflow, the 'ai-demo-optin' tag is added to the contact. The 'ai-optin' tag is removed (to prevent conflicts with a main bot if active). An opportunity is created or updated in the pipeline. A welcome SMS is sent to the user, and the 'User Last Message' custom field is set to 'Hi'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:48", "visual_context": "HighLevel workflow builder showing 'Add Tag - ai-demo-optin', 'Remove Tag - ai-optin', 'Create Or Update Opportunity', 'SMS Welcome', and 'User Last Message: Hi' actions."}, {"step_number": 12, "title": "Send Webhook to n8n 'AI Demo v3' Workflow", "description": "The 'AI Demo Optin Tag > Start Demo' workflow sends a webhook to the n8n 'AI Demo v3 - TEMPLATE' workflow. This webhook carries the contact information and the initial 'Hi' message to start the AI conversation.", "url": "https://n8n.io/", "input_field": null, "uses_variable": null, "timestamp": "07:19", "visual_context": "HighLevel workflow builder showing the 'Webhook' action connected to the n8n 'AI Demo v3 - TEMPLATE' workflow."}, {"step_number": 13, "title": "Process User Message and Generate AI Reply in n8n", "description": "The n8n 'AI Demo v3 - TEMPLATE' workflow receives the webhook. It checks if the user sent a 'Restart?' message (which deletes previous conversations). It then retrieves existing messages, creates a new message, waits 8 seconds, gets the full message, deletes old rows, and uses an AI Agent (Anthropic Chat or Google Gemini Chat Model) to generate a reply based on the demo context and chat history. Finally, it updates the 'Assistant Last Message' custom field in HighLevel with the AI's reply.", "url": "https://n8n.io/", "input_field": null, "uses_variable": null, "timestamp": "07:30", "visual_context": "n8n workflow 'AI Demo v3 - TEMPLATE' showing nodes for 'Webhook', 'Edit Fields', 'Restart?', 'Get row(s)', 'Update message', 'Create Message', 'Wait 8 Seconds', 'Get full message', 'Delete row(s)', 'AI Agent', 'Status2', 'Retry Count', 'Update Assistant Last Message2', and 'Wait 1 minute'."}, {"step_number": 14, "title": "Trigger 'AI Demo Bot - Base Triggers (AI Reply)' HighLevel Workflow", "description": "When the 'Assistant Last Message' custom field in HighLevel is updated by the n8n workflow, it triggers the 'AI Demo Bot - Base Triggers (AI Reply)' workflow. This workflow is responsible for sending the AI's response back to the customer.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "08:30", "visual_context": "Miro board showing the connection from the n8n workflow to the 'AI Demo Bot - Base Triggers (AI Reply)' workflow. HighLevel workflow builder showing 'Trigger: Contact Changed - Assistant Last Message'."}, {"step_number": 15, "title": "Send AI Reply SMS to Customer", "description": "The 'AI Demo Bot - Base Triggers (AI Reply)' workflow checks if the contact has the 'ai-demo-optin' tag. If the tag is present, it sends an SMS containing the AI's last message to the customer's phone number.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "08:47", "visual_context": "HighLevel workflow builder showing a 'Condition' node checking for 'ai-demo-optin' tag, and an 'SMS' action to send the AI's reply."}, {"step_number": 16, "title": "Trigger 'AI Demo Bot - Base Triggers (Lead Reply)' HighLevel Workflow", "description": "When the customer replies to the SMS, it triggers the 'AI Demo Bot - Base Triggers (Lead Reply)' workflow in HighLevel. This workflow processes the customer's message.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "09:03", "visual_context": "Miro board showing the connection from the customer's phone to the 'AI Demo Bot - Base Triggers (Lead Reply)' workflow. HighLevel workflow builder showing 'Trigger: Customer Replied SMS'."}, {"step_number": 17, "title": "Update User Last Message and Send Webhook to n8n", "description": "The 'AI Demo Bot - Base Triggers (Lead Reply)' workflow checks if the contact *does not* have the 'dnd-gpt' tag (Do Not Disturb). If the tag is not present, it updates the 'User Last Message' custom field with the customer's reply and then sends a webhook to the n8n 'AI Demo v3 - TEMPLATE' workflow to continue the conversation loop.", "url": "https://n8n.io/", "input_field": null, "uses_variable": null, "timestamp": "09:34", "visual_context": "HighLevel workflow builder showing a 'Condition' node checking for 'dnd-gpt' tag, 'Update User Last Message' action, and 'AI Demo Webhook' action."}, {"step_number": 18, "title": "Troubleshoot Authorization Error (GHL Private Integration Key)", "description": "If you encounter an authorization error, check your GHL Private Integration Key in n8n. Sometimes, if a new key is created, it might glitch. Delete the existing key in n8n and re-add it. Ensure there are no extra spaces before or after the key.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "11:06", "visual_context": "Miro board with 'TROUBLESHOOTING' section, highlighting 'Authorization Error -> GHL Private Integration Key'. n8n workflow showing the 'Edit Fields' node with 'private_integration' key."}, {"step_number": 19, "title": "Troubleshoot AI Demo Not Triggering (Database/AI Bot Nodes)", "description": "If the AI Demo is not triggering, check all database nodes ('Get row(s)', 'Update message', 'Create Message', 'Get full message', 'Delete row(s)') and AI Bot nodes ('AI Agent') in your n8n 'AI Demo v3 - TEMPLATE' workflow. For any variable fields (those with brackets), ensure they are set to 'Expression' mode, not 'Fixed'. Incorrectly set variables can prevent the workflow from functioning.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "11:42", "visual_context": "Miro board highlighting 'AI Demo not triggering -> Check all database nodes / AI Bot Node (Message Input)'. n8n workflow showing various database and AI Agent nodes, with close-ups of their settings to check 'Expression' vs 'Fixed' mode for variables."}, {"step_number": 20, "title": "Troubleshoot Re-tried Demo with Same Number", "description": "If you are re-trying a demo with the same phone number and encountering issues, delete the corresponding contact record in HighLevel. This ensures that all previous conversation history and tags are cleared, allowing for a fresh start.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "13:12", "visual_context": "Miro board highlighting 'Re-tried demo with same number -> Delete GHL Contact'. HighLevel CRM Contacts section, demonstrating how to select and delete a contact."}, {"step_number": 21, "title": "Troubleshoot Outdated GHL n8n Workflow", "description": "Ensure your HighLevel 'AI Demo Optin Tag > Start Demo' workflow is up-to-date. The trigger should be 'Form Submitted - AI Demo Starter', and it should include an 'Add Tag - ai-demo-optin' action. Older versions might incorrectly use the 'ai-demo-optin' tag as the trigger itself, which is not correct for the current demo version.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "13:40", "visual_context": "Miro board highlighting 'Outdated GHL n8n workflow?'. HighLevel Automation Workflows list, showing the 'AI Demo Optin Tag > Start Demo' workflow and its trigger settings."}, {"step_number": 22, "title": "Troubleshoot Un-published n8n Workflows", "description": "Always ensure that all your n8n workflows are published after making any changes. An un-published workflow will not execute. Look for the 'Publish' button and the green checkmark indicating a published status in n8n.", "url": "https://n8n.io/", "input_field": null, "uses_variable": null, "timestamp": "14:18", "visual_context": "Miro board highlighting 'n8n Workflows not published?'. n8n workflow editor, showing the 'Publish' button and the green checkmark for published status."}, {"step_number": 23, "title": "Troubleshoot Imported Workflows into the Same n8n Workflow", "description": "The 'AI Demo v3 - TEMPLATE' and 'Magic Link Generator v2 - TEMPLATE' workflows must be imported as separate workflows in n8n. Importing both into the same n8n workflow will cause errors. Verify that you have distinct workflows for each template.", "url": "https://n8n.io/", "input_field": null, "uses_variable": null, "timestamp": "14:45", "visual_context": "Miro board highlighting 'Imported both workflows into the same workflow in n8n?'. n8n workflow list, showing separate entries for 'AI Demo v3 - TEMPLATE' and 'Magic Link Generator v2 - TEMPLATE'."}, {"step_number": 24, "title": "Troubleshoot Incorrect Webhook URL (Production vs. Test)", "description": "When configuring webhooks in HighLevel that point to n8n, always use the 'Production URL' from your n8n webhook node. Do not use the 'Test URL', as this is only for testing within the n8n editor and will not work for live production workflows.", "url": "https://n8n.io/", "input_field": null, "uses_variable": null, "timestamp": "15:18", "visual_context": "Miro board highlighting 'Webhook used is not production'. n8n webhook node settings, showing the 'Test URL' and 'Production URL' options."}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod1-les4"});
loadSop('m1_05', {"title": "Live Chat AI Demo - How It Works", "description": "This SOP outlines the process of generating and interacting with a live chat AI demo, demonstrating how the system delivers a personalized AI chatbot experience via email and a web-based chat widget. It also briefly introduces the underlying n8n workflow.", "estimated_time": "03 minutes", "steps": [{"step_number": 1, "title": "Navigate to the AI Demo Generation Page", "description": "Access the dedicated landing page designed to generate a personalized AI demo. This page allows potential clients to quickly experience the AI chatbot.", "url": "https://crm.blackumbrella.app/preview/mhat_2023_06_15_19_09_03_024988", "input_field": null, "uses_variable": null, "timestamp": "00:07", "visual_context": "A dark-themed webpage with a form titled 'Generate Your AI Demo with 1-Click' and the subtitle 'Start talking to it in 60 seconds'.", "warnings": null}, {"step_number": 2, "title": "Fill out the Demo Request Form", "description": "Complete the form with the required personal and company information. This information will be used to personalize the AI demo experience.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:15", "visual_context": "The form fields 'First Name', 'Email', 'Company Name', 'Company Type', and 'Company Website' being populated with example data.", "warnings": null}, {"step_number": 3, "title": "Send the Magic Demo Link", "description": "Click the 'SEND MAGIC DEMO LINK' button to submit the form and initiate the demo generation process. The system will then send a personalized demo link to the provided email address.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:31", "visual_context": "The yellow 'SEND MAGIC DEMO LINK' button being clicked.", "warnings": null}, {"step_number": 4, "title": "Check Email for Demo Link", "description": "After submitting the form, a confirmation message will appear on the page. Open your email client and locate the email containing the personalized AI demo link. The email will confirm that your AI demo is ready.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:38", "visual_context": "A pop-up email client showing an email from 'reply@mg.magnoli.net' with the subject 'Your AI Demo is Ready!' and a message body including a demo link.", "warnings": null}, {"step_number": 5, "title": "Access the Personalized AI Demo", "description": "Click on the provided link in the email to open your personalized AI demo in a new browser tab. The page will prompt you to start interacting with the AI.", "url": "https://yourwebsite.com/live-chat?email=zav@sase.com", "input_field": null, "uses_variable": null, "timestamp": "00:53", "visual_context": "A new browser tab opening, displaying a mobile-like view with the text 'Your AI Demo is Ready! Go ahead, say hello. Click the Chat Bubble to begin.' and a chat bubble icon at the bottom right.", "warnings": null}, {"step_number": 6, "title": "Initiate a Conversation with the AI Agent", "description": "Click the chat bubble icon at the bottom right of the screen to open the live chat widget and start interacting with the AI agent. The chat will display a welcome message.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:00", "visual_context": "The chat bubble expanding into a full chat window with a welcome message from 'Charlie - AI Agent'.", "warnings": null}, {"step_number": 7, "title": "Send a Message to the AI Agent", "description": "Type 'Hi' into the message input field at the bottom of the chat window and send it to the AI agent to begin the conversation.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:08", "visual_context": "The message 'Hi' appearing in the chat, followed by a response from 'Charlie - AI Agent'.", "warnings": null}, {"step_number": 8, "title": "Ask the AI Agent about its Capabilities", "description": "Type 'I wanna see what u guys can do' into the message input field and send it to the AI agent to inquire about its functionalities and demonstrate its capabilities.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:26", "visual_context": "The message 'I wanna see what u guys can do' appearing in the chat, followed by a detailed response from 'Charlie - AI Agent'.", "warnings": null}, {"step_number": 9, "title": "Restart the AI Demo Conversation", "description": "Click the 'RESTART' button within the chat interface to reset the conversation with the AI agent. This allows for a fresh interaction or to test different scenarios from the beginning.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:44", "visual_context": "The 'RESTART' button being clicked, and the chat conversation resetting to the initial welcome message from 'Charlie - AI Agent'.", "warnings": null}, {"step_number": 10, "title": "Observe the n8n Workflow (Informational)", "description": "The video briefly shows the n8n workflow that powers the live chat AI demo. This workflow is responsible for handling chat messages, interacting with AI models (Anthropic and Gemini), and managing chat history. This step is for informational purposes and does not require user action.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:50", "visual_context": "A screenshot of the n8n workflow editor with various interconnected nodes, labeled 'Live Chat AI Demo'. Nodes include 'When chat message received', 'Edit Fields', 'Search GHL Contact', 'Dynamic Info', 'Restart', 'AI Agent', 'Chat History', 'Anthropic Chat Google Gemini Chat Model'. A 'n8n SETUP' box with instructions is also visible.", "warnings": "This video only demonstrates the workflow; detailed setup instructions for n8n are not provided here."}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod1-les5"});
loadSop('m1_06', {"title": "Live Chat AI Demo Widget Setup", "description": "This SOP details the process of setting up the Live Chat AI Demo widget, including importing the n8n workflow, configuring GoHighLevel (GHL) integrations and automations, and embedding the chat widget on a GHL funnel page. This setup allows for generating personalized live chat demos for contacts.", "estimated_time": "15 minutes", "steps": [{"step_number": 1, "title": "Import Live Chat Workflow", "description": "In your n8n instance, click on the 'Save' dropdown menu (top right corner), select 'Import from File', and upload the 'Live Chat AI Demo [TEMPLATE]' workflow file that you downloaded.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "n8n workflow editor, dropdown menu showing 'Import from File', file selection dialog."}, {"step_number": 2, "title": "Save the Workflow", "description": "After importing, click the 'Save' button in the top right corner to save the workflow.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:08", "visual_context": "n8n workflow editor, 'Workflow successfully created' notification."}, {"step_number": 3, "title": "Open 'Get Custom Field ID V2' Node", "description": "Locate and double-click the 'Get Custom Field ID V2' node in the n8n workflow to open its configuration panel.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:16", "visual_context": "n8n workflow editor, 'Get Custom Field ID V2' node highlighted."}, {"step_number": 4, "title": "Retrieve GoHighLevel Location ID", "description": "Navigate to your GoHighLevel account. Go to 'Settings' (bottom left gear icon) -> 'Business Profile'. Copy the 'Location ID' displayed at the top of the Business Profile settings page.", "url": "https://crm.blackumbrella.app/v2/location/SCA.net/settings/business", "input_field": {"variable_name": "ghlLocationId", "label": "GoHighLevel Location ID", "type": "string"}, "uses_variable": null, "timestamp": "00:19", "visual_context": "GoHighLevel Business Profile settings page, copying Location ID."}, {"step_number": 5, "title": "Retrieve GoHighLevel Private Integration Key", "description": "In GoHighLevel, navigate to 'Settings' -> 'Private Integrations'. Click 'Create New Integration' (or use an existing one if available). Provide a name (e.g., 'n8n') and click 'Next'. On the 'Scopes' screen, click 'Select all' and then 'Create'. Copy the generated API Key.", "url": "https://crm.blackumbrella.app/v2/location/SCA.net/settings/private-integrations", "input_field": {"variable_name": "ghlPrivateIntegrationKey", "label": "GoHighLevel Private Integration Key", "type": "string"}, "uses_variable": null, "timestamp": "00:29", "visual_context": "GoHighLevel Private Integrations page, creating new integration and copying API key."}, {"step_number": 6, "title": "Configure 'Get Custom Field ID V2' Node", "description": "Back in n8n, in the 'Get Custom Field ID V2' node's parameters:\n1.  Under 'Query Parameters', paste your `ghlLocationId` into the 'Value' field for 'locationId'.\n2.  Under 'Header Parameters', paste 'Bearer ' followed by your `ghlPrivateIntegrationKey` (e.g., 'Bearer pit_xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx') into the 'Value' field for 'Authorization'. Ensure there is a space after 'Bearer'.", "url": null, "input_field": null, "uses_variable": ["ghlLocationId", "ghlPrivateIntegrationKey"], "timestamp": "00:49", "visual_context": "n8n 'Get Custom Field ID V2' node parameters, pasting Location ID and Private Key."}, {"step_number": 7, "title": "Execute 'Get Custom Field ID V2' Node", "description": "Click the 'Execute Workflow' button at the bottom of the n8n editor, selecting 'from Manual' to run the workflow and retrieve the custom field IDs.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:08", "visual_context": "n8n workflow editor, executing workflow from 'Manual' trigger."}, {"step_number": 8, "tit
