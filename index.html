loadSop('m2_04', {"title": "Understanding AI Agency Pricing Models", "description": "This SOP outlines various pricing models for an AI agency, including standard upfront payment, financing options, revenue share partnerships, and database reactivation campaigns. It also details the features included in different AI system tiers (Essential, Professional, Enterprise) and provides strategies for presenting these options to clients.", "estimated_time": "5 minutes", "steps": [{"step_number": 1, "title": "Review Standard Pricing Model (Current)", "description": "Understand the standard pricing model, which involves a setup fee ranging from $3,000 to $10,000, and a monthly recurring revenue (MRR) of $99+. This model is best suited for cash-rich clients and carries a low risk level for the agency.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:20", "visual_context": "Summary of Pricing Options slide, highlighting 'Standard (Current)' column with Setup Fee: $3K - $10K, Monthly (MRR): $99+, Best for: Cash-rich clients, Risk Level: Low."}, {"step_number": 2, "title": "Explore Live Pricing Page Tiers", "description": "Navigate to the live pricing page to see the detailed breakdown of AI system tiers: Essential, Professional, and Enterprise. Note the features and pricing for each tier.", "url": "https://aimap.blackumbrella.app/pricing", "input_field": null, "uses_variable": null, "timestamp": "00:32", "visual_context": "Browser tab showing 'Choose Your AI System' pricing page with 'Essential', 'Professional', and 'Enterprise' columns."}, {"step_number": 3, "title": "Understand Essential Tier Features", "description": "The Essential tier costs $3,000 Setup + $99/mo. It includes instant lead capture, responds to leads in under 2 seconds (24/7), books appointments, follows up with unresponsive leads, and works on SMS, email, web chat, and social DMs. It's best for service businesses with simple booking needs and a limited knowledge base (e.g., 10 FAQs).", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:37", "visual_context": "Pricing page, 'Essential' column highlighted, showing features and pricing."}, {"step_number": 4, "title": "Understand Professional Tier Features", "description": "The Professional tier costs $5,000 Setup + $99/mo. It includes everything in Essential, plus lead qualification and scoring, automatic long-term nurturing (30/60/90 day campaigns), handling objections and FAQs (unlimited knowledge base), sending quotes/updates/requests, and reviews. This tier adds the vector database for enhanced AI capabilities and is generally the most popular choice.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:52", "visual_context": "Pricing page, 'Professional' column highlighted, showing features and pricing."}, {"step_number": 5, "title": "Understand Enterprise Tier Features", "description": "The Enterprise tier costs $10,000+ Setup + $99/mo. It includes everything in Professional, plus multi-location routing and management, custom integrations with existing tools, Voice AI and multilingual support, and 3rd Party API connectivity. This tier is for advanced, custom AI agents.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:42", "visual_context": "Pricing page, 'Enterprise' column highlighted, showing features and pricing."}, {"step_number": 6, "title": "Understand Hosting and Deposit Strategy", "description": "Note that the $99/month fee for all tiers covers the hosting of the AI chatbot on the agency's NNN VPS/account. For initial client engagement, consider taking a $500 or 10% deposit upfront, with the remaining payment collected upon successful onboarding.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:00", "visual_context": "Pricing page, monthly fees and discussion of deposits."}, {"step_number": 7, "title": "Review Financing (Split-Pay) Model", "description": "Consider offering a financing option where the setup fee is split into three payments (e.g., $1.8K x 3), with the monthly MRR remaining at $99+. This model is ideal for clients with tight cash flow and presents a medium risk level for the agency. The total setup cost is slightly higher (10% premium) than the standard upfront payment.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:37", "visual_context": "Summary of Pricing Options slide, highlighting 'Financing (Split-Pay)' column with Setup Fee: $1.8K x 3, Monthly (MRR): $99+, Best for: Tight cash flow, Risk Level: Medium."}, {"step_number": 8, "title": "Review Revenue Share (Partner) Model", "description": "For clients with high-volume leads, offer a revenue share partnership. This involves a setup fee of $1,500, a monthly MRR of $297, plus a commission (e.g., $100 per qualified appointment or a percentage of closed revenue). This model is best for high-volume leads and carries a high reward potential for the agency.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:47", "visual_context": "Summary of Pricing Options slide, highlighting 'Rev Share (Partner)' column with Setup Fee: $1.5K, Monthly (MRR): $297 + Comm., Best for: High-volume leads, Risk Level: High Reward."}, {"step_number": 9, "title": "Review Reactivation (Blitz) Model", "description": "For clients with large, dormant lists, offer a reactivation campaign. This can be a one-off setup fee of $1,500 or even $0, with no monthly MRR. The strategy involves building a bot, launching a database reactivation campaign, and charging a revenue share or per booked appointment. This is best for big lists and carries a low risk level for the agency, as it reactivates lost leads.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:07", "visual_context": "Summary of Pricing Options slide, highlighting 'Reactivation (Blitz)' column with Setup Fee: $1.5K (One-off) or $0, Monthly (MRR): $0, Best for: Big lists, Risk Level: Low."}, {"step_number": 10, "title": "Download Pricing Models PDF", "description": "Download the 'Pricing Models - AI Chatbots.pdf' document for a detailed explanation of each pricing model, including their structure, strategy, and example pitches.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:00", "visual_context": "Attached files section, showing 'Pricing Models - AI Chatbots.pdf' available for download."}, {"step_number": 11, "title": "Choose Appropriate Pricing Model", "description": "Decide which pricing model(s) to offer based on the client's needs, financial situation, and risk tolerance. It is generally recommended to start by offering the standard upfront payment model.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:13", "visual_context": "Summary of Pricing Options slide, general discussion about choosing models."}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod2-les3"});
loadSop('m2_05', {"title": "Implementing a Database Reactivation (DBR) Strategy for AI Agency Clients", "description": "This SOP outlines the psychological approach and a specific strategy for acquiring your first paying client using a Database Reactivation (DBR) offer. It emphasizes building confidence by demonstrating value upfront and leveraging existing client data to generate immediate results. This strategy is particularly useful for those new to selling high-ticket services.", "estimated_time": "15 minutes", "steps": [{"step_number": 1, "title": "Cultivate a Confident Mindset", "description": "Understand that 'selling is a transfer of emotion.' To effectively sell the value of AI bots, you must genuinely believe in their potential. You cannot transfer an emotion you don't possess. This confidence is crucial for persuading potential clients.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:29", "visual_context": "Man speaking directly to the camera, gesturing with his hands."}, {"step_number": 2, "title": "Build and Test Your Own AI Bot", "description": "Before pitching to a client, build an AI bot for yourself, a fake business, or a friend. Play with it, try to break it, and experience its capabilities firsthand. This hands-on experience will lead to an 'aha moment' where you realize the magic of the technology, boosting your excitement and conviction.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:47", "visual_context": "Man speaking directly to the camera, gesturing with his hands."}, {"step_number": 3, "title": "Propose a Database Reactivation (DBR) Offer", "description": "For your first clients, especially if you lack experience or case studies, leverage the Database Reactivation (DBR) offer. This is the ultimate risk-reversal strategy. Approach businesses with the proposition: 'I don't want your money upfront. I only want to get paid when I bring actual revenue.'", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:24", "visual_context": "Man speaking directly to the camera, gesturing with his hands."}, {"step_number": 4, "title": "Identify Suitable Clients for DBR", "description": "Focus on businesses that have an existing database of leads (dead leads) sitting in their CRM, collecting dust. For a pure performance-based DBR campaign, the client needs to have at least 1,000 contacts in their CRM. This volume is required to make the math work for both parties. Avoid businesses with very small lists (e.g., 50 people) as it will be a waste of your time.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:11", "visual_context": "Man speaking directly to the camera, gesturing with his hands."}, {"step_number": 5, "title": "Implement the DBR System", "description": "Offer to build the AI conversation system for free. Launch it to their existing list of leads. The AI will engage with these dormant leads, wake them up, and book appointments for the client.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:54", "visual_context": "Man speaking directly to the camera, gesturing with his hands."}, {"step_number": 6, "title": "Structure the Payment as a Commission", "description": "Agree to get paid a commission on the appointments or sales that the AI system generates. For example, if an excellent campaign generates 30 booked appointments from 1,000 SMS messages, and you charge $100 per booked appointment, you would earn $3,000. This offers significant value to the client with no upfront risk, making it an irresistible offer.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:00", "visual_context": "Man speaking, then screen switches to a 'Funnel Math' diagram with calculations being written on it."}, {"step_number": 7, "title": "Review DBR Funnel Math and Benchmarks", "description": "Understand the typical conversion rates for DBR campaigns based on 1,000 SMS messages sent:\n-   **Scenario A (Average Campaign)**:\n    -   Total Replies: 120 (12%)\n    -   Positive Replies: 20 (2%) - e.g., 'Yes, tell me more!'\n    -   Booked Appointments: 10 (1%) - 50% of positive replies actually book.\n-   **Scenario B (Excellent Campaign)**:\n    -   Total Replies: 200 (20%)\n    -   Positive Replies: 60 (6%)\n    -   Booked Appointments: 30 (3%)\n\n**Critical Benchmarks to Watch**:\n-   **The 'Ghost' Gap (Positive Reply -> Booking)**: Ideal Goal: 50% Conversion. A high positive reply rate (e.g., 6%) with a low booking rate (e.g., 0.5%) indicates automation/appointment setter failure to convert quickly.\n-   **Opt-Out Rate**: Expect: 1% - 3% per blast. Exceeds 4% = Warning! The offer might be too aggressive, or the list is too old (wrong data).", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:46", "visual_context": "A slide titled 'DBR Data: The \"Funnel Math\" Breakdown & Critical SMS Benchmarks' showing two funnel diagrams and benchmarks."}, {"step_number": 8, "title": "Leverage Initial Success for Confidence and Higher Fees", "description": "Once you secure your first DBR client and see the money hit your account, your confidence will skyrocket. This initial success and tangible proof of results will enable you to start charging higher setup fees for future clients, as you'll have case studies and a proven track record.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:31", "visual_context": "Man speaking directly to the camera, then switches back to the 'Funnel Math' diagram with calculations."}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod2-les4"});
loadSop('m3_01', {"title": "Getting Clients for Free (Organic Cold Outreach Strategy)", "description": "This SOP outlines a comprehensive organic cold outreach strategy to acquire clients without spending money on ads. It includes a detailed prospecting plan, a 'Private Beta' cold outreach message template, and a workflow for demo delivery and closing. The core idea is to offer a free, customized AI chatbot demo to prospects to generate curiosity and value upfront.", "estimated_time": "30 minutes (for initial review, ongoing daily routine will vary)", "steps": [{"step_number": 1, "title": "Understand the Goal: Free Client Acquisition", "description": "This lesson focuses on acquiring clients organically, without relying on paid advertisements. The method involves a cold outreach strategy, specifically using LinkedIn messages, to engage potential clients.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "Video screen showing the course content page for 'Getting Clients for Free'.", "warnings": null}, {"step_number": 2, "title": "Review Cold Message Example", "description": "Download and review the provided 'Cold Message Outreach Example.png' file. This image displays the actual LinkedIn message template that was successfully used to acquire a major home service company in the US. Familiarize yourself with its structure and content.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:26", "visual_context": "User clicks on 'Cold Message Outreach Example.png' and a pop-up shows the LinkedIn message: 'Hey, Mr. Brian! My team and I are currently working on what we believe is the most powerful AI junk removal chatbot. I would like to present it to your team so you guys can test it and integrate it to your system. I genuinely would like to offer it to you at no cost! It can be used for booking appointments or customer service. Side note: It can be customized for any of your companies from O2E brand!'", "warnings": "This message is a template and should be customized for each prospect and their specific industry/company."}, {"step_number": 3, "title": "Download The Private Beta Cold Outreach Strategy Document", "description": "Download the PDF document titled 'The Private Beta Cold Outreach Strategy'. This document contains the full, detailed step-by-step guide for prospecting, outreach, and closing clients using the 'private beta' method.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:50", "visual_context": "User clicks on 'The Private Beta Cold Outreach Strategy.pdf' and the PDF opens in a new window.", "warnings": null}, {"step_number": 4, "title": "Understand 'The Sniper Prospecting Plan'", "description": "Review the 'Prospecting' section of the PDF, specifically 'The Sniper Prospecting Plan'. This plan outlines strategies to identify high-value prospects who are actively spending money on marketing or showing signs of growth/expansion. The objective is to identify 5-15 such prospects daily.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:54", "visual_context": "PDF open, showing 'Prospecting' and 'The Sniper Prospecting Plan' sections.", "warnings": null}, {"step_number": 5, "title": "Implement Prospecting Strategies A, B, C, and D", "description": "Familiarize yourself with and implement the four prospecting strategies detailed in the document:\n- **Strategy A: 'The Ad Spender' Method (High Intent):** Identify businesses running Meta/Google ads using the Meta Ad Library. Look for companies with active ads in the last 30 days, indicating they are already spending on marketing.\n- **Strategy B: 'The Expansion' Method (The 'O2E' Angle):** Search Google News for businesses opening new locations or buying franchises, as they will need new volume.\n- **Strategy C: 'The Hiring' Method (The 'Growth' Angle):** Use LinkedIn/Indeed to find companies hiring Sales Reps or Appointment Setters, indicating a need for more leads.\n- **Strategy D: 'The Multi-Location' Map Search (Volume):** Use Google Maps to find franchise owners with 3-5 locations and 100+ reviews, suggesting high volume and potential for multiple subscriptions.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:00", "visual_context": "PDF showing 'Strategy A: The Ad Spender Method (High Intent)', 'Strategy B: The Expansion Method (The 'O2E' Angle)', 'Strategy C: The Hiring Method (The 'Growth' Angle)', and 'Strategy D: The Multi-Location Map Search (Volume)'.", "warnings": "Ensure you perform 'Deep Dive' research for each prospect to gather specific details for personalization."}, {"step_number": 6, "title": "Execute Daily Prospecting Routine", "description": "Follow the 'Execution Workflow (Daily Routine)' outlined in the PDF:\n- **Step 1: The Hunt (30 Mins):** Open Meta Ad Library & LinkedIn. Find 5 companies fitting the criteria from the prospecting strategies.\n- **Step 2: The Outreach (10 Mins):** Find the Owner/Founder on LinkedIn or their 'About Us' page, or send an email. Send the specific 'Side Note' you found in Step 1. Ensure your LinkedIn profile matches your AI agency business.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:20", "visual_context": "PDF showing 'Execution Workflow (Daily Routine)' with Step 1 and Step 2.", "warnings": "Personalization is key. Use the 'Deep Dive' research to tailor your outreach message."}, {"step_number": 7, "title": "Implement 'The Private Beta' Cold Outreach Strategy", "description": "Understand and apply 'The Private Beta' Cold Outreach Strategy:\n- **Objective:** Elicit a simple 'Yes/Sure' reply from the prospect.\n- **Mechanism:** Use our internal '1-Click Builder' to scrape their URL and create a 'Live Preview' (chat bubble) of their website with our bot before you even message them. This creates a highly personalized and valuable offer.\n- **Philosophy:** We are not selling; we are offering a 'private beta drive' of a vehicle we already built for them.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:24", "visual_context": "PDF showing 'The Private Beta Cold Outreach Strategy' section.", "warnings": "The 'private beta' framing is crucial for generating curiosity and reducing sales resistance."}, {"step_number": 8, "title": "Conduct Phase 1: The 'Deep Dive' Research", "description": "Before messaging, find specific details about the prospect that proves you are human. This involves looking for:\n- **Content/Media Dive:** If they have a podcast, YouTube channel, or active blog, note something specific about their content or operations.\n- **Expansion/News Dive:** If they are opening new locations or had an award, note the press release or news article.\n- **Hiring/Growth Dive:** If they have job posts on LinkedIn/Indeed, note that they are aggressively hiring sales reps.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:31", "visual_context": "PDF showing 'Phase 1: The Deep Dive Research' and examples of 'Deep Dive' Side Notes.", "warnings": "These 'Deep Dive' notes will be inserted into your universal template for maximum personalization."}, {"step_number": 9, "title": "Utilize Phase 2: The Universal Template (Soft CTA)", "description": "Use the provided universal template for your outreach message. Copy and paste the template, replacing the bracketed variables. Do not include a link or ask for a phone number yet. The goal is just to get a reply.\n**Subject Email:** Question about [Company Name] / The [Niche] AI Project\n**Body:** Hey [Mr./Ms. Last Name]! My team and I are currently working on what we believe is the most powerful AI [Niche Industry] assistant. I actually went ahead and used [Company Name]'s website to train a demo version (don't worry, I'm only sharing this with you, so I already know your services, pricing, and brand voice). I'd love to send you the preview link so you can test it live on your site? I genuinely want to offer this to you at no cost to test out. It handles things like [Benefit 1: e.g., 24/7 quoting] and [Benefit 2: e.g., qualifying leads] instantly. Would you be open to seeing it? Side note: [Insert Deep Dive Insight Here]!", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:00", "visual_context": "PDF showing 'Phase 2: The Universal Template (Soft CTA)' with the email/message script.", "warnings": "Ensure all bracketed variables are replaced with specific information for the prospect. The 'Side note' is where you insert your 'Deep Dive' research."}, {"step_number": 10, "title": "Manage Phase 3: Handling the 'Yes' (The Demo Delivery)", "description": "Once the prospect replies with 'Yes' or 'Sure', you have permission to ask for the delivery method. Send the preview link via SMS for the best mobile experience. The 'Persuasion Grantor' Script is:\n- **You:** 'Awesome. What is the best cell number to text the preview link to?'\n- **Them:** (Provides phone number)\n- **You:** 'They will text you the link. The video in the link shows how it makes money.'\n- **Them:** (Watches the video and engages with the bot).", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:15", "visual_context": "PDF showing 'Phase 3: Handling the 'Yes' (The Demo Delivery)' and the 'Persuasion Grantor' Script.", "warnings": "Sending the link via SMS ensures high engagement and a seamless mobile experience."}, {"step_number": 11, "title": "Understand The System Workflow (Internal SOP)", "description": "Review the internal SOP for building and delivering the demo bot:\n- **Scrape & Build:** Wait for the 'Yes' from the prospect and phone number. Input prospect URL + info into the '1-Click AI Builder'.\n- **System Generates:** The system generates the 'Preview Page' (Their Site + Chat Bubble) and sends the magic link.\n- **User Experience:** Prospect clicks link -> Sees their website with our bot -> Clicks 'Start Demo'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:17", "visual_context": "PDF showing 'The System Workflow (Internal SOP)' details.", "warnings": "The '1-Click AI Builder' is a key tool for quickly generating personalized demo bots."}, {"step_number": 12, "title": "Implement The Post-VSL Protocol", "description": "After the prospect has interacted with the demo bot and watched the VSL, follow the 'Post-VSL Protocol' to close the deal:\n- **Objective:** Close the deal after the VSL has done the heavy lifting.\n- **Scenario A: They watched the VSL & Booked a Call (The Perfect Flow):** VSL page has a calendar embedded. Action: Prepare for the call.\n- **Scenario B: They clicked the link but didn't book (The Nudge):** Send a follow-up message 24 hours later: 'Hey [First Name], did the video about the backend automation make sense?'\n- **Scenario C: They ask 'How much is it?' (Buying Signal):** If they ask about pricing, they are price-anchored now. Respond with: 'The setup varies slightly based on your needs. We can do a quick call to find out what tier fits you best? It'll take 10 mins. Is tomorrow or [day] better for you?'", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:28", "visual_context": "PDF showing 'The Post-VSL Protocol' with different scenarios and scripts.", "warnings": "Be prepared to handle different responses and guide the prospect towards booking a call."}, {"step_number": 13, "title": "Review the 'Perfect' Workflow Summary", "description": "Review the summary of the 'Perfect' Workflow to reinforce the entire process:\n1.  **Outreach:** 'Trained a bot on your site' (Deep Dive Hack).\n2.  **Reply:** 'Yes, send it.'\n3.  **Delivery:** 'What's your mobile? I'll text the demo.'\n4.  **Experience:** They play with the bot on their phone.\n5.  **The Proof:** 'That was just 1%. Watch this video to see how it makes money' (VSL).\n6.  **The Close:** They book a call or you follow up to book it.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:31", "visual_context": "PDF showing 'Summary of the 'Perfect' Workflow' section.", "warnings": "This summary provides a concise overview of the ideal client acquisition journey."}, {"step_number": 14, "title": "Thoroughly Read the Entire Document", "description": "Ensure you read through the entire 'The Private Beta Cold Outreach Strategy' PDF document carefully to fully grasp all the nuances and details of the strategy. Everything is laid out very easily for you.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:34", "visual_context": "User scrolling through the PDF, then closing it and returning to the course page.", "warnings": "A complete understanding of the document is essential for successful implementation."}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod3-les1"});
loadSop('m4_01', {"title": "Leveraging Provided Meta Ads Assets and Black Umbrella AI Platform", "description": "This SOP guides you through accessing and utilizing the pre-built Meta Ads creatives and copy provided in the 'Copy My AI Agency' course. It also demonstrates how to use the Black Umbrella AI Marketing Platform for campaign management and leverages its 'Ask Astro' AI assistant for step-by-step ad setup instructions, enabling efficient client acquisition through paid advertising.", "estimated_time": "10 minutes", "steps": [{"step_number": 1, "title": "Access Meta Ads Course Content", "description": "Navigate to the 'Meta Ads' lesson within the 'Copy My AI Agency' course to view the provided ad creatives and copy. This section is presented as the easiest and fastest way to acquire clients, recommending a combination of outreach and ads.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:00", "visual_context": "The screen displays the 'Meta Ads' lesson page, showing a grid of ad creatives and a list of attached files on the right sidebar."}, {"step_number": 2, "title": "Review Ad Creatives Overview", "description": "Observe the grid of 16 sample ad creatives provided in the lesson. These visuals are designed to help your ads stand out and are part of the winning Meta Ads strategy.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:16", "visual_context": "A grid of 16 ad creatives is prominently displayed on the left side of the screen, with titles like 'SCALE. DON'T HIRE.', 'TEST DRIVE YOUR CUSTOM AI', 'THE EMPLOYEE THAT NEVER SLEEPS', etc."}, {"step_number": 3, "title": "Access Full Meta Ads Campaign Details", "description": "Click on the 'Full Campaign' link provided under the 'Winning Meta Ads' section. This will open a new tab displaying the complete Meta Ads campaign details on the Black Umbrella platform, including hooks, body text, CTAs, and creatives.", "url": "https://go.blackumbrella.app/share/campaigns/uacH89c-e7ce-4647-a181-93b00700cc", "input_field": null, "uses_variable": null, "timestamp": "00:28", "visual_context": "The cursor hovers over and clicks the 'Full Campaign' link, which is a green URL."}, {"step_number": 4, "title": "Examine Ad Hooks", "description": "On the Black Umbrella campaign page, review the 'Hooks' section. This tab displays 4 attention-grabbing headlines designed to capture audience interest.", "url": "https://go.blackumbrella.app/share/campaigns/uacH89c-e7ce-4647-a181-93b00700cc", "input_field": null, "uses_variable": null, "timestamp": "00:30", "visual_context": "The Black Umbrella campaign page is open, with 'Hooks' tab selected, showing four distinct ad hooks."}, {"step_number": 5, "title": "Review Ad Body Text", "description": "Switch to the 'Body' tab on the campaign page to read the 3 persuasive copy versions for the ads. These provide detailed explanations of the offer and aim to convince the audience to take action.", "url": "https://go.blackumbrella.app/share/campaigns/uacH89c-e7ce-4647-a181-93b00700cc", "input_field": null, "uses_variable": null, "timestamp": "00:34", "visual_context": "The Black Umbrella campaign page, with the 'Body' tab selected, displaying three versions of ad body text."}, {"step_number": 6, "title": "Identify Call-to-Action (CTA) Headlines", "description": "Go to the 'CTA' tab to see the call-to-action headlines used in the ads. There is 1 call-to-action headline provided: 'Test Your Demo'.", "url": "https://go.blackumbrella.app/share/campaigns/uacH89c-e7ce-4647-a181-93b00700cc", "input_field": null, "uses_variable": null, "timestamp": "00:36", "visual_context": "The Black Umbrella campaign page, with the 'CTA' tab selected, showing 'Test Your Demo' as the call-to-action headline."}, {"step_number": 7, "title": "View Ad Creatives from Campaign", "description": "Navigate to the 'Creative' tab to view all 16 visual elements for the ads. You can download these creatives directly from this page for use in your campaigns.", "url": "https://go.blackumbrella.app/share/campaigns/uacH89c-e7ce-4647-a181-93b00700cc", "input_field": null, "uses_variable": null, "timestamp": "00:38", "visual_context": "The Black Umbrella campaign page, with the 'Creative' tab selected, displaying a grid of 16 ad creatives."}, {"step_number": 8, "title": "Understand the 'Test Drive Your Custom AI' Angle", "description": "The core strategy for client acquisition, as emphasized, is to offer prospects a 'test drive' of their custom AI. This approach is central to both paid ads and direct outreach efforts.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:42", "visual_context": "The speaker explains the main marketing angle, with the ad creatives still visible in the background."}, {"step_number": 9, "title": "Access AI Demo Landing Page", "description": "To facilitate the 'test drive' angle, navigate to the 'Sites' section in your CRM (e.g., GoHighLevel) and locate the 'AI Demo Magic Link' funnel step. Click 'View page' to see the landing page where prospects can generate their AI demo by filling out a form.", "url": "https://aigenap.blackumbrella.app/ai-demo-magic-link", "input_field": null, "uses_variable": null, "timestamp": "00:56", "visual_context": "The CRM interface showing 'Sites > Funnels > AI Agency Demo > AI Demo Magic Link' funnel step, then the 'Generate Your AI Demo with 1-Click' landing page with input fields for name, phone, company, etc."}, {"step_number": 10, "title": "Utilize Black Umbrella AI Marketing Platform", "description": "For setting up and running your Meta Ads campaigns, use the Black Umbrella AI Marketing Platform. This platform is designed to help you build and optimize your ad campaigns efficiently.", "url": "https://blackumbrella.app/", "input_field": null, "uses_variable": null, "timestamp": "01:22", "visual_context": "The speaker highlights the 'AI Marketing Platform' link on the course page, which then opens the Black Umbrella app landing page titled 'Your AI Marketing Team Just Replaced a $5,000/Month Agency'."}, {"step_number": 11, "title": "Explore Black Umbrella Knowledge Vault", "description": "Once logged into Black Umbrella, access the 'Knowledge Vault' for comprehensive resources. This vault contains information on creating and managing ad campaigns, including details on brands, offers, products, and various ad campaign generation tools.", "url": "https://go.blackumbrella.app/knowledge-vault", "input_field": null, "uses_variable": null, "timestamp": "01:41", "visual_context": "The Black Umbrella dashboard showing the 'Knowledge Vault' with multiple modules represented by astronaut icons, such as 'Dashboard', 'Brands and Offers', 'Managing Products', 'Ads Campaign Generation', etc."}, {"step_number": 12, "title": "Use Ask Astro for Ad Setup Guidance", "description": "Utilize the 'Ask Astro' chatbot within Black Umbrella for step-by-step guidance on setting up your Meta Ads (Facebook Ads) Manager account and Google Ads. Ask Astro can provide detailed instructions and visual guides, including how to create a Meta Business Manager, set up an Ad Account, connect your Facebook Page, and configure the Conversions API.", "url": "https://go.blackumbrella.app/ask-astro", "input_field": null, "uses_variable": null, "timestamp": "01:47", "visual_context": "The Black Umbrella interface showing the 'Ask Astro' chatbot. A conversation is displayed with detailed steps and a video tutorial on 'how to setup my Ads manager account'."}, {"step_number": 13, "title": "Download Meta Ads Copy PDF", "description": "Download the 'Meta Ads Copy.pdf' from the 'Attached Files' section in the course lesson. This PDF contains the hooks and body copy for the provided ad creatives, offering ready-to-use text for your campaigns.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:18", "visual_context": "The 'Attached Files' section on the course page, showing 'Meta Ads Copy.pdf' with a download icon. The PDF is then opened, displaying 'Hooks' and 'Body Copy' sections with ad text."}], "variables_summary": [], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod4-les1"});
loadSop('m5_01', {"title": "Client Onboarding Flow for AI Systems", "description": "This SOP outlines the complete process for onboarding new clients for AI Systems, from payment and agreement signing to setting up their HighLevel accounts, n8n workflows, and AI chatbots. It includes steps for document management, API key setup, and client communication.", "estimated_time": "60 minutes", "steps": [{"step_number": 1, "title": "Send Payment Link to Client", "description": "After closing the deal, send the client a payment link for the agreed-upon setup fee. This can be a Stripe-hosted checkout link or a HighLevel payment page. The example shows a $5,000.00 setup fee for 'ADRS Setup'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:05", "visual_context": "A payment checkout form showing \"ADRS Setup $5,000.00\" and various payment methods (Card, Cash App Pay, Google Pay, Affirm, Klarna).", "warnings": "Ensure the payment link reflects the correct service and pricing."}, {"step_number": 2, "title": "Prepare and Send Service Agreement", "description": "Access the AI Service Agreement template (Google Docs). Go to 'File' > 'Make a copy' and rename it with the client's name (e.g., 'AI Service Agreement - Client Name'). Fill in all relevant client and company information, including the effective date, provider name, client company name, and agreement number. Update the payment terms (setup fee, monthly hosting, API & message costs, late payments, price adjustments) and client responsibilities. Ensure the correct service (Essential AI System or Professional AI System) is checked in 'PART B: STATEMENT OF WORK'. Download the completed document as a PDF (File > Download > PDF Document (.pdf)). Send this PDF to the client for their signature.", "url": "https://docs.google.com/document/d/127704231110418816667201101800961947", "input_field": null, "uses_variable": null, "timestamp": "00:37", "visual_context": "Google Docs showing the 'AI Service Agreement' template, then a copied version named 'AI Service Agreement - Client Name'. The document details services, payment terms, client responsibilities, and signature fields. A PDF viewer shows the downloaded document with fillable signature fields.", "warnings": "Double-check all client-specific information and pricing before sending. Ensure the client can sign the PDF digitally."}, {"step_number": 3, "title": "Prepare and Send AI System Onboarding Questionnaire", "description": "Access the AI System Onboarding Questionnaire template (Google Docs). Go to 'File' > 'Make a copy' and rename it with the client's name (e.g., 'AI Onboarding Questionnaire - Client Name.docx'). Click 'Share', change the general access to 'Anyone with the link' and set the role to 'Editor'. Copy the shareable link. Send this link to the client so they can fill out their client name, company, date, primary goal, conversation flow, conversion links, main website URL, company information, services & pricing, business hours, authority & social proof, key credentials, case studies, success stories, FAQs, lead routing, sales enablement, and API setup preferences (Anthropic & Gemini API).", "url": "https://docs.google.com/document/d/127704231110418816667201101800961947", "input_field": null, "uses_variable": null, "timestamp": "01:55", "visual_context": "Google Docs showing the 'AI System Onboarding Questionnaire' template, then a copied version named 'AI Onboarding Questionnaire - Client Name.docx'. The sharing dialog is shown, setting access to 'Anyone with the link' as 'Editor'.", "warnings": "Emphasize to the client that this questionnaire is crucial for tailoring their AI assistant. The questionnaire includes instructions for setting up Anthropic and Gemini API keys."}, {"step_number": 4, "title": "Offer Tech Support for API Key Setup (Optional but Recommended)", "description": "If the client is not tech-savvy or needs assistance, send them a booking link for a tech support call. During this call, help them open their Anthropic and Google Gemini API accounts and retrieve the necessary API keys. Instructions for API key setup are also provided within the questionnaire (Section 17).", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:15", "visual_context": "A calendar interface for booking tech support. The questionnaire section 'Anthropic & Gemini API Setup' is shown with sign-up links and directions to find API keys.", "warnings": "Ensure the client understands the importance of setting up these API keys for the AI models to function. Remind them to enable auto-recharge for Anthropic API to avoid service interruptions."}, {"step_number": 5, "title": "Set Up HighLevel Account and Load Snapshots", "description": "If the client has an existing HighLevel (GHL) account: Load the AI Delta Response System (ADRS) Snapshot into their sub-location. A tutorial link is provided for detailed instructions. If the client does NOT have a GHL account: Create a new sub-location under your agency. Then, load the 'AI Delta Response System' and/or 'AI Voice Delta Response System - CMAA' snapshots into this new sub-location. Alternatively, clients can use one of our client account links for $47/month (link available in the membership area under '90 Days FREE GHL Account').", "url": "https://help.gohighlevel.com/support/solutions/articles/48000982362-load-snapshots-into-existing-sub-account", "input_field": null, "uses_variable": null, "timestamp": "03:59", "visual_context": "A diagram showing HighLevel and n8n integration. Text instructions for loading snapshots into existing or new GHL accounts, and an option for client accounts at $47/mo. The HighLevel support portal page for loading snapshots is shown. The membership area showing the ADRS System Setup lesson and the client GHL account link is also shown.", "warnings": "DO NOT import the snapshot if you already added the AI Agency snapshot to the sub-location, as it includes the same components."}, {"step_number": 6, "title": "Duplicate and Configure n8n Workflow", "description": "In your n8n instance, navigate to 'Workflows'. Click the folder icon to 'Create folder in Personal' and name it 'Clients'. Inside the 'Clients' folder, click the folder icon again and create another folder with the client's name (e.g., 'Black Umbrella'). Locate the 'AI Delta Response System v3 - TEMPLATE' workflow (or 'AI Voice Agents' template if applicable). Click the three dots next to the template and select 'Duplicate'. Rename the duplicated workflow to include the client's name (e.g., 'AI Delta Response System v3 - Black Umbrella'). Drag and drop this newly named workflow into the client's dedicated folder.", "url": "https://n8n.app.mahal.com/workflows", "input_field": null, "uses_variable": null, "timestamp": "05:14", "visual_context": "n8n interface showing workflows, creating folders ('Clients', 'Black Umbrella'), duplicating a template workflow ('AI Delta Response System v3 - TEMPLATE'), renaming it, and moving it into the client's folder.", "warnings": "Ensure you duplicate the correct template based on the client's service (chatbot, voice, or both)."}, {"step_number": 7, "title": "Add Client to HighLevel Account and Send Lead Connector App", "description": "Make sure to add the client and any extra employees as team members in their HighLevel account (or the sub-location you created for them). Send the Lead Connector App to the client. This is the white-labeled version of the HighLevel app for their phone, allowing them to see conversations and contacts.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "06:40", "visual_context": "Text instructions on the Miro board.", "warnings": "Ensure all relevant client personnel have access to the GHL account and the Lead Connector App for seamless communication and management."}, {"step_number": 8, "title": "Wait for Onboarding Documents and Submit A2P (if needed)", "description": "Wait for the client to complete and return the AI System Onboarding Questionnaire (from Step 3). Once received, download it as a PDF for your records and to feed into the AI for prompt generation. If the client will be using SMS for the bot, submit their A2P application using A2PWizard.com to ensure SMS functionality. The A2P Wizard link and tutorial are available in the membership area under 'AI Agency Setup' > 'A2P Approval'.", "url": "https://a2pwizard.com/forcopyaiagency", "input_field": null, "uses_variable": null, "timestamp": "07:05", "visual_context": "A yellow box labeled 'WAIT FOR ONBOARDING DOCUMENTS'. The A2PWizard logo and 'Submit A2P if needed' text. The A2P Wizard website is shown. The membership area showing the A2P Approval lesson is also shown.", "warnings": "A2P approval is crucial for SMS functionality and can take some time. Start this process as soon as possible if SMS is required."}, {"step_number": 9, "title": "Generate AI Bot Prompts and Test Chatbot", "description": "Use the Chatbot Prompt Forge (refer to the 'Client AI Bot Generation Video' for detailed instructions, which will be the next video in the course) to generate the system prompts for the client's AI bot based on the completed onboarding questionnaire. Thoroughly test the AI chatbot to ensure it functions correctly, understands client-specific information, and meets the primary goals outlined in the questionnaire.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "07:51", "visual_context": "A box labeled 'CLIENT AI BOT GENERATION VIDEO' containing a 'Chatbot Prompt Forge' interface. Boxes for 'TEST AI CHATBOT' and 'DELIVER FULL AI DEMO FOR CLIENT TESTING'.", "warnings": "Rigorous testing is essential to catch any errors or misinterpretations of the client's requirements before delivery."}, {"step_number": 10, "title": "Deliver Full AI Demo and Provide Bot Control Tutorial", "description": "Deliver a full AI demo to the client for their final testing and approval. Once approved, provide them with an explainer video (e.g., the GHL Bot Control Tutorial Loom video) that demonstrates how the AI bot works inside HighLevel, how to manage conversations, and how to engage with the bot. The Loom video link is provided. You can create your own Loom video if you prefer.", "url": "https://www.loom.com/share/5307f54b412442b1b62342ed137773b0", "input_field": null, "uses_variable": null, "timestamp": "08:15", "visual_context": "A video player showing the 'ADRS System Setup (AI Chatbot System)' and 'Managing Conversations with Pro Clients and Bot Engagement' tutorials. A Loom link for the GHL Bot Control Tutorial is provided.", "warnings": "Ensure the client is comfortable and confident in managing their new AI system. Offer additional support if needed."}], "variables_summary": [{"variable_name": "n8nRootPassword", "label": "n8n VPS Root Password", "type": "password", "used_in_future_steps": "Not directly used in this SOP's steps, but is a prerequisite for n8n setup."}, {"variable_name": "n8nLoginUrl", "label": "n8n Login URL", "type": "url", "used_in_future_steps": "Not directly used in this SOP's steps, but is a prerequisite for n8n setup."}, {"variable_name": "n8nLicenseKey", "label": "n8n License Key", "type": "text", "used_in_future_steps": "Not directly used in this SOP's steps, but is a prerequisite for n8n setup."}, {"variable_name": "anthropicApiKey", "label": "Anthropic API Key", "type": "password", "used_in_future_steps": "Not directly used in this SOP's steps, but is required for AI model functionality and is obtained during onboarding."}, {"variable_name": "geminiApiKey", "label": "Gemini API Key", "type": "password", "used_in_future_steps": "Not directly used in this SOP's steps, but is required for AI model functionality and is obtained during onboarding."}, {"variable_name": "openaiApiKey", "label": "OpenAI API Key", "type": "password", "used_in_future_steps": "Not directly used in this SOP's steps, but is required for AI model functionality and is obtained during onboarding."}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod5-les1"});
loadSop('m5_02', {"title": "Building an AI Chatbot Prompt and Deploying it to a Live Chat Widget", "description": "This SOP details the process of creating a comprehensive AI chatbot prompt using Claude, refining it based on feedback, and then deploying it to a live chat widget within the Black Umbrella CRM (GoHighLevel). It covers uploading client documents, generating the initial prompt, auditing for missing information, making conversational style adjustments, and integrating the final prompt into an n8n workflow and a CRM funnel.", "estimated_time": "45 minutes", "steps": [{"step_number": 1, "title": "Upload Client Documents to Claude", "description": "Drag and drop the client's onboarding documents and chatbot message script/knowledge base PDF files into the Claude chat interface. These documents contain essential information for building the AI chatbot's prompt.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:40", "visual_context": "Claude chat interface, user dragging two PDF files ('American Iron - Onboard.docx.pdf' and 'Chatbot Message Script & Knowledge Info - American Iron.pdf') into the chat input area."}, {"step_number": 2, "title": "Request Initial Chatbot Prompt Generation", "description": "Type a prompt asking Claude to build an AI chatbot prompt using the attached documents and the company's website. Include the full URL of the company's website for Claude to scrape additional information.", "url": "https://amiron.pro", "input_field": null, "uses_variable": null, "timestamp": "00:47", "visual_context": "User typing: 'Help me build the ai chatbot prompt, attached are the onboarding documents and also the script, database information, qualification and extra company info. Here is the company's website: https://amiron.pro'"}, {"step_number": 3, "title": "Review Claude's Initial Information Extraction", "description": "After Claude processes the request, review the extracted information from both the uploaded documents and the provided website. Claude will list key details such as AI name, goals, booking links, service area, qualifications, and company specifics.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:44", "visual_context": "Claude's response showing bulleted lists of extracted information from 'documents' and 'website', followed by the generated chatbot system prompt."}, {"step_number": 4, "title": "Request Prompt Audit and Missing Information Check", "description": "Ask Claude to double-check its work by auditing the generated prompt against the source documents and website. Request a list of any missing information and instruct Claude to add it to the prompt.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:26", "visual_context": "User typing: 'now lets double check all of the documents and the final prompt to make sure that we did not miss anything. then make a list of any missing information and add it to the prompt.'"}, {"step_number": 5, "title": "Review Audit Summary and Identify Unnecessary Sections", "description": "Examine Claude's audit summary, which will list 'Items That Were Missing (Now Added)' and 'SUMMARY: MISSING ITEMS TO ADD'. Identify any sections that are redundant or not required for the chatbot's functionality, such as explicit data collection if the bot integrates with a form submission.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:08", "visual_context": "Claude's audit summary showing 'Items That Were Missing (Now Added)' and 'SUMMARY: MISSING ITEMS TO ADD' lists. User highlights 'Information to Collect - Explicit list of required data'."}, {"step_number": 6, "title": "Remove Redundant Data Collection Section", "description": "Instruct Claude to remove the 'Information to Collect - Explicit list of required data' section from the prompt, as the chatbot will obtain this information directly from a form submission via webhook integration.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "04:32", "visual_context": "User typing: 'lets remove the 'Information to Collect - Explicit list of required data' since this bot will have access to a form submission.'"}, {"step_number": 7, "title": "Disable Emoji Usage for SMS Bots", "description": "If the chatbot is intended for SMS communication, instruct Claude to ensure it never uses emojis. Emojis can convert standard SMS messages into MMS, significantly increasing messaging costs.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:29", "visual_context": "User typing: 'lets make sure the bot never uses emojis'. Claude's response confirms the update, showing 'Emojis: Never use emojis under any circumstances' in the prompt."}, {"step_number": 8, "title": "Copy the Final Chatbot Prompt", "description": "Once all necessary adjustments have been made and confirmed by Claude, copy the entire generated chatbot system prompt.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "06:25", "visual_context": "User clicking the 'Copy' button on the Claude chat interface to copy the final prompt."}, {"step_number": 9, "title": "Save Prompt to Google Docs", "description": "Open a new Google Document (docs.google.com/document/u/0/) and paste the copied chatbot prompt. This provides an easily accessible and editable version of the prompt.", "url": "docs.google.com/document/u/0/", "input_field": null, "uses_variable": null, "timestamp": "06:27", "visual_context": "User opening a new Google Doc and pasting the prompt content."}, {"step_number": 10, "title": "Rename and Star the Claude Chat", "description": "Rename the Claude chat conversation to something descriptive (e.g., 'American Iron Chatbot Prompt') and star it for easy access in the future.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "06:37", "visual_context": "User renaming the Claude chat and starring it."}, {"step_number": 11, "title": "Download Prompt as Markdown", "description": "From the Google Doc, download the prompt as a Markdown (.md) file. This format is often preferred for code-like content and easier editing in specialized editors.", "url": null, "input_field": {"variable_name": "americanIronChatbotPromptMd", "label": "American Iron Chatbot Prompt (Markdown)", "type": "file"}, "uses_variable": null, "timestamp": "07:15", "visual_context": "User navigating to File > Download > Markdown (.md) in Google Docs."}, {"step_number": 12, "title": "Open and Clean Markdown Prompt in Code Editor", "description": "Open the downloaded Markdown file in a code editor (like Cursor). Google Docs sometimes adds extra backslashes; manually remove these or re-paste the prompt directly from Claude to ensure a clean format. Save the cleaned file.", "url": null, "input_field": null, "uses_variable": ["americanIronChatbotPromptMd"], "timestamp": "07:22", "visual_context": "User opening 'Untitled Document.md' in Cursor, observing extra backslashes, deleting content, re-pasting, and saving as 'System Prompt v1.md'."}, {"step_number": 13, "title": "Remove Follow-Up Sequences from Main Prompt", "description": "If the prompt includes `follow_up_sequence` sections, delete them from the Markdown file. These sequences are typically handled by separate automation workflows in the CRM, not directly by the AI agent's core prompt.", "url": null, "input_field": null, "uses_variable": ["americanIronChatbotPromptMd"], "timestamp": "08:40", "visual_context": "User deleting the `follow_up_sequence` section from 'System Prompt v1.md' in Cursor."}, {"step_number": 14, "title": "Verify Token Count for Prompt (Optional)", "description": "To ensure the prompt is within token limits for cost-efficiency and performance, copy the entire prompt (excluding follow-up sequences) and paste it into a GPT tokenizer tool (e.g., koalachat.sh/tools/free-gpt-tokenizer). If the token count is below 12,000-15,000, it's generally acceptable to keep the knowledge base within the main prompt.", "url": "https://koalachat.sh/tools/free-gpt-tokenizer", "input_field": null, "uses_variable": ["americanIronChatbotPromptMd"], "timestamp": "09:31", "visual_context": "User copying the prompt, pasting it into the KoalaChat tokenizer, and observing the token count (8856 tokens)."}, {"step_number": 15, "title": "Add Survey Questions as User Information Fields (for Testing)", "description": "For testing purposes, add the questions from the client's survey form as comments under the `USER INFORMATION` section in your Markdown prompt. This allows you to simulate user input directly within the prompt for testing the bot's responses.", "url": "https://go.amiron.pro/barndominium-survey", "input_field": null, "uses_variable": ["americanIronChatbotPromptMd"], "timestamp": "11:16", "visual_context": "User adding survey questions as comments in 'System Prompt v1.md' in Cursor, then filling in example answers and user name 'Zalo'."}, {"step_number": 16, "title": "Duplicate and Move Live Chat Workflow in n8n", "description": "In n8n, navigate to 'Workflows'. Duplicate the 'Live Chat AI Demo - TEMPLATE' workflow. Rename the duplicated workflow to include the client's name (e.g., 'Live Chat AI Demo [DEMO AMERICAN IRON]'). Move this workflow into the 'Clients' folder, and then into a new subfolder named after the client (e.g., 'American Iron').", "url": "https://app.blackumbrella.cloud/workflows", "input_field": null, "uses_variable": null, "timestamp": "13:04", "visual_context": "User duplicating 'Live Chat AI Demo - TEMPLATE', renaming it, and moving it into a new 'American Iron' folder under 'Clients' in n8n workflows."}, {"step_number": 17, "title": "Update AI Agent System Messages in n8n Workflow", "description": "Open the duplicated workflow. For each 'AI Agent' node, click on it, go to 'Parameters', and paste the final, refined chatbot system prompt (from your Markdown file) into the 'System Message' field. This configures the AI agent's core instructions.", "url": null, "input_field": null, "uses_variable": ["americanIronChatbotPromptMd"], "timestamp": "13:43", "visual_context": "User opening the 'AI Agent' node in n8n, copying the prompt from 'System Prompt v1.md', and pasting it into the 'System Message' field for both AI Agent nodes."}, {"step_number": 18, "title": "Copy Chat URL from n8n Workflow", "description": "Click on the 'When chat message received' node in the n8n workflow. In the 'Output' section, copy the 'Chat URL'. This URL is the endpoint for your chatbot.", "url": null, "input_field": {"variable_name": "n8nChatUrl", "label": "n8n Chat URL", "type": "text"}, "uses_variable": null, "timestamp": "13:53", "visual_context": "User clicking 'When chat message received' node, then copying the 'Chat URL' from the output panel."}, {"step_number": 19, "title": "Publish the n8n Workflow", "description": "Click the 'Publish' button in the n8n workflow editor to save and activate all changes.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "13:59", "visual_context": "User clicking the 'Publish' button in the n8n workflow editor."}, {"step_number": 20, "title": "Duplicate and Configure Live Chat Funnel Step in CRM", "description": "In the Black Umbrella CRM, navigate to 'Sites' > 'Funnels'. Duplicate the 'LIVE CHAT AI Live Chat' funnel step. Rename the duplicated step to include the client's name (e.g., 'LIVE CHAT AI Live Chat [DEMO AMERICAN IRON]'). Change the URL path to something descriptive (e.g., `/live-chat-american-iron`).", "url": null, "input_field": {"variable_name": "crmFunnelUrl", "label": "CRM Funnel URL", "type": "url"}, "uses_variable": null, "timestamp": "14:02", "visual_context": "User duplicating 'LIVE CHAT AI Live Chat' funnel step, renaming it, and changing the URL path in the CRM."}, {"step_number": 21, "title": "Update Webhook URL in Live Chat Funnel Code", "description": "Edit the duplicated funnel step's page. Click on the 'Custom HTML/Javascript' element. In the code editor, locate the `webhookUrl` field and paste the 'n8n Chat URL' copied from the n8n workflow. Save and publish the funnel step.", "url": null, "input_field": null, "uses_variable": ["n8nChatUrl"], "timestamp": "14:31", "visual_context": "User editing the funnel page, opening the custom code editor, pasting the n8n Chat URL into the `webhookUrl` field, saving, and publishing."}, {"step_number": 22, "title": "Prepare Test URLs for Live Chat", "description": "To test the live chat with different user identities, construct multiple URLs using the CRM funnel URL. Append `?uid=` followed by a unique identifier (e.g., `zalo`, `john`, `mary`) to each URL. This allows for separate conversations and testing of user-specific interactions.", "url": null, "input_field": null, "uses_variable": ["crmFunnelUrl"], "timestamp": "14:53", "visual_context": "User typing example URLs with different `uid` parameters in a Google Doc: `https://blackumbrella.deltagroup.agency/ai-live-chat-american-iron?uid=zalo`, `...uid=john`, `...uid=mary`."}, {"step_number": 23, "title": "Test the Live Chat with Different User IDs", "description": "Open each of the prepared test URLs in separate browser tabs. Initiate a conversation in each chat. Observe how the AI agent responds, noting that each `uid` creates a distinct conversation history. This allows for comprehensive testing and refinement of the chatbot's behavior.", "url": null, "input_field": null, "uses_variable": ["crmFunnelUrl"], "timestamp": "15:39", "visual_context": "User opening multiple browser tabs with different `uid` URLs, typing 'Hi' in the chat, and observing the AI's responses, noting distinct conversations."}], "variables_summary": [{"variable_name": "n8nRootPassword", "label": "n8n VPS Root Password", "type": "password", "used_in_future_steps": "No (prerequisite for n8n setup)"}, {"variable_name": "n8nLoginUrl", "label": "n8n Login URL", "type": "url", "used_in_future_steps": "No (implicitly used for n8n access)"}, {"variable_name": "n8nLicenseKey", "label": "n8n License Key", "type": "text", "used_in_future_steps": "No (prerequisite for n8n setup)"}, {"variable_name": "anthropicApiKey", "label": "Anthropic API Key", "type": "password", "used_in_future_steps": "Yes (in AI Agent nodes)"}, {"variable_name": "geminiApiKey", "label": "Gemini API Key", "type": "password", "used_in_future_steps": "Yes (in AI Agent nodes)"}, {"variable_name": "openaiApiKey", "label": "OpenAI API Key", "type": "password", "used_in_future_steps": "No (not explicitly shown in this video)"}, {"variable_name": "americanIronChatbotPromptMd", "label": "American Iron Chatbot Prompt (Markdown)", "type": "file", "used_in_future_steps": "Yes (in n8n workflow)"}, {"variable_name": "n8nChatUrl", "label": "n8n Chat URL", "type": "text", "used_in_future_steps": "Yes (in CRM funnel code)"}, {"variable_name": "crmFunnelUrl", "label": "CRM Funnel URL", "type": "url", "used_in_future_steps": "Yes (for testing)"}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod5-les2"});
loadSop('m5_03', {"title": "AI Bot Test Bench Setup and Usage", "description": "This SOP details how to set up and use the AI Bot Test Bench workflow in n8n to simulate conversations between an AI client bot and an AI user bot, log the interactions, and analyze the conversation flow. It also covers troubleshooting common errors like 'Referenced node doesn't exist' and API rate limits.", "estimated_time": "20 minutes", "steps": [{"step_number": 1, "title": "Import AI Bot Test Bench Workflow", "description": "Import the provided 'AI Bot Test Bench.json' workflow file into your n8n instance.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:05", "visual_context": "Clicking the '...' menu, then 'Import from file', and selecting the JSON file.", "warnings": null}, {"step_number": 2, "title": "Save the Workflow", "description": "After importing, save the workflow to ensure all changes are retained.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:46", "visual_context": "Clicking the 'Save' button in the top right corner of the n8n editor.", "warnings": null}, {"step_number": 3, "title": "Create a New Data Table", "description": "Create a new data table named 'bot-test' with two columns: 'user' and 'assistant'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:55", "visual_context": "Navigating to 'Data tables', clicking 'Create data table', entering 'bot-test', and adding 'assistant' and 'user' columns.", "warnings": null}, {"step_number": 4, "title": "Configure 'Get Full Conversation1' Node", "description": "Open the 'Get Full Conversation1' node. In the 'Parameters' tab, ensure the 'Data table' is set to the newly created 'bot-test'. Refresh the list for both 'assistant' and 'user' columns under 'Conditions'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:21", "visual_context": "Opening the node, selecting 'bot-test' from the dropdown, and clicking 'Refresh List' for column conditions.", "warnings": null}, {"step_number": 5, "title": "Configure 'Log Assistant Message' Node", "description": "Open the 'Log Assistant Message' node. In the 'Parameters' tab, ensure the 'Data table' is set to the newly created 'bot-test'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:38", "visual_context": "Opening the node and selecting 'bot-test' from the 'Data table' dropdown.", "warnings": null}, {"step_number": 6, "title": "Configure 'Get Full Conversation' Node (after Total Turns)", "description": "Open the 'Get Full Conversation' node (the one after 'Total Turns'). In the 'Parameters' tab, ensure the 'Data table' is set to the newly created 'bot-test'. Refresh the list for both 'assistant' and 'user' columns under 'Conditions'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:45", "visual_context": "Opening the node, selecting 'bot-test' from the dropdown, and clicking 'Refresh List' for column conditions.", "warnings": null}, {"step_number": 7, "title": "Configure 'Delete Conversation' Node", "description": "Open the 'Delete Conversation' node. In the 'Parameters' tab, ensure the 'Data table' is set to the newly created 'bot-test'. Refresh the list for both 'assistant' and 'user' columns under 'Conditions'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:49", "visual_context": "Opening the node, selecting 'bot-test' from the dropdown, and clicking 'Refresh List' for column conditions.", "warnings": null}, {"step_number": 8, "title": "Configure 'Log User Message' Node", "description": "Open the 'Log User Message' node. In the 'Parameters' tab, ensure the 'Data table' is set to the newly created 'bot-test'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:57", "visual_context": "Opening the node and selecting 'bot-test' from the 'Data table' dropdown.", "warnings": null}, {"step_number": 9, "title": "Configure 'Get Full Conversation2' Node", "description": "Open the 'Get Full Conversation2' node. In the 'Parameters' tab, ensure the 'Data table' is set to the newly created 'bot-test'. Refresh the list for both 'assistant' and 'user' columns under 'Conditions'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:01", "visual_context": "Opening the node, selecting 'bot-test' from the dropdown, and clicking 'Refresh List' for column conditions.", "warnings": null}, {"step_number": 10, "title": "Configure 'Anthropic Chat Model1' Node", "description": "Open the 'Anthropic Chat Model1' node. In the 'Parameters' tab, select your Anthropic API account credential.", "url": null, "input_field": null, "uses_variable": "anthropicApiKey", "timestamp": "02:21", "visual_context": "Opening the node and selecting the Anthropic account from the dropdown.", "warnings": null}, {"step_number": 11, "title": "Configure 'Google Gemini Chat Model1' Node", "description": "Open the 'Google Gemini Chat Model1' node. In the 'Parameters' tab, select your Google Gemini API account credential.", "url": null, "input_field": null, "uses_variable": "geminiApiKey", "timestamp": "02:23", "visual_context": "Opening the node and selecting the Google Gemini account from the dropdown.", "warnings": null}, {"step_number": 12, "title": "Configure 'Anthropic Chat Model2' Node", "description": "Open the 'Anthropic Chat Model2' node. In the 'Parameters' tab, select your Anthropic API account credential.", "url": null, "input_field": null, "uses_variable": "anthropicApiKey", "timestamp": "02:25", "visual_context": "Opening the node and selecting the Anthropic account from the dropdown.", "warnings": null}, {"step_number": 13, "title": "Configure 'Google Gemini Chat Model2' Node", "description": "Open the 'Google Gemini Chat Model2' node. In the 'Parameters' tab, select your Google Gemini API account credential.", "url": null, "input_field": null, "uses_variable": "geminiApiKey", "timestamp": "02:26", "visual_context": "Opening the node and selecting the Google Gemini account from the dropdown.", "warnings": null}, {"step_number": 14, "title": "Set Total Turns for Conversation", "description": "Open the 'Total Turns' node. In the 'Parameters' tab, change the 'Conditions' value to '3' for a short demonstration, or '10' to '15' for more extensive testing.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:48", "visual_context": "Opening the 'Total Turns' node and modifying the numerical value in the 'Conditions' field.", "warnings": null}, {"step_number": 15, "title": "Add Client Bot Prompt to 'Scenario Prompt' Node", "description": "Open the 'Scenario Prompt' node. Copy the full system prompt for your client AI bot (e.g., 'American Iron AI Chatbot System Prompt') and paste it into the 'client_bot_prompt' field.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:09", "visual_context": "Copying text from a separate document and pasting it into the 'client_bot_prompt' field.", "warnings": null}, {"step_number": 16, "title": "Generate User Scenario Prompts (Optional)", "description": "To create diverse user simulator prompts, you can use an LLM (like Claude) by providing it with the client bot's system prompt and asking it to generate multiple user identities and scenarios for testing.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:40", "visual_context": "Interacting with Claude to generate 10 different user simulator prompts based on the client bot's system prompt.", "warnings": "This step is optional if you have pre-defined user scenarios."}, {"step_number": 17, "title": "Add User Scenario Prompt to 'Scenario Prompt' Node", "description": "Open the 'Scenario Prompt' node. Copy one of your generated user scenario prompts (e.g., 'SCENARIO 1: Qualified Lead - Ready to Move') and paste it into the 'scenario_prompt' field.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:05", "visual_context": "Copying a user scenario from Claude's output and pasting it into the 'scenario_prompt' field.", "warnings": null}, {"step_number": 18, "title": "Fix 'Referenced Node Doesn't Exist' Error (if applicable)", "description": "If you encounter a 'Referenced node doesn't exist' error, it's likely due to webhook references in the 'client_bot_prompt' that are not present in this test setup. Open the 'Scenario Prompt' node, go to the 'client_bot_prompt' field, and remove or comment out any webhook references (e.g., `{{ $webhook.item.json.body.phone }}`). Keep only the descriptive labels like 'Phone number:', 'Email:', 'User name:'. Ensure no text is highlighted in red.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:16", "visual_context": "Opening the 'Scenario Prompt' node, editing the 'client_bot_prompt' to remove webhook references, and ensuring no red highlights remain.", "warnings": "This error typically occurs if the client bot prompt is designed for a live production environment with incoming webhook data."}, {"step_number": 19, "title": "Add 'Wait' Steps to Prevent API Rate Limits (if applicable)", "description": "If you encounter 'Problem in node 'Client Bot': The service is receiving too many requests from you' errors, add 'Wait' nodes after the 'Log Assistant Message' and 'Log User Message' nodes. Set the 'Wait Amount' to 5 or 10 seconds to introduce delays between API calls.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "07:54", "visual_context": "Adding 'Wait' nodes to the workflow after the logging nodes and configuring their wait times.", "warnings": "This is crucial for API accounts with lower rate limits. Adjust wait times as needed."}, {"step_number": 20, "title": "Clear Previous Conversation Data (if needed)", "description": "If you encounter errors related to previous conversation state (e.g., 'User Test Last Message' hasn't been executed), temporarily connect the 'Start' node to the 'Delete Conversation' node and execute the workflow. This will clear the data table. Afterwards, disconnect 'Start' from 'Delete Conversation' and reconnect it to 'Scenario Prompt'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "08:43", "visual_context": "Connecting 'Start' to 'Delete Conversation', executing, then reverting the connection to 'Scenario Prompt'.", "warnings": "This step is for troubleshooting and should only be performed if you encounter state-related errors."}, {"step_number": 21, "title": "Execute the Workflow", "description": "Once all configurations are complete and any errors are resolved, click 'Execute workflow' to start the simulated conversation between the client bot and the user bot.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "05:14", "visual_context": "Clicking the 'Execute workflow' button at the bottom of the n8n editor.", "warnings": null}, {"step_number": 22, "title": "Download and Review Conversation Log", "description": "After the workflow completes, open the 'Download Conversation' node and click 'Download' to get the conversation log as a Markdown file. Open the file in a text editor to review the full interaction between the assistant and the user.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "06:12", "visual_context": "Opening the 'Download Conversation' node, clicking 'Download', and then opening the downloaded Markdown file.", "warnings": null}], "variables_summary": [{"variable_name": "anthropicApiKey", "label": "Anthropic API Key", "type": "credential", "used_in_future_steps": "Yes"}, {"variable_name": "geminiApiKey", "label": "Gemini API Key", "type": "credential", "used_in_future_steps": "Yes"}], "lesson_url": "https://www.operatorbase.app/learn/copy-my-ai-agency/mod5-les3"});
loadSop('m6_01', {"title": "AI Delta Response System Setup", "description": "This SOP guides you through the complete setup of the AI Delta Response System, including GHL snapshot deployment, n8n workflow configuration, API key integration, custom field setup, calendar integration, timezone settings, and system prompt configuration.", "estimated_time": "30 minutes", "steps": [{"step_number": 1, "title": "Import GHL Snapshot", "description": "Click the provided link to import the AI Delta Response System GHL Snapshot into your GoHighLevel account. You will be prompted to confirm the import. Select 'Yes, Import Now'.", "url": "https://app.gohighlevel.com/v2/snapshots/import/70f1939d-0240-4184-9d99-0201d0d1d0d1", "input_field": null, "uses_variable": null, "timestamp": "00:18", "visual_context": "Screen showing a course lesson with a link 'AI Delta Response System GHL Snapshot CLICK HERE'. After clicking, a GoHighLevel page loads asking 'Do you want to import this snapshot to this account?' with a 'Yes! Import Now' button."}, {"step_number": 2, "title": "Select Sub-Account for Snapshot", "description": "After clicking 'Yes! Import Now', you will be redirected to the 'Sub-accounts' page. You can either create a new sub-account or load the snapshot into an existing one. If loading into an existing sub-account, click 'Manage Client' next to the desired sub-account, then 'Actions' -> 'Load Snapshot'. Choose 'AI Delta Response System' from the dropdown, select all assets to push, and proceed through the conflict check (if any) by selecting 'Select all' and clicking 'Proceed'. If creating a new sub-account, click 'Create Sub-Account', select 'AI Delta Response System' as the template, click 'Add Manually', fill out the company info, and click 'Add Sub-Account'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "00:26", "visual_context": "GoHighLevel 'Sub-accounts' page. Demonstrates managing an existing client by clicking 'Manage Client', then 'Actions' -> 'Load Snapshot', selecting 'AI Delta Response System', selecting all assets, and proceeding. Also shows creating a new sub-account by selecting the snapshot template and filling out details."}, {"step_number": 3, "title": "Download n8n Workflow JSON", "description": "Go back to the course lesson page. Under 'Attached Files', download the 'AI Delta Response System.json' file. This file contains the n8n workflow.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:47", "visual_context": "Course lesson page. Cursor hovers over 'AI Delta Response System.json' under 'Attached Files', showing a download progress bar."}, {"step_number": 4, "title": "Import n8n Workflow", "description": "Open your n8n instance. Click 'Create workflow' in the top right corner. In the new empty workflow canvas, click the three dots in the top right corner (next to 'Save') and select 'Import from file'. Choose the 'AI Delta Response System.json' file you just downloaded and click 'Open'. Save the workflow.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "01:53", "visual_context": "n8n workflow list page. Clicks 'Create workflow', then 'Import from file', selects the JSON file, and the workflow appears on the canvas. Clicks 'Save'."}, {"step_number": 5, "title": "Create 'bot' Data Table in n8n", "description": "In your n8n instance, navigate to 'Data tables' (next to 'Workflows'). Click 'Create data table'. Name the data table 'bot' (all lowercase). Click 'Create'. Once created, add two columns: 'contact' (type: string) and 'message' (type: string). Ensure the names are exactly 'contact' and 'message'.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "02:23", "visual_context": "n8n interface, navigating to 'Data tables'. Clicks 'Create data table', enters 'bot' as the name, clicks 'Create'. Then adds columns 'contact' and 'message'."}, {"step_number": 6, "title": "Configure Database Nodes in n8n Workflow", "description": "Go back to your 'AI Delta Response System' workflow in n8n. You need to update the 'Data table' selection in five database nodes: 'Get Existing Messages', 'Update Message', 'Create Message', 'Get Full Message', and 'Delete Old Message Row'. For each of these nodes:\n1.  Click on the node to open its settings.\n2.  Under 'Data table', select 'bot' from the dropdown. It might show two 'bot' options; select the newly created one.\n3.  For 'Condition' fields (e.g., 'contact (string)'), ensure 'Fixed Expression' is selected and refresh the list if there's an error. The value should be `{{ $('Webhook').item.json.body.contact_id }}` for 'contact' and `{{ $('Webhook').item.json.body.User Last Message }}` for 'message' (in 'Create Message' node).\n4.  Ensure all nodes point to the same 'bot' database.", "url": null, "input_field": null, "uses_variable": null, "timestamp": "03:06", "visual_context": "n8n workflow canvas. Demonstrates opening each of the five database nodes, selecting 'bot' from the 'Data table' dropdown, refreshing the 'Condition' field, and ensuring the correct expressions are used for 'contact' and 'message'."}, {"step_number": 7, "title": "Add Gemini API Key to n8n", "description": "In your n8n workflow, locate the 'Google Gemini Chat Model' node (there are two, one in the main flow and one in the 'Follow Up Agent' flow). Click on the node.\n1.  Under 'Credential to connect with', select 'Create new credential'.\n2.  In the 'Google GeminiPaLM API account' popup, paste your `geminiApiKey` into the 'API Key' field.\n3.  Click 'Save'. Ensure the connection is successful.", "url": "https://aistudio.google.com/app/apikey", "input_field": null, "uses_variable": "geminiApiKey", "timestamp": "06:36", "visual_context": "n8n workflow canvas. Clicks on 'Google Gemini Chat Model' node. In the settings panel, clicks 'Create new credential', pastes API key into 'API Key' field, and clicks 'Save'. A success message appears."}, {"step_number": 8, "title": "Add Anthropic
